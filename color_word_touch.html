<script>
function hideStartButton(){
  var b=document.getElementById("startBtn");
  if(b){ b.classList.add("hiddenStart"); }
}
document.addEventListener("DOMContentLoaded",function(){
  var b=document.getElementById("startBtn");
  if(b){
    b.addEventListener("click",function(){ setTimeout(hideStartButton,0); }, {once:true});
  }
});
</script>
