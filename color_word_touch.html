<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="0; url=index.html">
<title>は終了しました</title>
<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans JP",sans-serif;background:#f8fafc;color:#1f2937;padding:24px}
.card{max-width:720px;margin:40px auto;background:white;border:2px solid #dbeafe;border-radius:24px;padding:24px;text-align:center}
a{display:inline-block;margin-top:18px;background:#2563eb;color:white;text-decoration:none;padding:14px 20px;border-radius:999px;font-weight:800}

/* ===== Ver.3.2 one-screen smartphone layout ===== */
:root{
  --mobile-safe-gap:8px;
}
html,body{
  min-height:100%;
  overflow-x:hidden;
}
body{
  font-size:16px;
}
.wrap{
  width:min(980px,96vw)!important;
}
.top{
  position:static!important;
}
.nav{
  min-height:auto!important;
  padding:6px 0!important;
  gap:8px!important;
  flex-wrap:wrap!important;
}
.nav a,.pill,.badge{
  font-size:13px!important;
  padding:6px 9px!important;
  line-height:1.15!important;
}
.panel{
  padding:clamp(12px,3vw,22px)!important;
  border-radius:22px!important;
  margin-top:8px!important;
}
h1{
  margin:6px 0 6px!important;
  line-height:1.15!important;
}
.lead{
  margin:4px 0 8px!important;
  line-height:1.35!important;
}
.illust{
  font-size:clamp(34px,8vw,56px)!important;
  margin:2px 0!important;
  line-height:1!important;
}
.status{
  gap:6px!important;
  margin:4px 0 8px!important;
  flex-wrap:wrap!important;
}
.actions{
  gap:8px!important;
  margin:8px 0!important;
  flex-wrap:wrap!important;
}
button{
  min-height:46px!important;
  padding:9px 13px!important;
  font-size:clamp(15px,3.8vw,19px)!important;
  border-radius:18px!important;
}
.scene{
  min-height:68px!important;
  padding:10px 12px!important;
  border-radius:18px!important;
  font-size:clamp(18px,4.6vw,28px)!important;
  line-height:1.35!important;
}
.choices,.sstChoices{
  gap:8px!important;
  margin-top:8px!important;
}
.choice,.sstChoice,.tile{
  min-height:46px!important;
  padding:10px 12px!important;
  border-radius:18px!important;
  font-size:clamp(15px,3.8vw,20px)!important;
  line-height:1.35!important;
}
.report,.tip,.message,.sstExplain{
  margin-top:8px!important;
  padding:10px 12px!important;
  line-height:1.35!important;
}
.footer{
  margin-top:8px!important;
  padding:8px 12px!important;
  font-size:12px!important;
}

/* smartphone: aim to fit first task screen into one viewport */
@media(max-width:640px){
  body{
    min-height:100dvh;
  }
  .wrap{
    width:97vw!important;
  }
  .top{
    margin-bottom:0!important;
  }
  .panel{
    padding:10px!important;
    margin-top:4px!important;
  }
  h1{
    font-size:clamp(23px,6.2vw,32px)!important;
  }
  .lead{
    font-size:13px!important;
  }
  .illust{
    font-size:36px!important;
  }
  .badge,.pill,.nav a{
    font-size:12px!important;
    padding:5px 8px!important;
  }
  .actions button{
    flex:1 1 42%;
  }
  .scene{
    min-height:60px!important;
    font-size:clamp(17px,4.5vw,24px)!important;
    padding:9px!important;
  }
  .choice,.sstChoice{
    min-height:44px!important;
    padding:9px!important;
    font-size:clamp(15px,4vw,19px)!important;
    text-align:center!important;
  }
  .sstChoice::before{
    display:block!important;
    width:max-content!important;
    margin:0 auto 4px!important;
    font-size:11px!important;
    padding:2px 8px!important;
  }
  .timerBar{
    height:10px!important;
    margin:6px 0!important;
  }
  .colorGrid{
    gap:8px!important;
    margin-top:8px!important;
  }
  .colorBtn,.colorChoice{
    height:64px!important;
    border-radius:18px!important;
  }
  .visionArea{
    height:58dvh!important;
    min-height:260px!important;
    margin-top:8px!important;
  }
  .target{
    width:56px!important;
    height:56px!important;
    font-size:28px!important;
    border-radius:18px!important;
  }
  .memoryShow{
    font-size:clamp(42px,14vw,76px)!important;
    margin:6px 0!important;
  }
  .memoryCards{
    gap:8px!important;
  }
  .memoryCards button{
    min-height:60px!important;
    font-size:clamp(28px,9vw,46px)!important;
  }
  .grid{
    grid-template-columns:1fr!important;
    gap:8px!important;
  }
  .card,.menu{
    padding:12px!important;
    border-radius:18px!important;
  }
  .card .icon,.menu .icon{
    font-size:32px!important;
  }
  .card .title,.menu .title{
    font-size:18px!important;
    margin:2px 0!important;
  }
  .card .desc,.menu .desc{
    font-size:13px!important;
    line-height:1.3!important;
  }
  .footer{
    display:none!important;
  }
}

/* very small phones */
@media(max-width:390px){
  .lead{display:none!important;}
  .illust{font-size:30px!important;}
  h1{font-size:23px!important;}
  .scene{min-height:54px!important;font-size:16px!important;}
  button{min-height:42px!important;font-size:14px!important;padding:8px 10px!important;}
  .choice,.sstChoice{min-height:40px!important;font-size:14px!important;padding:8px!important;}
  .badge,.pill,.nav a{font-size:11px!important;padding:4px 7px!important;}
}

</style>
</head>
<body>
<div class="card">
<h1>は終了しました</h1>
<p>TOPから別のメニューを選んでください。</p>
<a href="index.html">TOPへ戻る</a>
</div>
</body>
</html>
