<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>数字タッチ</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,'Yu Gothic','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}
a{text-decoration:none;color:inherit}
.wrap{width:min(980px,92vw);margin:0 auto}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0}
.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-weight:900}
.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}
.hero{padding:30px 0 16px}
.brand{display:inline-block;background:#fff;border-radius:999px;padding:8px 16px;box-shadow:0 8px 25px rgba(30,41,59,.08);font-weight:900}
h1{font-size:clamp(32px,6vw,54px);line-height:1.15;margin:16px 0 8px}
.lead{color:#64748b;font-size:clamp(17px,3vw,22px)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:20px 0 34px}
.card{background:rgba(255,255,255,.95);border-radius:30px;padding:22px;box-shadow:0 15px 45px rgba(30,41,59,.10);border:1px solid rgba(255,255,255,.85)}
.menu{min-height:150px}.icon{font-size:52px}.title{font-size:24px;font-weight:900;margin-bottom:8px}.desc{font-size:16px;color:#64748b}
.panel{background:rgba(255,255,255,.96);border-radius:34px;padding:22px;box-shadow:0 18px 55px rgba(30,41,59,.12);margin:22px 0 38px}
.status{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-weight:800;margin-bottom:12px}
.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}
.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}
.scene{font-size:clamp(24px,5vw,34px);font-weight:900;text-align:center;line-height:1.55;white-space:pre-line;margin:10px 0 18px}
.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
button{border:0;border-radius:999px;padding:13px 22px;font-size:20px;font-weight:900;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;box-shadow:0 10px 25px rgba(79,70,229,.22);cursor:pointer}
button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}
button.gray{background:#64748b}
.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}
.correct{border-color:#86efac!important;background:#f0fdf4!important}.wrong{border-color:#fca5a5!important;background:#fef2f2!important}
.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}
.tip,.report{margin-top:14px;border-radius:26px;padding:18px;background:#f8fafc;border:2px solid #e2e8f0}.tip{background:#ecfdf5;border-color:#bbf7d0}.report{background:#fff7ed;border-color:#fed7aa}
.reportItem{background:#fff;border:3px solid #fed7aa;border-radius:22px;padding:16px;margin:14px 0}
.hidden{display:none!important}
.footer{text-align:center;color:#64748b;padding:22px}
.shape{width:90px;height:90px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;border:5px solid #fff;box-shadow:0 8px 20px rgba(30,41,59,.12)}
.red{background:#ef4444}.blue{background:#3b82f6}.yellow{background:#facc15}.green{background:#22c55e}.purple{background:#a855f7}.orange{background:#fb923c}
@media(min-width:720px){.choices{grid-template-columns:1fr 1fr}.panel{padding:30px}}

.scoreLiveHide{display:none!important}

.versionBadge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:white;
  font-weight:1000;
  border-radius:999px;
  padding:10px 18px;
  box-shadow:0 10px 24px rgba(79,70,229,.22);
  margin:12px 0;
}
.versionNote{
  display:inline-block;
  background:#fff;
  color:#475569;
  border:2px solid #e2e8f0;
  border-radius:999px;
  padding:8px 14px;
  font-weight:800;
  margin-left:8px;
}
@media(max-width:640px){
  .versionNote{margin-left:0;margin-top:8px}
}

.liveResultHide{display:none!important}




/* ===== Ver.2.8 mobile readability fix ===== */
html{font-size:16px}
body{overflow-x:hidden}
.wrap{width:min(980px,96vw)!important}
.panel{border-radius:26px!important;padding:clamp(16px,4vw,28px)!important}
.grid{gap:14px!important}
.card,.menu{border-radius:22px!important}
button,.pill,.choice,.sstChoice,.tile,.modeBtn{
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
button{min-height:54px!important;padding:13px 18px!important;font-size:clamp(17px,4vw,22px)!important}
.choices,.sstChoices{gap:12px!important}
.choice,.sstChoice,.tile{
  min-height:58px;
  padding:14px!important;
  line-height:1.55!important;
  word-break:keep-all;
  overflow-wrap:anywhere;
}
.scene{line-height:1.65!important}
ruby.autoRuby{ruby-position:over;display:inline-ruby;line-height:1.25}
ruby.autoRuby rb{display:ruby-base}
ruby.autoRuby rt{display:ruby-text;font-size:.46em!important;line-height:1!important;color:#475569;font-weight:800;text-align:center}
.fullOverlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(22,163,74,.92);color:white;
  font-size:clamp(58px,16vw,128px);font-weight:1000;
  letter-spacing:.04em;text-shadow:0 6px 20px rgba(0,0,0,.25);
}
.hidden{display:none!important}
@media(max-width:640px){
  .top{position:static!important}
  .nav{gap:8px;flex-wrap:wrap}
  h1{font-size:clamp(27px,8vw,42px)!important}
  .lead{font-size:16px!important;line-height:1.6!important}
  .status{gap:7px!important;justify-content:center!important}
  .badge{font-size:14px!important;padding:7px 9px!important}
  .choices,.sstChoices{grid-template-columns:1fr!important}
  .grid{grid-template-columns:1fr!important}
  ruby.autoRuby rt{font-size:.42em!important}
}


/* ===== Ver.2.8 stable smartphone and PC UI ===== */
html{font-size:16px}
body{overflow-x:hidden;color:#1f2937}
.wrap{width:min(980px,96vw)!important;margin-inline:auto}
.panel{border-radius:26px!important;padding:clamp(16px,4vw,28px)!important}
button{min-height:56px!important;padding:13px 18px!important;font-size:clamp(17px,4vw,22px)!important;touch-action:manipulation}
.choices,.sstChoices{display:grid!important;grid-template-columns:1fr!important;gap:14px!important;margin-top:16px}
.choice,.sstChoice,.tile{
  display:block;width:100%;min-height:60px;
  padding:16px!important;border:3px solid #dbeafe!important;border-radius:22px!important;
  background:#fff!important;box-shadow:0 8px 18px rgba(30,41,59,.08);
  color:#1f2937!important;font-weight:1000;line-height:1.6!important;text-align:left;
}
.choice.correct,.sstChoice.correct{border-color:#86efac!important;background:#dcfce7!important}
.choice.wrong,.sstChoice.wrong{border-color:#fca5a5!important;background:#fee2e2!important}
.scene{
  min-height:96px;line-height:1.7!important;display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;
  color:#1f2937!important;background:#f8fafc;border:2px solid #dbeafe;border-radius:24px;padding:18px;font-weight:1000;font-size:clamp(21px,5vw,34px)
}
.hidden{display:none!important}
.fullOverlay{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(22,163,74,.94);color:#fff;font-size:clamp(58px,16vw,128px);font-weight:1000;letter-spacing:.05em;text-shadow:0 6px 20px rgba(0,0,0,.25)}
ruby.autoRuby{ruby-position:over;display:inline-ruby;line-height:1.3}
ruby.autoRuby rb{display:ruby-base}
ruby.autoRuby rt{display:ruby-text;font-size:.46em!important;line-height:1!important;color:#475569;font-weight:800;text-align:center}
@media(max-width:640px){
  .top{position:static!important}
  .nav{gap:8px;flex-wrap:wrap}
  h1{font-size:clamp(27px,8vw,42px)!important}
  .lead{font-size:16px!important;line-height:1.6!important}
  .status{gap:7px!important;justify-content:center!important}
  .badge{font-size:14px!important;padding:7px 9px!important}
  .grid{grid-template-columns:1fr!important;gap:12px!important}
  .choice,.sstChoice{text-align:center!important}
  ruby.autoRuby rt{font-size:.42em!important}
}
.visionArea{position:relative;height:min(56vh,460px);min-height:340px;background:#f8fafc;border:3px solid #dbeafe;border-radius:26px;overflow:hidden;margin-top:14px}.target{position:absolute;width:76px;height:76px;border-radius:22px;background:#fff;border:3px solid #bfdbfe;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:1000;box-shadow:0 8px 20px rgba(30,41,59,.12);touch-action:manipulation}.target.good{background:#dcfce7;border-color:#86efac}.target.bad{background:#fee2e2;border-color:#fca5a5}@media(max-width:640px){.visionArea{height:440px}.target{width:68px;height:68px;font-size:34px}}</style></head>
<body><div class="top"><div class="wrap nav"><a href="vision_training.html">← ビジョン</a><span class="pill">にじフラ Ver.2.8</span></div></div>
<main class="wrap"><section class="panel">
<div class="status"><span class="badge">数字タッチ</span><span class="badge">問題 <span id="num">0</span>/5</span><span class="badge">点 <span id="score">0</span></span></div>
<h1 style="text-align:center">数字タッチ</h1><div id="instruction" class="scene">スタートしてね</div>
<div class="actions"><button onclick="start()">スタート</button></div><div id="area" class="visionArea"></div><div id="msg" class="message"></div>
</section></main><footer class="footer">安心の中で挑戦し、挑戦の中で成長する</footer>
<script>

const FURI_ENTRIES = [["危険予知トレーニング", "きけんよちとれーにんぐ"], ["ビジョントレーニング", "びじょんとれーにんぐ"], ["10分チェック", "じゅっぷんちぇっく"], ["問題形式SST", "もんだいけいしきえすえすてぃー"], ["取り組んだ問題", "とりくんだもんだい"], ["記憶ゲーム", "きおくげーむ"], ["もじタッチ", "もじたっち"], ["選んだ答え", "えらんだこたえ"], ["数字タッチ", "すうじたっち"], ["ありがとう", "ありがとう"], ["危険予知", "きけんよち"], ["色タッチ", "いろたっち"], ["問題形式", "もんだいけいしき"], ["よい答え", "よいこたえ"], ["ポイント", "ぽいんと"], ["レポート", "れぽーと"], ["横断歩道", "おうだんほどう"], ["もう一回", "もういっかい"], ["ごめんね", "ごめんね"], ["スタート", "すたーと"], ["はじめる", "はじめる"], ["よみあげ", "よみあげ"], ["選択肢", "せんたくし"], ["友だち", "ともだち"], ["気持ち", "きもち"], ["伝える", "つたえる"], ["お願い", "おねがい"], ["止まる", "とまる"], ["片づけ", "かたづけ"], ["深呼吸", "しんこきゅう"], ["同じ絵", "おなじえ"], ["選ぼう", "えらぼう"], ["正しい", "ただしい"], ["間違い", "まちがい"], ["一緒に", "いっしょに"], ["大丈夫", "だいじょうぶ"], ["問題", "もんだい"], ["答え", "こたえ"], ["正解", "せいかい"], ["最後", "さいご"], ["今日", "きょう"], ["安心", "あんしん"], ["挑戦", "ちょうせん"], ["成長", "せいちょう"], ["自分", "じぶん"], ["相手", "あいて"], ["大人", "おとな"], ["先生", "せんせい"], ["行動", "こうどう"], ["安全", "あんぜん"], ["確認", "かくにん"], ["言葉", "ことば"], ["説明", "せつめい"], ["聞く", "きく"], ["話す", "はなす"], ["相談", "そうだん"], ["謝る", "あやまる"], ["見る", "みる"], ["待つ", "まつ"], ["順番", "じゅんばん"], ["使う", "つかう"], ["助け", "たすけ"], ["歩く", "あるく"], ["走る", "はしる"], ["遊び", "あそび"], ["活動", "かつどう"], ["教室", "きょうしつ"], ["公園", "こうえん"], ["道路", "どうろ"], ["信号", "しんごう"], ["階段", "かいだん"], ["廊下", "ろうか"], ["黄色", "きいろ"], ["数字", "すうじ"], ["同じ", "おなじ"], ["車", "くるま"], ["色", "いろ"], ["赤", "あか"], ["青", "あお"], ["緑", "みどり"], ["白", "しろ"], ["黒", "くろ"], ["右", "みぎ"], ["左", "ひだり"], ["上", "うえ"], ["下", "した"]];
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function R(text){
  const raw=String(text??"");
  let out="",i=0;
  while(i<raw.length){
    let hit=null;
    for(const pair of FURI_ENTRIES){
      const w=pair[0];
      if(raw.slice(i,i+w.length)===w){hit=pair;break}
    }
    if(hit){out+=`<ruby class="autoRuby"><rb>${esc(hit[0])}</rb><rt>${esc(hit[1])}</rt></ruby>`;i+=hit[0].length}
    else{out+=esc(raw[i]);i++}
  }
  return out.replaceAll("\\n","<br>");
}
function showCorrectOverlay(){
  const o=document.getElementById("overlay");
  if(!o)return;
  o.classList.remove("hidden");
  setTimeout(()=>o.classList.add("hidden"),650);
}
function speakJP(text){
  if(!("speechSynthesis" in window))return;
  const u=new SpeechSynthesisUtterance(String(text||""));
  u.lang="ja-JP";u.rate=.85;speechSynthesis.cancel();speechSynthesis.speak(u);
}


let round=0,score=0,nextNum=1;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function rand(n){return Math.floor(Math.random()*Math.max(1,n))}
function place(btn,used){const a=document.getElementById("area");let x=0,y=0;for(let t=0;t<80;t++){x=rand(a.clientWidth-76-8)+4;y=rand(a.clientHeight-76-8)+4;if(used.every(p=>Math.hypot(p.x-x,p.y-y)>82))break}used.push({x,y});btn.style.left=x+"px";btn.style.top=y+"px"}
function start(){round=0;score=0;document.getElementById("score").textContent=0;show()}
function show(){document.getElementById("msg").textContent="";if(round>=5){document.getElementById("instruction").innerHTML=R("おしまい");document.getElementById("area").innerHTML="";return}round++;nextNum=1;document.getElementById("num").textContent=round;document.getElementById("instruction").innerHTML=R("1から5まで順番にタッチ");const area=document.getElementById("area");area.innerHTML="";const used=[];shuffle([1,2,3,4,5]).forEach(n=>{const b=document.createElement("button");b.type="button";b.className="target";b.textContent=n;place(b,used);b.onclick=()=>{if(n===nextNum){b.classList.add("good");b.style.visibility="hidden";nextNum++;if(nextNum>5){score+=5;document.getElementById("score").textContent=score;setTimeout(show,350)}}else{b.classList.add("bad");document.getElementById("msg").textContent="順番を確認しよう";setTimeout(()=>b.classList.remove("bad"),300)}};area.appendChild(b)})}

</script>
</body></html>
