<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>順番待ち</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,'Yu Gothic','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}
a{text-decoration:none;color:inherit}
.wrap{width:min(980px,92vw);margin:0 auto}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0}
.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-weight:900}
.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}
.hero{padding:30px 0 16px}
.brand{display:inline-block;background:#fff;border-radius:999px;padding:8px 16px;box-shadow:0 8px 25px rgba(30,41,59,.08);font-weight:900}
h1{font-size:clamp(32px,6vw,54px);line-height:1.15;margin:16px 0 8px}
.lead{color:#64748b;font-size:clamp(17px,3vw,22px)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:20px 0 34px}
.card{background:rgba(255,255,255,.95);border-radius:30px;padding:22px;box-shadow:0 15px 45px rgba(30,41,59,.10);border:1px solid rgba(255,255,255,.85)}
.menu{min-height:150px}.icon{font-size:52px}.title{font-size:24px;font-weight:900;margin-bottom:8px}.desc{font-size:16px;color:#64748b}
.panel{background:rgba(255,255,255,.96);border-radius:34px;padding:22px;box-shadow:0 18px 55px rgba(30,41,59,.12);margin:22px 0 38px}
.status{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-weight:800;margin-bottom:12px}
.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}
.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}
.scene{font-size:clamp(24px,5vw,34px);font-weight:900;text-align:center;line-height:1.55;white-space:pre-line;margin:10px 0 18px}
.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
button{border:0;border-radius:999px;padding:13px 22px;font-size:20px;font-weight:900;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;box-shadow:0 10px 25px rgba(79,70,229,.22);cursor:pointer}
button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}
button.gray{background:#64748b}
.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}
.correct{border-color:#86efac!important;background:#f0fdf4!important}.wrong{border-color:#fca5a5!important;background:#fef2f2!important}
.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}
.tip,.report{margin-top:14px;border-radius:26px;padding:18px;background:#f8fafc;border:2px solid #e2e8f0}.tip{background:#ecfdf5;border-color:#bbf7d0}.report{background:#fff7ed;border-color:#fed7aa}
.reportItem{background:#fff;border:3px solid #fed7aa;border-radius:22px;padding:16px;margin:14px 0}
.hidden{display:none!important}
.footer{text-align:center;color:#64748b;padding:22px}
.shape{width:90px;height:90px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;border:5px solid #fff;box-shadow:0 8px 20px rgba(30,41,59,.12)}
.red{background:#ef4444}.blue{background:#3b82f6}.yellow{background:#facc15}.green{background:#22c55e}.purple{background:#a855f7}.orange{background:#fb923c}
@media(min-width:720px){.choices{grid-template-columns:1fr 1fr}.panel{padding:30px}}

.scoreLiveHide{display:none!important}

.liveResultHide{display:none!important}



/* ===== Ver.1.7 automatic furigana ===== */
ruby.autoRuby{
  ruby-position:over;
}
ruby.autoRuby rt{
  font-size:.55em;
  line-height:1;
  color:#475569;
  font-weight:900;
  text-align:center;
}
@media(max-width:640px){
  ruby.autoRuby rt{
    font-size:.48em;
  }
  ruby.autoRuby{
    line-height:1.15;
  }
}
.themeText{
  margin:12px auto 0;
  color:#334155;
  font-weight:1000;
  font-size:clamp(17px,2.5vw,22px);
  text-align:center;
}
</style></head><body><div class="top"><div class="wrap nav"><a href="park.html">← もどる</a><span class="pill">🌈 にじフラ</span></div></div>
<main class="wrap"><section class="panel">
<div class="status"><span class="badge"><ruby class="autoRuby">問題<rt>もんだい</rt></ruby> <span id="num">0</span>/10</span><span class="badge scoreLiveHide"><ruby class="autoRuby">正解<rt>せいかい</rt></ruby> <span id="score">0</span></span><span class="badge" id="cat"></span></div>
<div class="illust" id="illust">🌈</div><h1 style="text-align:center"><ruby class="autoRuby">順番待<rt>じゅんばん待</rt></ruby>ち</h1><p class="lead" style="text-align:center"><ruby class="autoRuby">待<rt>よみ</rt></ruby>つ<ruby class="autoRuby">練習<rt>れんしゅう</rt></ruby>です。</p>
<div class="scene" id="scene">スタート</div>
<div class="actions"><button onclick="readQ()">🔊 よみあげ</button><button class="light" onclick="start()">もう<ruby class="autoRuby">一回<rt>よみ</rt></ruby></button></div>
<div class="choices" id="choices"></div><div class="message" id="msg"></div><div class="tip hidden" id="tip"></div><div class="report hidden" id="report"></div>
</section></main><script>
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function stripFurigana(text){return String(text).replace(/([一-龯々〆ヶ]+)（[ぁ-んァ-ンー]+）/g,"$1").replace(/（[ぁ-んァ-ンー]+）/g,"").replace(/\n/g,"。")}
function speakText(text){if(!("speechSynthesis" in window))return;const u=new SpeechSynthesisUtterance(stripFurigana(text));u.lang="ja-JP";u.rate=.82;speechSynthesis.cancel();speechSynthesis.speak(u)}
</script>
<script>

ます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}, {"cat": "順番", "illust": "🛝👫", "scene": "すべり台に友だちが並んでいます。", "choices": [{"text": "後ろに並ぶ", "ok": true}, {"text": "前に入る", "ok": false}, {"text": "押す", "ok": false}, {"text": "走る", "ok": false}], "tip": "順番は後ろに並びます。"}];
let deck=[],i=0,score=0,wrong=[],answered=false,current='';
function start(){deck=shuffle(DATA).slice(0,10);i=0;score=0;wrong=[];answered=false;document.getElementById('score').textContent=score;document.getElementById('report').classList.add('hidden');document.getElementById('report').innerHTML='';show()}
function show(){answered=false;document.getElementById('msg').textContent='';document.getElementById('tip').classList.add('hidden');if(i>=deck.length){finish();return}const q=deck[i];current=q.scene;document.getElementById('num').textContent=i+1;document.getElementById('cat').textContent=q.cat||'';document.getElementById('illust').textContent=q.illust||'🌈';document.getElementById('scene').textContent=q.scene;const box=document.getElementById('choices');box.innerHTML='';shuffle(q.choices).forEach(c=>{let d=document.createElement('div');d.className='choice';d.textContent=c.text;d.onclick=()=>answer(c,d);box.appendChild(d)})}
function answer(c,d){if(answered)return;answered=true;document.querySelectorAll('.choice').forEach(x=>x.style.pointerEvents='none');const q=deck[i];if(c.ok){score++;document.getElementById('score').textContent=score;d.classList.add('correct');document.getElementById('msg').innerHTML='<span class="ok">いいね！</span>'}else{d.classList.add('wrong');let good=q.choices.find(x=>x.ok);wrong.push({cat:q.cat,illust:q.illust,scene:q.scene,selected:c.text,correct:good?good.text:'',tip:q.tip});document.getElementById('msg').innerHTML='<span class="ng">もう一回考えよう</span>'}document.getElementById('tip').classList.remove('hidden');document.getElementById('tip').innerHTML='<b>ポイント</b><br>'+esc(q.tip||'');setTimeout(()=>{i++;show()},1500)}
function finish(){document.getElementById('num').textContent=10;document.getElementById('illust').textContent='⭐';document.getElementById('scene').textContent='おしまい！\n'+score+' / 10 問できました';document.getElementById('choices').innerHTML='';document.getElementById('tip').classList.add('hidden');const r=document.getElementById('report');r.classList.remove('hidden');let h='<h2>ふりかえりレポート</h2>';if(wrong.length===0){h+='<p>まちがえた問題はありませんでした。</p>'}else{h+='<p>まちがえた問題だけを表示します。</p>';wrong.forEach((w,n)=>{h+='<div class="reportItem"><div style="font-size:52px;text-align:center">'+esc(w.illust||'')+'</div><b>'+(n+1)+'. まちがえた問題</b><div class="scene" style="font-size:22px">'+esc(w.scene).replaceAll("\n","<br>")+'</div><p class="ng"><b>選んだ答え：</b><br>'+esc(w.selected)+'</p><p class="ok"><b>よい答え：</b><br>'+esc(w.correct)+'</p><p><b>ポイント：</b><br>'+esc(w.tip||'')+'</p></div>'})}h+='<div class="actions"><button onclick="window.print()">印刷</button><button class="light" onclick="start()">もう一回</button></div>';r.innerHTML=h}
function readQ(){speakText(current||document.getElementById('scene').textContent)}
start();
</script>
