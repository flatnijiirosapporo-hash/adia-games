<script>
(function(){
  function getStartFunction(){
    if (typeof window.start === "function") return window.start;
    if (typeof window.startGame === "function") return window.startGame;
    if (typeof window.newGame === "function") return window.newGame;
    if (typeof window.begin === "function") return window.begin;
    return null;
  }

  window.hideStartButton = function(){
    var b = document.getElementById("startBtn");
    if (b) b.classList.add("hiddenStart");
  };

  window.showStartButton = function(){
    var b = document.getElementById("startBtn");
    if (b) b.classList.remove("hiddenStart");
  };

  window.confirmRetryGame = function(){
    var old = document.getElementById("retryConfirmOverlay");
    if (old) old.remove();

    var overlay = document.createElement("div");
    overlay.className = "confirmOverlay";
    overlay.id = "retryConfirmOverlay";
    overlay.innerHTML =
      '<div class="confirmCard">' +
        '<h2>もう1回の前に</h2>' +
        '<p>周りにやりたい友達がいないか確認してね。</p>' +
        '<div class="confirmActions">' +
          '<button type="button" id="retryOkBtn">OK</button>' +
          '<button type="button" class="light" id="retryCancelBtn">やめる</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(overlay);

    document.getElementById("retryCancelBtn").onclick = function(){
      overlay.remove();
    };

    document.getElementById("retryOkBtn").onclick = function(){
      overlay.remove();
      var box = document.getElementById("retryBox");
      if (box) box.remove();

      var fn = getStartFunction();
      if (fn) {
        try {
          fn();
          setTimeout(window.hideStartButton, 0);
        } catch(e) {
          location.reload();
        }
      } else {
        location.reload();
      }
    };
  };

  window.showRetryButton = function(){
    if (document.getElementById("retryBox")) return;

    var target =
      document.getElementById("msg") ||
      document.getElementById("report") ||
      document.querySelector(".panel") ||
      document.body;

    var box = document.createElement("div");
    box.className = "retryBox";
    box.id = "retryBox";
    box.innerHTML = '<button type="button" class="retryBtn" onclick="confirmRetryGame()">もう1回</button>';

    if (target && target.parentNode) {
      target.parentNode.insertBefore(box, target.nextSibling);
    } else {
      document.body.appendChild(box);
    }
  };

  document.addEventListener("DOMContentLoaded", function(){
    var b = document.getElementById("startBtn");
    if (b) {
      b.textContent = "スタート";
      b.addEventListener("click", function(){
        setTimeout(window.hideStartButton, 0);
      });
    }
  });
})();
</script>
