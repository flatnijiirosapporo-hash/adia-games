  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function rubyText(text){
    const raw = String(text ?? "");
    let out = "";
    let i = 0;
    while(i < raw.length){
      let hit = null;
      for(const pair of FURI_ENTRIES){
        const word = pair[0];
        if(raw.slice(i, i + word.length) === word){
          hit = pair;
          break;
        }
      }
      if(hit){
        const word = hit[0], yomi = hit[1];
        if(!/[一-龯々〆ヶ]/.test(yomi)){
          out += `<ruby class="autoRuby"><rb>${esc(word)}</rb><rt>${esc(yomi)}</rt></ruby>`;
        }else{
          out += esc(word);
        }
        i += word.length;
      }else{
        out += esc(raw[i]);
        i++;
      }
    }
    return out;
  }

  function shouldSkipNode(node){
    const p = node.parentElement;
    if(!p) return true;
    if(p.closest("script,style,textarea,input,select,option,ruby,rt,rb,.noAutoRuby")) return true;
    if(!node.nodeValue || !node.nodeValue.trim()) return true;
    return false;
  }

  function convertTextNode(node){
    if(shouldSkipNode(node)) return;
    const raw = node.nodeValue;
    const converted = rubyText(raw);
    if(converted === esc(raw)) return;
    const span = document.createElement("span");
    span.className = "autoRubyWrap";
    span.innerHTML = converted;
    node.parentNode.replaceChild(span, node);
  }

  function scan(root){
    if(!root) return;
    if(root.nodeType === Node.TEXT_NODE){
      convertTextNode(root);
      return;
    }
    if(root.nodeType !== Node.ELEMENT_NODE && root.nodeType !== Node.DOCUMENT_NODE) return;
    if(root.closest && root.closest("script,style,textarea,input,select,option,ruby,rt,rb,.noAutoRuby")) return;

    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        return shouldSkipNode(node) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
      }
    });

    const nodes = [];
    let n;
    while(n = walker.nextNode()) nodes.push(n);
    nodes.forEach(convertTextNode);
  }

  function boot(){
    scan(document.body);
    const mo = new MutationObserver(muts=>{
      for(const m of muts){
        for(const node of m.addedNodes){
          scan(node);
        }
      }
    });
    mo.observe(document.body, {childList:true, subtree:true});
  }

  if(document.readyState === "loading"){
    document.addEventListener("DOMContentLoaded", boot);
  }else{
    boot();
  }

  window.nijiflaRubyText = rubyText;
})();
