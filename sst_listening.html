<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>👂 聞（き）く練習（れんしゅう）</title><style>
body{margin:0;font-family:system-ui,sans-serif;background:#f8fafc;color:#1f2937;text-align:center;user-select:none}
header{background:white;padding:24px 16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1{margin:0 0 8px;font-size:32px}.sub{font-size:17px;color:#64748b;line-height:1.6}
main{max-width:760px;margin:0 auto;padding:20px}.grid{display:grid;gap:14px}
.card{background:white;border-radius:26px;padding:20px;text-align:left;box-shadow:0 5px 14px rgba(0,0,0,.12);border:5px solid white}
a{text-decoration:none;color:inherit}.title{font-size:24px;font-weight:800;margin-bottom:6px}.desc{font-size:16px;color:#475569;line-height:1.55}
button{font-size:22px;padding:12px 26px;border:0;border-radius:999px;background:#2563eb;color:white;font-weight:700;margin:6px;cursor:pointer}
.choice{background:white;border:5px solid #dbeafe;border-radius:24px;padding:20px 10px;font-size:23px;font-weight:800;box-shadow:0 3px 9px rgba(0,0,0,.12);cursor:pointer;line-height:1.55}
.choices{display:grid;grid-template-columns:repeat(1,1fr);gap:14px;margin-top:16px}.big{font-size:30px;font-weight:800;margin:20px 0;line-height:1.6;white-space:pre-line}
.hidden{display:none}.back{display:inline-block;margin-top:16px;color:#2563eb;font-weight:700}.ok{color:#16a34a}.ng{color:#dc2626}
.point{background:#ecfdf5;border-color:#bbf7d0}.tip{font-size:18px;line-height:1.8;color:#334155;white-space:pre-line}
.status{font-size:18px;color:#475569;margin-top:8px}.small{font-size:15px;color:#64748b;line-height:1.6}
</style></head><body>
<header>
  <h1>👂 聞（き）く練習（れんしゅう）</h1>
  <div class="sub">問題（もんだい）はランダムに出（で）ます。正解（せいかい）判定（はんてい）を修正（しゅうせい）済（ず）みです。</div>
</header>
<main>
<section class="card">
  <div class="status">カテゴリ：<span id="cat">-</span>　問題（もんだい）：<span id="num">0</span> / <span id="total">10</span>　正解（せいかい）：<span id="score">0</span></div>
  <div id="scene" class="big">スタートしてね</div>
  <div id="choices" class="choices"></div>
  <div id="msg" class="big"></div>
  <div id="tip" class="card point hidden"></div>
  <button onclick="start()">スタート</button>
  <button onclick="nextQuestion()">つぎの問題（もんだい）</button>
</section>
<a class="back" href="sst.html">← SSTへ</a>
</main>
<script>
const allQuestions = [{"cat": "聞く練習", "scene": "友（とも）だちが\n「これ使（つか）ってるよ」\nと言（い）いました。\nどうする？", "choices": [{"text": "聞（き）かずに取（と）る", "ok": false}, {"text": "「使（つか）ってるんだね」と言（い）う", "ok": true}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "「そっか、使（つか）ってるんだね」\n「終（お）わったら貸（か）して」\nと言（い）ってみよう。"}, {"cat": "聞く練習", "scene": "先生（せんせい）が\n説明（せつめい）しています。\nどうする？", "choices": [{"text": "最後（さいご）まで聞（き）く", "ok": true}, {"text": "大（おお）きな声（こえ）で話（はな）す", "ok": false}, {"text": "友（とも）だちを押（お）す", "ok": false}, {"text": "ちがう場所（ばしょ）へ行（い）く", "ok": false}], "tip": "まず最後（さいご）まで聞（き）く。\nわからない時（とき）は\n「もう一回（いっかい）教（おし）えて」と言（い）おう。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n困（こま）った顔（かお）をしています。\nどうする？", "choices": [{"text": "「どうしたの？」と聞（き）く", "ok": true}, {"text": "笑（わら）う", "ok": false}, {"text": "決（き）めつける", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "「どうしたの？」\n「何（なに）がいやだった？」\nと聞（き）いてみよう。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n話（はなし）をしている途中（とちゅう）です。\nどうする？", "choices": [{"text": "最後（さいご）まで聞（き）く", "ok": true}, {"text": "話（はなし）をさえぎる", "ok": false}, {"text": "別（べつ）の話（はなし）をする", "ok": false}, {"text": "立（た）ち去（さ）る", "ok": false}], "tip": "相手（あいて）の話（はなし）は\n最後（さいご）まで聞（き）くと\n安心（あんしん）してもらえます。"}, {"cat": "聞く練習", "scene": "ルールを聞（き）いたけど\nよくわかりません。\nどうする？", "choices": [{"text": "「もう一回（いっかい）教（おし）えて」と言（い）う", "ok": true}, {"text": "わかったふりをする", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "やめる", "ok": false}], "tip": "わからない時（とき）は\n聞（き）き直（なお）してOKです。"}, {"cat": "聞く練習", "scene": "先生（せんせい）が\n「順番（じゅんばん）に並（なら）んでね」\nと言（い）いました。", "choices": [{"text": "後（うし）ろに並（なら）ぶ", "ok": true}, {"text": "前（まえ）に入（はい）る", "ok": false}, {"text": "走（はし）る", "ok": false}, {"text": "友（とも）だちを押（お）す", "ok": false}], "tip": "言（い）われたことを聞（き）いて\n行動（こうどう）できたら大成功（だいせいこう）。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n「やめて」と言（い）いました。", "choices": [{"text": "すぐやめる", "ok": true}, {"text": "もっとやる", "ok": false}, {"text": "笑（わら）う", "ok": false}, {"text": "聞（き）こえないふり", "ok": false}], "tip": "「やめて」は大切（たいせつ）な言葉（ことば）。\n聞（き）けたらすてきです。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n小（ちい）さい声（こえ）で話（はな）しました。", "choices": [{"text": "「もう一回（いっかい）言（い）って」と聞（き）く", "ok": true}, {"text": "無視（むし）する", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "まねする", "ok": false}], "tip": "聞（き）こえなかった時（とき）は\nやさしく聞（き）き返（かえ）そう。"}, {"cat": "聞く練習", "scene": "先生（せんせい）が\n「危（あぶ）ないから止（と）まって」\nと言（い）いました。", "choices": [{"text": "止（と）まる", "ok": true}, {"text": "走（はし）り続（つづ）ける", "ok": false}, {"text": "ジャンプする", "ok": false}, {"text": "ふざける", "ok": false}], "tip": "危（あぶ）ない時（とき）は\nすぐ止（と）まることが大切（たいせつ）です。"}, {"cat": "聞く練習", "scene": "友（とも）だちの話（はなし）が\n長（なが）いです。", "choices": [{"text": "うなずいて聞（き）く", "ok": true}, {"text": "途中（とちゅう）で怒（おこ）る", "ok": false}, {"text": "ばかにする", "ok": false}, {"text": "いなくなる", "ok": false}], "tip": "長（なが）い話（はなし）でも\nうなずくと「聞（き）いてるよ」が伝（つた）わります。"}, {"cat": "聞く練習", "scene": "「片付（かたづ）けよう」と言（い）われました。", "choices": [{"text": "使（つか）った物（もの）を戻（もど）す", "ok": true}, {"text": "まだ遊（あそ）ぶ", "ok": false}, {"text": "投（な）げる", "ok": false}, {"text": "隠（かく）す", "ok": false}], "tip": "片付（かたづ）けは\n次（つぎ）に遊（あそ）ぶ人（ひと）のためにも大切（たいせつ）。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n「一緒（いっしょ）にやろう」\nと言（い）いました。", "choices": [{"text": "「いいよ」と返事（へんじ）する", "ok": true}, {"text": "無視（むし）する", "ok": false}, {"text": "押（お）す", "ok": false}, {"text": "怒（おこ）る", "ok": false}], "tip": "誘（さそ）われた時（とき）は\n返事（へんじ）をすると気持（きも）ちが伝（つた）わります。"}, {"cat": "聞く練習", "scene": "先生（せんせい）が\n名前（なまえ）を呼（よ）びました。", "choices": [{"text": "返事（へんじ）をする", "ok": true}, {"text": "隠（かく）れる", "ok": false}, {"text": "友（とも）だちを呼（よ）ぶ", "ok": false}, {"text": "走（はし）る", "ok": false}], "tip": "呼（よ）ばれたら\n「はい」と返事（へんじ）できると良（よ）いです。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n「痛（いた）い」と言（い）いました。", "choices": [{"text": "「大丈夫（だいじょうぶ）？」と聞（き）く", "ok": true}, {"text": "笑（わら）う", "ok": false}, {"text": "もっと押（お）す", "ok": false}, {"text": "知らんぷり", "ok": false}], "tip": "相手（あいて）の言葉（ことば）を聞（き）いて\n心配（しんぱい）できるとすてきです。"}, {"cat": "聞く練習", "scene": "活動（かつどう）のルールを\n先生（せんせい）が話（はな）しています。", "choices": [{"text": "手（て）を止（と）めて聞（き）く", "ok": true}, {"text": "遊（あそ）び続（つづ）ける", "ok": false}, {"text": "大声（おおごえ）を出（だ）す", "ok": false}, {"text": "寝（ね）る", "ok": false}], "tip": "聞（き）く時（とき）は\n体（からだ）も少（すこ）し止（と）めると聞（き）きやすいです。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n「それはいやだ」と言（い）いました。", "choices": [{"text": "やめる", "ok": true}, {"text": "もっとする", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "からかう", "ok": false}], "tip": "いやな気持（きも）ちを聞（き）けたら\n遊（あそ）びを直（なお）せます。"}, {"cat": "聞く練習", "scene": "先生（せんせい）が\n「待（ま）ってね」と言（い）いました。", "choices": [{"text": "待（ま）つ", "ok": true}, {"text": "走（はし）る", "ok": false}, {"text": "割（わ）り込（こ）む", "ok": false}, {"text": "泣（な）くだけ", "ok": false}], "tip": "待（ま）てたことも\n大切（たいせつ）な力（ちから）です。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n「まだ使（つか）いたい」と言（い）いました。", "choices": [{"text": "「終（お）わったら貸（か）して」と言（い）う", "ok": true}, {"text": "取（と）る", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "隠（かく）す", "ok": false}], "tip": "相手（あいて）の話（はなし）を聞（き）いて\n次（つぎ）の約束（やくそく）をしよう。"}, {"cat": "聞く練習", "scene": "先生（せんせい）が\n「ここは歩（ある）こう」と言（い）いました。", "choices": [{"text": "歩（ある）く", "ok": true}, {"text": "走（はし）る", "ok": false}, {"text": "ジャンプする", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "場所（ばしょ）に合（あ）わせて動（うご）けると安全（あんぜん）です。"}, {"cat": "聞く練習", "scene": "友（とも）だちが\n説明（せつめい）してくれています。", "choices": [{"text": "最後（さいご）まで聞（き）く", "ok": true}, {"text": "途中（とちゅう）で笑（わら）う", "ok": false}, {"text": "別（べつ）の話（はなし）をする", "ok": false}, {"text": "背中（せなか）を向（む）ける", "ok": false}], "tip": "聞（き）く姿勢（しせい）は\n相手（あいて）へのやさしさです。"}];
let deck = [];
let index = 0;
let score = 0;
let answered = false;
const total = Math.min(10, allQuestions.length);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function start() {
  deck = shuffle(allQuestions).slice(0, total);
  index = 0;
  score = 0;
  answered = false;
  document.getElementById("score").textContent = score;
  document.getElementById("total").textContent = total;
  show();
}

function show() {
  answered = false;
  document.getElementById("msg").textContent = "";
  document.getElementById("tip").classList.add("hidden");

  if (index >= deck.length) {
    document.getElementById("cat").textContent = "-";
    document.getElementById("num").textContent = total;
    document.getElementById("scene").textContent = "おしまい！\n" + score + " / " + total + " 問（もん）できました ⭐";
    document.getElementById("choices").innerHTML = "";
    document.getElementById("tip").classList.remove("hidden");
    document.getElementById("tip").innerHTML = '<div class="title">今日（きょう）のポイント</div><div class="tip">できた・できないより、「考（かんが）えた」「戻（もど）れた」「言葉（ことば）を選（えら）べた」ことが大切（たいせつ）です。</div>';
    return;
  }

  const q = deck[index];
  document.getElementById("cat").textContent = q.cat;
  document.getElementById("num").textContent = index + 1;
  document.getElementById("scene").textContent = q.scene;
  document.getElementById("choices").innerHTML = "";

  shuffle(q.choices).forEach(item => {
    const div = document.createElement("div");
    div.className = "choice";
    div.textContent = item.text;
    div.onclick = () => answer(item.ok, q.tip);
    document.getElementById("choices").appendChild(div);
  });
}

function answer(ok, tip) {
  if (answered) return;
  answered = true;

  if (ok) {
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("msg").innerHTML = '<span class="ok">いい選（えら）び方（かた）！</span>';
  } else {
    document.getElementById("msg").innerHTML = '<span class="ng">もう一回（いっかい）考（かんが）えよう</span>';
  }

  document.getElementById("tip").classList.remove("hidden");
  document.getElementById("tip").innerHTML = '<div class="title">練習（れんしゅう）ことば</div><div class="tip">' + tip + '</div>';

  setTimeout(() => {
    index++;
    show();
  }, 1700);
}

function nextQuestion() {
  if (deck.length === 0) start();
  else {
    index++;
    show();
  }
}
</script>
</body></html>
