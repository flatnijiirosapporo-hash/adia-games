<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>🗣️ 伝（つた）える練習（れんしゅう）</title><style>
body{margin:0;font-family:system-ui,sans-serif;background:#f8fafc;color:#1f2937;text-align:center;user-select:none}
header{background:white;padding:24px 16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1{margin:0 0 8px;font-size:32px}.sub{font-size:17px;color:#64748b;line-height:1.6}
main{max-width:760px;margin:0 auto;padding:20px}.grid{display:grid;gap:14px}
.card{background:white;border-radius:26px;padding:20px;text-align:left;box-shadow:0 5px 14px rgba(0,0,0,.12);border:5px solid white}
a{text-decoration:none;color:inherit}.title{font-size:24px;font-weight:800;margin-bottom:6px}.desc{font-size:16px;color:#475569;line-height:1.55}
button{font-size:22px;padding:12px 26px;border:0;border-radius:999px;background:#2563eb;color:white;font-weight:700;margin:6px;cursor:pointer}
.choice{background:white;border:5px solid #dbeafe;border-radius:24px;padding:20px 10px;font-size:23px;font-weight:800;box-shadow:0 3px 9px rgba(0,0,0,.12);cursor:pointer;line-height:1.55}
.choices{display:grid;grid-template-columns:repeat(1,1fr);gap:14px;margin-top:16px}.big{font-size:30px;font-weight:800;margin:20px 0;line-height:1.6;white-space:pre-line}
.hidden{display:none}.back{display:inline-block;margin-top:16px;color:#2563eb;font-weight:700}.ok{color:#16a34a}.ng{color:#dc2626}
.point{background:#ecfdf5;border-color:#bbf7d0}.tip{font-size:18px;line-height:1.8;color:#334155;white-space:pre-line}
.status{font-size:18px;color:#475569;margin-top:8px}.small{font-size:15px;color:#64748b;line-height:1.6}
</style></head><body>
<header>
  <h1>🗣️ 伝（つた）える練習（れんしゅう）</h1>
  <div class="sub">問題（もんだい）はランダムに出（で）ます。正解（せいかい）判定（はんてい）を修正（しゅうせい）済（ず）みです。</div>
</header>
<main>
<section class="card">
  <div class="status">カテゴリ：<span id="cat">-</span>　問題（もんだい）：<span id="num">0</span> / <span id="total">10</span>　正解（せいかい）：<span id="score">0</span></div>
  <div id="scene" class="big">スタートしてね</div>
  <div id="choices" class="choices"></div>
  <div id="msg" class="big"></div>
  <div id="tip" class="card point hidden"></div>
  <button onclick="start()">スタート</button>
  <button onclick="nextQuestion()">つぎの問題（もんだい）</button>
</section>
<a class="back" href="sst.html">← SSTへ</a>
</main>
<script>
const allQuestions = [{"cat": "伝える練習", "scene": "おもちゃを貸（か）してほしい。\nどう言（い）う？", "choices": [{"text": "「貸（か）して」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "「終（お）わったら貸（か）して」と言（い）えるとOK。"}, {"cat": "伝える練習", "scene": "遊（あそ）びに入（はい）りたい。\nどう言（い）う？", "choices": [{"text": "「入（い）れて」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "「一緒（いっしょ）に遊（あそ）んでいい？」も使（つか）えます。"}, {"cat": "伝える練習", "scene": "いやなことをされた。\nどう言（い）う？", "choices": [{"text": "「やめて」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "「やめて」「いやだった」と言葉（ことば）で伝（つた）えよう。"}, {"cat": "伝える練習", "scene": "困（こま）っている。\nどう言（い）う？", "choices": [{"text": "「手伝（てつだ）って」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "困（こま）った時（とき）は助（たす）けを求（もと）めてOK。"}, {"cat": "伝える練習", "scene": "順番（じゅんばん）を待（ま）っている。\nどう言（い）う？", "choices": [{"text": "「次（つぎ）はぼく？」と聞（き）く", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "確認（かくにん）すると安心（あんしん）できます。"}, {"cat": "伝える練習", "scene": "使（つか）い方（かた）がわからない。\nどう言（い）う？", "choices": [{"text": "「教（おし）えて」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "わからないことは聞（き）いて大丈夫（だいじょうぶ）。"}, {"cat": "伝える練習", "scene": "友（とも）だちにぶつかった。\nどう言（い）う？", "choices": [{"text": "「ごめんね」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "ぶつかった時（とき）は「ごめんね」「大丈夫（だいじょうぶ）？」。"}, {"cat": "伝える練習", "scene": "もう一回（いっかい）やりたい。\nどう言（い）う？", "choices": [{"text": "「もう一回（いっかい）やっていい？」と聞（き）く", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "お願い（ねが）いは言葉（ことば）にすると伝（つた）わります。"}, {"cat": "伝える練習", "scene": "休（やす）みたい。\nどう言（い）う？", "choices": [{"text": "「少（すこ）し休（やす）みたい」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "体（からだ）のことを伝（つた）えるのは大切（たいせつ）。"}, {"cat": "伝える練習", "scene": "うまくできなくて悔（くや）しい。\nどう言（い）う？", "choices": [{"text": "「悔（くや）しい」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "気持（きも）ちを言葉（ことば）にできたら大成功（だいせいこう）。"}, {"cat": "伝える練習", "scene": "静（しず）かにしてほしい。\nどう言（い）う？", "choices": [{"text": "「少（すこ）し静（しず）かにして」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "やさしい声（こえ）で伝（つた）えよう。"}, {"cat": "伝える練習", "scene": "一人（ひとり）でやりたい。\nどう言（い）う？", "choices": [{"text": "「今（いま）は一人（ひとり）でやりたい」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "自分（じぶん）の気持（きも）ちを伝（つた）えてOK。"}, {"cat": "伝える練習", "scene": "一緒（いっしょ）にやりたい。\nどう言（い）う？", "choices": [{"text": "「一緒（いっしょ）にやろう」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "誘（さそ）う言葉（ことば）を使（つか）おう。"}, {"cat": "伝える練習", "scene": "負（ま）けて悲（かな）しい。\nどう言（い）う？", "choices": [{"text": "「悲（かな）しい」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "泣（な）いてもOK。言葉（ことば）にすると伝（つた）わります。"}, {"cat": "伝える練習", "scene": "違（ちが）う遊（あそ）びがしたい。\nどう言（い）う？", "choices": [{"text": "「別（べつ）の遊（あそ）びがしたい」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "提案（ていあん）できると話（はな）し合（あ）えます。"}, {"cat": "伝える練習", "scene": "順番（じゅんばん）を抜（ぬ）かされた。\nどう言（い）う？", "choices": [{"text": "「並（なら）んでいたよ」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "怒（おこ）る前（まえ）に言葉（ことば）で伝（つた）えよう。"}, {"cat": "伝える練習", "scene": "物（もの）を取（と）られた。\nどう言（い）う？", "choices": [{"text": "「返（かえ）して」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "短（みじか）く、はっきり伝（つた）えよう。"}, {"cat": "伝える練習", "scene": "怖（こわ）いと感（かん）じた。\nどう言（い）う？", "choices": [{"text": "「怖（こわ）い」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "怖（こわ）い気持（きも）ちも大切（たいせつ）です。"}, {"cat": "伝える練習", "scene": "わからなくなった。\nどう言（い）う？", "choices": [{"text": "「わからない」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "わからないと言（い）えることは大切（たいせつ）。"}, {"cat": "伝える練習", "scene": "ありがとうを伝（つた）えたい。\nどう言（い）う？", "choices": [{"text": "「ありがとう」と言（い）う", "ok": true}, {"text": "黙（だま）って取（と）る", "ok": false}, {"text": "怒（おこ）る", "ok": false}, {"text": "走（はし）って逃（に）げる", "ok": false}], "tip": "感謝（かんしゃ）の言葉（ことば）は相手（あいて）をうれしくします。"}];
let deck = [];
let index = 0;
let score = 0;
let answered = false;
const total = Math.min(10, allQuestions.length);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function start() {
  deck = shuffle(allQuestions).slice(0, total);
  index = 0;
  score = 0;
  answered = false;
  document.getElementById("score").textContent = score;
  document.getElementById("total").textContent = total;
  show();
}

function show() {
  answered = false;
  document.getElementById("msg").textContent = "";
  document.getElementById("tip").classList.add("hidden");

  if (index >= deck.length) {
    document.getElementById("cat").textContent = "-";
    document.getElementById("num").textContent = total;
    document.getElementById("scene").textContent = "おしまい！\n" + score + " / " + total + " 問（もん）できました ⭐";
    document.getElementById("choices").innerHTML = "";
    document.getElementById("tip").classList.remove("hidden");
    document.getElementById("tip").innerHTML = '<div class="title">今日（きょう）のポイント</div><div class="tip">できた・できないより、「考（かんが）えた」「戻（もど）れた」「言葉（ことば）を選（えら）べた」ことが大切（たいせつ）です。</div>';
    return;
  }

  const q = deck[index];
  document.getElementById("cat").textContent = q.cat;
  document.getElementById("num").textContent = index + 1;
  document.getElementById("scene").textContent = q.scene;
  document.getElementById("choices").innerHTML = "";

  shuffle(q.choices).forEach(item => {
    const div = document.createElement("div");
    div.className = "choice";
    div.textContent = item.text;
    div.onclick = () => answer(item.ok, q.tip);
    document.getElementById("choices").appendChild(div);
  });
}

function answer(ok, tip) {
  if (answered) return;
  answered = true;

  if (ok) {
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("msg").innerHTML = '<span class="ok">いい選（えら）び方（かた）！</span>';
  } else {
    document.getElementById("msg").innerHTML = '<span class="ng">もう一回（いっかい）考（かんが）えよう</span>';
  }

  document.getElementById("tip").classList.remove("hidden");
  document.getElementById("tip").innerHTML = '<div class="title">練習（れんしゅう）ことば</div><div class="tip">' + tip + '</div>';

  setTimeout(() => {
    index++;
    show();
  }, 1700);
}

function nextQuestion() {
  if (deck.length === 0) start();
  else {
    index++;
    show();
  }
}
</script>
</body></html>
