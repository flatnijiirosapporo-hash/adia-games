let deck = [];
let index = 0;
let score = 0;
let answered = false;
let currentText = "";
let wrongAnswers = [];
const total = Math.min(10, allQuestions.length);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function start() {
  deck = shuffle(allQuestions).slice(0, total);
  index = 0;
  score = 0;
  wrongAnswers = [];
  document.getElementById("score").textContent = score;
  document.getElementById("total").textContent = total;
  document.getElementById("report").classList.add("hidden");
  document.getElementById("report").innerHTML = "";
  show();
}

function show() {
  answered = false;
  document.getElementById("msg").textContent = "";
  document.getElementById("tip").classList.add("hidden");
  document.getElementById("report").classList.add("hidden");

  if (index >= deck.length) {
    document.getElementById("num").textContent = total;
    document.getElementById("cat").textContent = "";
    document.getElementById("illust").textContent = "⭐";
    document.getElementById("scene").textContent = "おしまい！\n" + score + " / " + total + " 問（もん）できました";
    document.getElementById("choices").innerHTML = "";
    currentText = document.getElementById("scene").textContent;
    showReport();
    return;
  }

  const q = deck[index];
  document.getElementById("num").textContent = index + 1;
  document.getElementById("cat").textContent = q.cat || "";
  document.getElementById("illust").textContent = q.illust || "🌈";
  document.getElementById("scene").textContent = q.scene;
  currentText = q.scene.replace(/[（）]/g, " ");
  document.getElementById("choices").innerHTML = "";

  shuffle(q.choices).forEach(item => {
    const div = document.createElement("div");
    div.className = "choice";
    div.textContent = item.text;
    div.onclick = () => answer(item.ok, q.tip, item.text);
    document.getElementById("choices").appendChild(div);
  });
}

function answer(ok, tip, selectedText) {
  if (answered) return;
  answered = true;

  if (ok) {
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("msg").innerHTML = '<span class="ok">いい選（えら）び方（かた）！</span>';
  } else {
    document.getElementById("msg").innerHTML = '<span class="ng">もう一回（いっかい）考（かんが）えよう</span>';
    const q = deck[index];
    const correct = q.choices.find(c => c.ok);
    wrongAnswers.push({
      cat: q.cat || "",
      illust: q.illust || "",
      scene: q.scene || "",
      selected: selectedText || "",
      correct: correct ? correct.text : "",
      tip: tip || ""
    });
  }

  document.getElementById("tip").classList.remove("hidden");
  document.getElementById("tip").innerHTML = '<div class="title">ポイント</div><div class="tip">' + tip + '</div>';

  setTimeout(() => {
    index++;
    show();
  }, 1800);
}

function nextQuestion() {
  if (deck.length === 0) start();
  else {
    index++;
    show();
  }
}


function showReport() {
  const report = document.getElementById("report");
  report.classList.remove("hidden");

  if (wrongAnswers.length === 0) {
    report.innerHTML =
      '<div class="reportTitle">ふりかえり</div>' +
      '<div class="tip">不正解（ふせいかい）はありませんでした。<br>よく考（かんが）えて選（えら）べました。</div>' +
      '<button class="printBtn" onclick="window.print()">印刷（いんさつ）する</button>';
    return;
  }

  let html = '<div class="reportTitle">ふりかえりレポート</div>';
  html += '<div class="tip">まちがえた問題（もんだい）だけを表示（ひょうじ）しています。<br>責（せ）めるためではなく、次（つぎ）にもう一回（いっかい）考（かんが）えるためのレポートです。</div>';

  wrongAnswers.forEach((w, i) => {
    html += '<div class="reportItem">';
    html += '<div><strong>' + (i + 1) + '. ' + escapeHtml(w.cat) + '</strong></div>';
    html += '<div style="font-size:48px;text-align:center;margin:6px 0;">' + escapeHtml(w.illust) + '</div>';
    html += '<div>' + escapeHtml(w.scene).replace(/\n/g, '<br>') + '</div>';
    html += '<div class="wrongText">選（えら）んだ答（こた）え：' + escapeHtml(w.selected) + '</div>';
    html += '<div class="correctText">よい答（こた）え：' + escapeHtml(w.correct) + '</div>';
    html += '<div>ポイント：' + escapeHtml(w.tip).replace(/\n/g, '<br>') + '</div>';
    html += '</div>';
  });

  html += '<button class="printBtn" onclick="window.print()">印刷（いんさつ）する</button>';
  report.innerHTML = html;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function speakScene() {
  if (!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(currentText || document.getElementById("scene").textContent);
  u.lang = "ja-JP";
  u.rate = 0.8;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}
