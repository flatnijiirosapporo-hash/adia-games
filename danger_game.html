<title>危険予知トレーニング</title>
<style>

.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0}

.hero{padding:30px 0 16px}

.scoreLiveHide{display:none!important}

.liveResultHide{display:none!important}

  ruby-position:over;
}

<body>
<div class="top"><div class="wrap nav"><a href="index.html">← TOP</a><span class="pill">にじフラ Ver.2.2</span></div></div>
<main class="wrap">
<section class="panel">
  <div class="status">
    <span class="badge">危険予知トレーニング</span>
    <span class="badge">問題 <span id="num">0</span>/10</span>
    <span class="badge liveResultHide">ミス <span id="miss">0</span></span>
  </div>
  <div class="illust">⚠️</div>
  <h1 style="text-align:center">危険予知トレーニング</h1>
  <p class="lead" style="text-align:center">100問の中から、毎回ちがう問題が出ます。</p>
  <div class="dangerCount">準備問題数：100問</div>
  <div id="scene" class="scene">スタートを押してね</div>
  <div class="actions">
    <button type="button" onclick="start()">はじめる</button>
    <button type="button" class="light" onclick="readQ()">🔊 よみあげ</button>
  </div>
  <div id="choices" class="choices"></div>
  <div id="msg" class="message"></div>
  <div id="tip" class="tip hidden"></div>
  <div id="report" class="report hidden"></div>
</section>
</main>
<footer class="footer">安心の中で挑戦し、挑戦の中で成長する</footer>

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function esc(s){
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function escapeRegExp(s){
  return String(s).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

  }
  html = html.replace(/[一-龯々〆ヶ]+/g, function(word){
    if(word.includes("<ruby")) return word;
    return `<ruby class="autoRuby">${word}<rt>よみ</rt></ruby>`;
  });
  return html.replaceAll("\n","<br>");
}
function setRuby(id,text){
  const el=document.getElementById(id);
  if(el) el.innerHTML = rubyKanjiOnly(text);
}
function stripFurigana(text){
  return String(text ?? "").replace(/<[^>]*>/g,"").replace(/\n/g,"。");
}
function speakText(text){
  if(!("speechSynthesis" in window))return;
  const u=new SpeechSynthesisUtterance(stripFurigana(text));
  u.lang="ja-JP";u.rate=.82;
  speechSynthesis.cancel();speechSynthesis.speak(u);
}
function makeUniqueDeck(){
  const seen = new Set();
  const unique = [];
  shuffle(DATA).forEach(q=>{
    const key = String(q[0] || "").trim();
    if(!seen.has(key)){
      seen.add(key);
      unique.push(q);
    }
  });
  return unique.slice(0,10);
}

function start(){
  deck = makeUniqueDeck();
  index=0; miss=0; correct=0; done=[];
  document.getElementById("miss").textContent=miss;
  document.getElementById("report").classList.add("hidden");
  document.getElementById("report").innerHTML="";
  show();
}

function show(){
  answered=false;
  document.getElementById("msg").textContent="";
  document.getElementById("tip").classList.add("hidden");
  document.getElementById("tip").innerHTML="";
  if(index>=deck.length){ finish(); return; }

  const q=deck[index];
  current=q[0];
  document.getElementById("num").textContent=index+1;
  setRuby("scene", q[0]);

  const box=document.getElementById("choices");
  box.innerHTML="";
  const correctText=q[1];
  const choices=shuffle([q[1],...q[2]]);
  choices.forEach(text=>{
    const d=document.createElement("div");
    d.className="choice";
    d.innerHTML=rubyKanjiOnly(text);
    d.onclick=()=>answer(text===correctText, text, d, q);
    box.appendChild(d);
  });
}

function answer(ok, selected, el, q){
  if(answered)return;
  answered=true;
  document.querySelectorAll(".choice").forEach(x=>x.style.pointerEvents="none");

  if(ok){
    correct++;
    el.classList.add("correct");
    document.getElementById("msg").innerHTML='<span class="ok">いいね！</span>';
  }else{
    miss++;
    document.getElementById("miss").textContent=miss;
    el.classList.add("wrong");
    document.getElementById("msg").innerHTML='<span class="ng">確認しよう</span>';
  }

  done.push({no:index+1,scene:q[0],selected:selected,correct:q[1],ok:ok,point:q[3]});

  document.getElementById("tip").classList.remove("hidden");
  document.getElementById("tip").innerHTML='<b>'+rubyKanjiOnly("ポイント")+'</b><br>'+rubyKanjiOnly(q[3]);

  setTimeout(()=>{index++;show();},1200);
}

function finish(){
  setRuby("scene","おしまい");
  document.getElementById("choices").innerHTML="";
  document.getElementById("tip").classList.add("hidden");
  document.getElementById("msg").innerHTML='<span class="ok">最後まで取り組めました</span>';

  let h='<h2>'+rubyKanjiOnly("危険予知トレーニング レポート")+'</h2>';
  h+='<p><b>'+rubyKanjiOnly("取り組んだ問題：")+'</b>'+done.length+'問</p>';
  h+='<p><b>'+rubyKanjiOnly("よく選べた数：")+'</b>'+correct+'問</p>';
  h+='<p><b>'+rubyKanjiOnly("確認したい数：")+'</b>'+miss+'問</p>';
  h+='<h3>'+rubyKanjiOnly("取り組んだ問題")+'</h3>';

  done.forEach(item=>{
    h+='<div class="reportItem">';
    h+='<b>'+item.no+'. '+rubyKanjiOnly(item.scene)+'</b>';
    h+='<p><b>'+rubyKanjiOnly("選んだ答え：")+'</b>'+rubyKanjiOnly(item.selected)+' '+(item.ok?'<span class="ok">○</span>':'<span class="ng">△</span>')+'</p>';
    h+='<p><b>'+rubyKanjiOnly("よい答え：")+'</b>'+rubyKanjiOnly(item.correct)+'</p>';
    h+='<p><b>'+rubyKanjiOnly("ポイント：")+'</b>'+rubyKanjiOnly(item.point)+'</p>';
    h+='</div>';
  });

  const report=document.getElementById("report");
  report.innerHTML=h;
  report.classList.remove("hidden");
}

function readQ(){ speakText(current || document.getElementById("scene").textContent); }

// 初期表示にもふりがな
document.addEventListener("DOMContentLoaded",()=>{
  setRuby("scene","スタートを押してね");
});
</script>
