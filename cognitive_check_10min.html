<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>10分チェック</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,'Yu Gothic','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}
a{text-decoration:none;color:inherit}
.wrap{width:min(980px,92vw);margin:0 auto}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0}
.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-weight:900}
.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}
.hero{padding:30px 0 16px}
.brand{display:inline-block;background:#fff;border-radius:999px;padding:8px 16px;box-shadow:0 8px 25px rgba(30,41,59,.08);font-weight:900}
h1{font-size:clamp(32px,6vw,54px);line-height:1.15;margin:16px 0 8px}
.lead{color:#64748b;font-size:clamp(17px,3vw,22px)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:20px 0 34px}
.card{background:rgba(255,255,255,.95);border-radius:30px;padding:22px;box-shadow:0 15px 45px rgba(30,41,59,.10);border:1px solid rgba(255,255,255,.85)}
.menu{min-height:150px}.icon{font-size:52px}.title{font-size:24px;font-weight:900;margin-bottom:8px}.desc{font-size:16px;color:#64748b}
.panel{background:rgba(255,255,255,.96);border-radius:34px;padding:22px;box-shadow:0 18px 55px rgba(30,41,59,.12);margin:22px 0 38px}
.status{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-weight:800;margin-bottom:12px}
.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}
.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}
.scene{font-size:clamp(24px,5vw,34px);font-weight:900;text-align:center;line-height:1.55;white-space:pre-line;margin:10px 0 18px}
.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
button{border:0;border-radius:999px;padding:13px 22px;font-size:20px;font-weight:900;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;box-shadow:0 10px 25px rgba(79,70,229,.22);cursor:pointer}
button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}
button.gray{background:#64748b}
.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}
.correct{border-color:#86efac!important;background:#f0fdf4!important}.wrong{border-color:#fca5a5!important;background:#fef2f2!important}
.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}
.tip,.report{margin-top:14px;border-radius:26px;padding:18px;background:#f8fafc;border:2px solid #e2e8f0}.tip{background:#ecfdf5;border-color:#bbf7d0}.report{background:#fff7ed;border-color:#fed7aa}
.reportItem{background:#fff;border:3px solid #fed7aa;border-radius:22px;padding:16px;margin:14px 0}
.hidden{display:none!important}
.footer{text-align:center;color:#64748b;padding:22px}
.shape{width:90px;height:90px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;border:5px solid #fff;box-shadow:0 8px 20px rgba(30,41,59,.12)}
.red{background:#ef4444}.blue{background:#3b82f6}.yellow{background:#facc15}.green{background:#22c55e}.purple{background:#a855f7}.orange{background:#fb923c}
@media(min-width:720px){.choices{grid-template-columns:1fr 1fr}.panel{padding:30px}}

.timerBarWrap{height:18px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:10px 0 18px}
.timerBar{height:100%;width:100%;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);transition:width .2s linear}
.reportScreen{background:#fff;border-radius:34px;padding:26px;box-shadow:0 18px 55px rgba(30,41,59,.12);margin:22px 0 38px}
.indexGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.scoreCard{background:#f8fafc;border:2px solid #e2e8f0;border-radius:22px;padding:16px}
.scoreNum{font-size:36px;font-weight:1000}
.levelGood{color:#16a34a}.levelMid{color:#ca8a04}.levelCare{color:#dc2626}
.subLabel{font-size:14px;color:#64748b;font-weight:900}
@media print{.top,.noPrint,.actions button{display:none!important}body{background:#fff}.reportScreen{box-shadow:none;margin:0}}

.scoreLiveHide{display:none!important}

.liveResultHide{display:none!important}

.questionHiddenHalf{
  opacity:0!important;
  visibility:hidden!important;

.questionHiddenNotice{
  text-align:center;
  font-weight:1000;
  color:#dc2626;
  background:#fff7ed;
  border:3px solid #fed7aa;
  border-radius:18px;
  padding:10px;
  margin:10px 0;
}



/* ===== Ver.1.1 automatic furigana ===== */
ruby.autoRuby{
  ruby-position:over;
}
ruby.autoRuby rt{
  font-size:.55em;
  line-height:1;
  color:#475569;

  }
  ruby.autoRuby{

  }

.themeText{
  margin:12px auto 0;
  color:#334155;
  font-weight:1000;
  font-size:clamp(17px,2.5vw,22px);
  text-align:center;
}

</div>
<div class="choices" id="choices"></div>
<div class="message" id="msg"></div>
<div class="tip hidden" id="tip"></div>
</section>
<section class="reportScreen hidden" id="reportScreen"></section>
</main>
<script>
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function stripFurigana(text){return String(text).replace(/([一-龯々〆ヶ]+)（[ぁ-んァ-ンー]+）/g,"$1").replace(/（[ぁ-んァ-ンー]+）/g,"").replace(/\n/g,"。")}
function speakText(text){if(!("speechSynthesis" in window))return;const u=new SpeechSynthesisUtterance(stripFurigana(text));u.lang="ja-JP";u.rate=.82;speechSynthesis.cancel();speechSynthesis.speak(u)}
</script>

function start(){
  clearTimers();
  deck=[];
  indices.forEach(idx=>{
    deck=deck.concat(shuffle(DATA.filter(q=>q.idx===idx)).slice(0,6));
  });
  deck=shuffle(deck);
  i=0;score=0;wrong=[];answered=false;result={};
  indices.forEach(idx=>result[idx]={ok:0,total:0,timeout:0,subs:{}});
  document.getElementById("score").textContent=score;
  document.getElementById("gameScreen").classList.remove("hidden");
  document.getElementById("reportScreen").classList.add("hidden");
  document.getElementById("reportScreen").innerHTML="";
  show();
}

function clearTimers(){clearTimeout(qTimer);clearInterval(tickTimer);}

function show(){
  clearTimers();
  answered=false;
  document.getElementById("msg").textContent="";
  document.getElementById("tip").classList.add("hidden");
  if(i>=deck.length){finish();return;}
  const q=deck[i];
  current=q.scene;
  document.getElementById("num").textContent=i+1;
  document.getElementById("cat").textContent=q.idx;
  document.getElementById("sub").textContent="下位カテゴリ："+q.sub;
  document.getElementById("illust").textContent=q.illust;
  document.getElementById("scene").classList.remove("questionHiddenHalf");
  document.getElementById("scene").textContent=q.scene;
  const hideNotice=document.getElementById("hideNotice");
  if(hideNotice)hideNotice.classList.add("hidden");
  const box=document.getElementById("choices");
  box.innerHTML="";
  shuffle(q.choices).forEach(c=>{
    let d=document.createElement("div");
    d.className="choice";
    d.textContent=c.text;
    d.onclick=()=>answer(c,d);
    box.appendChild(d);
  });
  startQuestionTimer(q.seconds||9);
}

function ensureSub(q){
  if(!result[q.idx].subs[q.sub])result[q.idx].subs[q.sub]={ok:0,total:0,timeout:0};
}

function startQuestionTimer(sec){
  totalTime=sec;timeLeft=sec;
  const sceneEl=document.getElementById("scene");
  const noticeEl=document.getElementById("hideNotice");
  if(sceneEl)sceneEl.classList.remove("questionHiddenHalf");
  if(noticeEl)noticeEl.classList.add("hidden");
  updateTimerBar();

  tickTimer=setInterval(()=>{
    timeLeft-=0.2;
    if(timeLeft<0)timeLeft=0;

    if(timeLeft <= totalTime/2){
      if(sceneEl)sceneEl.classList.add("questionHiddenHalf");
      if(noticeEl)noticeEl.classList.remove("hidden");
    }

    updateTimerBar();
  },200);

  qTimer=setTimeout(()=>timeoutQuestion(),sec*1000);
}
function updateTimerBar(){
  document.getElementById("remain").textContent=Math.ceil(timeLeft);
  document.getElementById("timerBar").style.width=Math.max(0,(timeLeft/totalTime)*100)+"%";
}

function timeoutQuestion(){
  if(answered)return;
  answered=true;clearTimers();
  const q=deck[i];ensureSub(q);
  result[q.idx].total++;result[q.idx].timeout++;
  result[q.idx].subs[q.sub].total++;result[q.idx].subs[q.sub].timeout++;
  const good=q.choices.find(x=>x.ok);
  wrong.push({idx:q.idx,sub:q.sub,illust:q.illust,scene:q.scene,selected:"時間切れ",correct:good?good.text:"",tip:q.tip,timeout:true});
  document.querySelectorAll(".choice").forEach(x=>x.style.pointerEvents="none");
  document.getElementById("msg").innerHTML='<span class="ng">時間切れ</span>';
  setTimeout(()=>{i++;show();},850);
}

function answer(c,d){
  if(answered)return;
  answered=true;clearTimers();
  document.querySelectorAll(".choice").forEach(x=>x.style.pointerEvents="none");
  const q=deck[i];ensureSub(q);
  result[q.idx].total++;result[q.idx].subs[q.sub].total++;
  if(c.ok){
    score++;result[q.idx].ok++;result[q.idx].subs[q.sub].ok++;
    document.getElementById("score").textContent=score;
    d.classList.add("correct");
    document.getElementById("msg").innerHTML='<span class="ok">いいね！</span>';
  }else{
    d.classList.add("wrong");
    let good=q.choices.find(x=>x.ok);
    wrong.push({idx:q.idx,sub:q.sub,illust:q.illust,scene:q.scene,selected:c.text,correct:good?good.text:"",tip:q.tip,timeout:false});
    document.getElementById("msg").innerHTML='<span class="ng">もう一回考えよう</span>';
  }
  document.getElementById("tip").classList.remove("hidden");
  document.getElementById("tip").innerHTML='<b>見るポイント</b><br>'+esc(q.tip);
  setTimeout(()=>{i++;show();},1000);
}

function levelClass(ok,total,timeout){
  const p=total?ok/total:0;
  if(p>=0.8 && timeout===0)return ["得意に取り組めています","levelGood"];
  if(p>=0.5)return ["練習中です","levelMid"];
  return ["支援があると安心です","levelCare"];
}

  const p=total?ok/total:0;
  if(idx.includes("VCI")){
    if(p>=0.8)return "言葉の意味・共通点・理由説明に強みが見られます。会話の中で理由を言葉にする活動が伸びやすそうです。";
    if(p>=0.5)return "言葉の意味は理解できる場面があります。絵や具体例を添えると説明しやすくなります。";
    return "言葉だけで考える課題は負荷が高い可能性があります。短い文、選択肢、絵カードで支えると安心です。";
  }
  if(idx.includes("VSI")){
    if(p>=0.8)return "形・向き・並びを見比べる力が出ています。パズルや模様作りにも取り組みやすそうです。";
    if(p>=0.5)return "視覚的な見本があると取り組みやすい様子です。見本を近くに置く支援が有効です。";
    return "形や向きの違いで迷いやすい可能性があります。大きな見本、指差し、少ない選択肢から始めるとよいです。";
  }
  if(idx.includes("FRI")){
    if(p>=0.8)return "規則性や仲間分けに気づく力が見られます。『どうして？』を言葉にする練習も合いそうです。";
    if(p>=0.5)return "きまりに気づける場面があります。例題を1つ見せてから進めると安定しやすいです。";
    return "見えないきまりを推理する課題は負荷が高い可能性があります。具体物や実演で確認するとよいです。";
  }
  if(idx.includes("WMI")){
    if(p>=0.8)return "短い順番を覚えて保持する力が出ています。少しずつ長さを増やす練習ができます。";
    if(p>=0.5)return "短い情報なら保持できる場面があります。復唱、指差し、視覚提示で支えると取り組みやすいです。";
    return "一時的に覚える課題は負荷が高い可能性があります。見える形に残す、短く区切る支援が有効です。";
  }
  if(idx.includes("PSI")){
    if(p>=0.8 && timeout===0)return "見つける速さ、目と手の連動がよく出ています。テンポのある活動に取り組みやすそうです。";
    if(p>=0.5)return "時間内に見つけられる場面があります。焦らず正確さを優先すると安定しそうです。";
    return "時間制限があると焦りやすい可能性があります。時間を長めにして、正確さから練習するとよいです。";
  }
  return "";
}

function totalComment(){
  if(score>=25)return "全体として高い安定感があります。課題理解、注意の切替、選択の正確さがよく出ています。";
  if(score>=18)return "全体として取り組める力が見えています。苦手な指標は、見本提示や時間調整でさらに安定しそうです。";
  if(score>=12)return "得意な領域と負荷が高い領域の差が見えます。支援の入れ方を分けると取り組みやすくなります。";
  return "全体として課題負荷が高かった可能性があります。短時間、少ない選択肢、具体物を使うところから始めると安心です。";
}

function finish(){
  clearTimers();
  document.getElementById("scene").classList.remove("questionHiddenHalf");
  const finishNotice=document.getElementById("hideNotice");
  if(finishNotice)finishNotice.classList.add("hidden");
  document.getElementById("gameScreen").classList.add("hidden");
  const r=document.getElementById("reportScreen");
  r.classList.remove("hidden");
  let h='<h1>10分チェック<br>総合評価レポート</h1>';
  h+='<p class="lead">これは診断ではありません。WISC風の下位検査カテゴリを参考にした療育用の簡易チェックです。</p>';
  h+='<div class="reportItem"><b>総合得点</b><div class="scoreNum">'+score+' / 30</div><p>'+totalComment()+'</p></div>';
  h+='<h2>5指標別の結果</h2><div class="indexGrid">';
  indices.forEach(idx=>{
    const v=result[idx];const lv=levelClass(v.ok,v.total,v.timeout);
    h+='<div class="scoreCard"><b>'+esc(idx)+'</b><div class="scoreNum">'+v.ok+' / '+v.total+'</div><div class="'+lv[1]+'"><b>'+lv[0]+'</b></div><p>'+esc(commentFor(idx,v.ok,v.total,v.timeout))+'</p>';
    if(v.timeout>0)h+='<p class="ng">時間切れ：'+v.timeout+'問</p>';
    h+='<details><summary>下位カテゴリ</summary>';
    Object.keys(v.subs).forEach(s=>{const sub=v.subs[s];h+='<div>'+esc(s)+'：'+sub.ok+' / '+sub.total+(sub.timeout?'（時間切れ '+sub.timeout+'）':'')+'</div>';});
    h+='</details></div>';
  });
  h+='</div>';
  if(wrong.length){
    h+='<h2>まちがえた問題・時間切れの問題</h2>';
    wrong.forEach((w,n)=>{
      h+='<div class="reportItem"><div style="font-size:44px;text-align:center">'+esc(w.illust)+'</div><b>'+(n+1)+'. '+esc(w.idx)+' / '+esc(w.sub)+'</b><div class="scene" style="font-size:22px">'+esc(w.scene).replaceAll("\n","<br>")+'</div><p class="ng"><b>選んだ答え：</b><br>'+esc(w.selected)+'</p><p class="ok"><b>よい答え：</b><br>'+esc(w.correct)+'</p><p><b>見るポイント：</b><br>'+esc(w.tip)+'</p></div>';
    });
  }else{
    h+='<div class="reportItem">まちがえた問題はありませんでした。</div>';
  }
  h+='<div class="actions noPrint"><button onclick="window.print()">印刷</button><button class="light" onclick="start()">もう一回</button><a class="pill" href="index.html">TOPへ</a></div>';
  r.innerHTML=h;
}

function readQ(){speakText(current||document.getElementById("scene").textContent)}
start();
</script>
