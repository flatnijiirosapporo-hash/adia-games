<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>10分チェック</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,'Yu Gothic','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}
a{text-decoration:none;color:inherit}
.wrap{width:min(980px,92vw);margin:0 auto}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0}
.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-weight:900}
.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}
.hero{padding:30px 0 16px}
.brand{display:inline-block;background:#fff;border-radius:999px;padding:8px 16px;box-shadow:0 8px 25px rgba(30,41,59,.08);font-weight:900}
h1{font-size:clamp(32px,6vw,54px);line-height:1.15;margin:16px 0 8px}
.lead{color:#64748b;font-size:clamp(17px,3vw,22px)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:20px 0 34px}
.card{background:rgba(255,255,255,.95);border-radius:30px;padding:22px;box-shadow:0 15px 45px rgba(30,41,59,.10);border:1px solid rgba(255,255,255,.85)}
.menu{min-height:150px}.icon{font-size:52px}.title{font-size:24px;font-weight:900;margin-bottom:8px}.desc{font-size:16px;color:#64748b}
.panel{background:rgba(255,255,255,.96);border-radius:34px;padding:22px;box-shadow:0 18px 55px rgba(30,41,59,.12);margin:22px 0 38px}
.status{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-weight:800;margin-bottom:12px}
.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}
.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}
.scene{font-size:clamp(24px,5vw,34px);font-weight:900;text-align:center;line-height:1.55;white-space:pre-line;margin:10px 0 18px}
.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
button{border:0;border-radius:999px;padding:13px 22px;font-size:20px;font-weight:900;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;box-shadow:0 10px 25px rgba(79,70,229,.22);cursor:pointer}
button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}
button.gray{background:#64748b}
.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}
.correct{border-color:#86efac!important;background:#f0fdf4!important}.wrong{border-color:#fca5a5!important;background:#fef2f2!important}
.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}
.tip,.report{margin-top:14px;border-radius:26px;padding:18px;background:#f8fafc;border:2px solid #e2e8f0}.tip{background:#ecfdf5;border-color:#bbf7d0}.report{background:#fff7ed;border-color:#fed7aa}
.reportItem{background:#fff;border:3px solid #fed7aa;border-radius:22px;padding:16px;margin:14px 0}
.hidden{display:none!important}
.footer{text-align:center;color:#64748b;padding:22px}
.shape{width:90px;height:90px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;border:5px solid #fff;box-shadow:0 8px 20px rgba(30,41,59,.12)}
.red{background:#ef4444}.blue{background:#3b82f6}.yellow{background:#facc15}.green{background:#22c55e}.purple{background:#a855f7}.orange{background:#fb923c}
@media(min-width:720px){.choices{grid-template-columns:1fr 1fr}.panel{padding:30px}}

.scoreLiveHide{display:none!important}

.versionBadge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:white;
  font-weight:1000;
  border-radius:999px;
  padding:10px 18px;
  box-shadow:0 10px 24px rgba(79,70,229,.22);
  margin:12px 0;
}
.versionNote{
  display:inline-block;
  background:#fff;
  color:#475569;
  border:2px solid #e2e8f0;
  border-radius:999px;
  padding:8px 14px;
  font-weight:800;
  margin-left:8px;
}
@media(max-width:640px){
  .versionNote{margin-left:0;margin-top:8px}
}

.liveResultHide{display:none!important}




/* ===== Ver.3.1.1 mobile readability fix ===== */
html{font-size:16px}
body{overflow-x:hidden}
.wrap{width:min(980px,96vw)!important}
.panel{border-radius:26px!important;padding:clamp(16px,4vw,28px)!important}
.grid{gap:14px!important}
.card,.menu{border-radius:22px!important}
button,.pill,.choice,.sstChoice,.tile,.modeBtn{
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
button{min-height:54px!important;padding:13px 18px!important;font-size:clamp(17px,4vw,22px)!important}
.choices,.sstChoices{gap:12px!important}
.choice,.sstChoice,.tile{
  min-height:58px;
  padding:14px!important;
  line-height:1.55!important;
  word-break:keep-all;
  overflow-wrap:anywhere;
}
.scene{line-height:1.65!important}
ruby.autoRuby{ruby-position:over;display:inline-ruby;line-height:1.25}
ruby.autoRuby rb{display:ruby-base}
ruby.autoRuby rt{display:ruby-text;font-size:.46em!important;line-height:1!important;color:#475569;font-weight:800;text-align:center}
.fullOverlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(22,163,74,.92);color:white;
  font-size:clamp(58px,16vw,128px);font-weight:1000;
  letter-spacing:.04em;text-shadow:0 6px 20px rgba(0,0,0,.25);
}
.hidden{display:none!important}
@media(max-width:640px){
  .top{position:static!important}
  .nav{gap:8px;flex-wrap:wrap}
  h1{font-size:clamp(27px,8vw,42px)!important}
  .lead{font-size:16px!important;line-height:1.6!important}
  .status{gap:7px!important;justify-content:center!important}
  .badge{font-size:14px!important;padding:7px 9px!important}
  .choices,.sstChoices{grid-template-columns:1fr!important}
  .grid{grid-template-columns:1fr!important}
  ruby.autoRuby rt{font-size:.42em!important}
}


/* ===== Ver.3.1.1.1 10min error fix only ===== */
.tenCheckBox{
  max-width:920px;
  margin:0 auto;
}
.tenScene{
  min-height:92px;
  background:#f8fafc;
  border:2px solid #dbeafe;
  border-radius:24px;
  padding:16px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:#1f2937!important;
  font-weight:1000;
  line-height:1.6;
  font-size:clamp(22px,5vw,34px);
}
.tenScene.hideQuestion{
  color:transparent!important;
}
.tenScene.hideQuestion::after{
  content:"もんだいを おもいだして こたえよう";
  color:#475569!important;
  font-size:clamp(20px,5vw,30px);
}
.tenChoices{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  margin-top:14px;
}
.tenChoice{
  width:100%;
  min-height:58px;
  padding:14px 16px;
  border:3px solid #dbeafe;
  border-radius:22px;
  background:#fff;
  color:#1f2937!important;
  font-weight:1000;
  line-height:1.55;
  text-align:left;
  font-size:clamp(18px,4vw,24px);
  box-shadow:0 8px 18px rgba(30,41,59,.08);
}
.tenChoice.correct{
  border-color:#86efac;
  background:#dcfce7;
}
.tenChoice.wrong{
  border-color:#fca5a5;
  background:#fee2e2;
}
.tenTimerBar{
  height:14px;
  background:#e5e7eb;
  border-radius:999px;
  overflow:hidden;
  margin:10px 0;
}
.tenTimerFill{
  height:100%;
  width:100%;
  background:#22c55e;
  transition:width .2s linear;
}
.tenReportItem{
  background:#fff;
  border:2px solid #dbeafe;
  border-radius:18px;
  padding:12px;
  margin:10px 0;
  line-height:1.6;
}
.hidden{display:none!important}
ruby.autoRuby{ruby-position:over;display:inline-ruby;line-height:1.25}
ruby.autoRuby rt{font-size:.48em!important;line-height:1!important;color:#475569;font-weight:800;text-align:center}
@media(max-width:640px){
  .tenScene{min-height:68px;font-size:18px;padding:10px}
  .tenChoice{text-align:center;min-height:46px;padding:10px;font-size:16px}
  .tenTimerBar{height:10px;margin:6px 0}
}
</style>
</head>
<body>
<div class="top">
  <div class="wrap nav">
    <a href="index.html">← TOP</a>
    <span class="pill">にじフラ Ver.3.1.1.1</span>
  </div>
</div>

<main class="wrap">
<section class="panel tenCheckBox">
  <div class="status">
    <span class="badge">10分チェック</span>
    <span class="badge">もんだい <span id="num">0</span>/<span id="total">10</span></span>
    <span class="badge">できた <span id="score">0</span></span>
    <span class="badge">のこり <span id="time">12</span>びょう</span>
  </div>

  <div class="tenTimerBar"><div class="tenTimerFill" id="timerFill"></div></div>

  <h1 style="text-align:center">10分チェック</h1>
  <p class="lead" style="text-align:center">1もん12びょう。はんぶん たつと、もんだいが かくれます。</p>

  <div id="illust" class="illust">🧠</div>
  <div class="tenScene" id="scene">スタートしてね</div>

  <div class="actions">
    <button type="button" onclick="start()">はじめる</button>
    <button type="button" class="light" onclick="readQ()">🔊 よみあげ</button>
    <button type="button" class="light" onclick="finish()">レポート</button>
  </div>

  <div class="tenChoices" id="choices"></div>
  <div id="msg" class="message"></div>
  <div id="report" class="report hidden"></div>
</section>
</main>

<footer class="footer">安心の中で挑戦し、挑戦の中で成長する</footer>

<script>
const DATA = [{"illust": "🍎", "scene": "りんご と みかん は、どこが にていますか？", "choices": [{"text": "どちらも くだもの", "ok": true}, {"text": "どちらも のりもの", "ok": false}, {"text": "どちらも ふく", "ok": false}, {"text": "どちらも すうじ", "ok": false}], "tip": "おなじ なかまを さがします。"}, {"illust": "👀", "scene": "みぎ にあるものを えらびます。", "choices": [{"text": "みぎ", "ok": true}, {"text": "ひだり", "ok": false}, {"text": "うえ", "ok": false}, {"text": "した", "ok": false}], "tip": "むきを かくにんします。"}, {"illust": "🔢", "scene": "1、2、3 の つぎにくる すうじは どれですか？", "choices": [{"text": "4", "ok": true}, {"text": "2", "ok": false}, {"text": "5", "ok": false}, {"text": "1", "ok": false}], "tip": "じゅんばんを みます。"}, {"illust": "🔴", "scene": "あか、あお、あか、あお の つぎは どれですか？", "choices": [{"text": "あか", "ok": true}, {"text": "あお", "ok": false}, {"text": "きいろ", "ok": false}, {"text": "みどり", "ok": false}], "tip": "くりかえしを みます。"}, {"illust": "🧩", "scene": "おなじ かたちを さがすとき、まず なにを みますか？", "choices": [{"text": "かたちの とくちょう", "ok": true}, {"text": "となりの ひと", "ok": false}, {"text": "おとの おおきさ", "ok": false}, {"text": "におい", "ok": false}], "tip": "みるところを きめます。"}, {"illust": "💬", "scene": "せつめいが わからないとき、どうしますか？", "choices": [{"text": "もういっかい きく", "ok": true}, {"text": "おこる", "ok": false}, {"text": "はしる", "ok": false}, {"text": "なにも みない", "ok": false}], "tip": "わからないときは、きいて だいじょうぶです。"}, {"illust": "🧠", "scene": "すこしだけ みて おぼえるとき、どこを みますか？", "choices": [{"text": "だいじな ところ", "ok": true}, {"text": "ゆかだけ", "ok": false}, {"text": "てんじょうだけ", "ok": false}, {"text": "めを とじる", "ok": false}], "tip": "ぜんぶではなく、だいじな ところを みます。"}, {"illust": "🟢", "scene": "みどりの まる と みどりの しかく は、どこが おなじですか？", "choices": [{"text": "いろ", "ok": true}, {"text": "かたち", "ok": false}, {"text": "かず", "ok": false}, {"text": "おおきさだけ", "ok": false}], "tip": "いろ と かたちを わけて みます。"}, {"illust": "🚗", "scene": "くるま と でんしゃ は、どこが にていますか？", "choices": [{"text": "どちらも のりもの", "ok": true}, {"text": "どちらも たべもの", "ok": false}, {"text": "どちらも どうぶつ", "ok": false}, {"text": "どちらも いろ", "ok": false}], "tip": "おなじ なかまを かんがえます。"}, {"illust": "⭐", "scene": "ほし、まる、ほし、まる の つぎは どれですか？", "choices": [{"text": "ほし", "ok": true}, {"text": "まる", "ok": false}, {"text": "さんかく", "ok": false}, {"text": "しかく", "ok": false}], "tip": "じゅんばんの くりかえしを みます。"}];
const FURI = [["10分チェック", "じゅっぷんちぇっく"], ["取り組んだ問題", "とりくんだもんだい"], ["選んだ答え", "えらんだこたえ"], ["よい答え", "よいこたえ"], ["ポイント", "ぽいんと"], ["レポート", "れぽーと"], ["問題文", "もんだいぶん"], ["小学生", "しょうがくせい"], ["共通点", "きょうつうてん"], ["乗り物", "のりもの"], ["問題", "もんだい"], ["答え", "こたえ"], ["正解", "せいかい"], ["確認", "かくにん"], ["時間", "じかん"], ["残り", "のこり"], ["半分", "はんぶん"], ["方向", "ほうこう"], ["順番", "じゅんばん"], ["図形", "ずけい"], ["同じ", "おなじ"], ["違う", "ちがう"], ["果物", "くだもの"], ["数字", "すうじ"], ["黄色", "きいろ"], ["安心", "あんしん"], ["挑戦", "ちょうせん"], ["成長", "せいちょう"], ["秒", "びょう"], ["右", "みぎ"], ["左", "ひだり"], ["上", "うえ"], ["下", "した"], ["色", "いろ"], ["赤", "あか"], ["青", "あお"], ["緑", "みどり"]];
const LIMIT = 12;

let deck = [];
let index = 0;
let score = 0;
let records = [];
let current = "";
let timeLeft = LIMIT;
let timer = null;
let answered = false;

function esc(s) {
  return String(s ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function R(text) {
  const raw = String(text ?? "");
  let out = "";
  let i = 0;
  while (i < raw.length) {
    let hit = null;
    for (const pair of FURI) {
      const w = pair[0];
      if (raw.slice(i, i + w.length) === w) {
        hit = pair;
        break;
      }
    }
    if (hit) {
      out += `<ruby class="autoRuby"><rb>${esc(hit[0])}</rb><rt>${esc(hit[1])}</rt></ruby>`;
      i += hit[0].length;
    } else {
      out += esc(raw[i]);
      i++;
    }
  }
  return out;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function start() {
  clearInterval(timer);
  deck = shuffle(DATA).slice(0, 10);
  index = 0;
  score = 0;
  records = [];
  document.getElementById("score").textContent = score;
  document.getElementById("total").textContent = deck.length;
  document.getElementById("report").classList.add("hidden");
  document.getElementById("report").innerHTML = "";
  showQuestion();
}

function showQuestion() {
  clearInterval(timer);
  answered = false;
  document.getElementById("msg").textContent = "";
  document.getElementById("scene").classList.remove("hideQuestion");

  if (index >= deck.length) {
    finish();
    return;
  }

  const q = deck[index];
  current = q.scene;

  document.getElementById("num").textContent = index + 1;
  document.getElementById("illust").textContent = q.illust || "🧠";
  document.getElementById("scene").innerHTML = R(q.scene);

  const box = document.getElementById("choices");
  box.innerHTML = "";

  shuffle(q.choices).forEach(c => {
    const b = document.createElement("button");
    b.type = "button";
    b.className = "tenChoice";
    b.innerHTML = R(c.text);
    b.onclick = () => answer(c, q, b);
    box.appendChild(b);
  });

  startTimer();
}

function startTimer() {
  clearInterval(timer);
  timeLeft = LIMIT;
  updateTimer();
  timer = setInterval(() => {
    timeLeft -= 1;
    updateTimer();

    if (timeLeft === Math.floor(LIMIT / 2)) {
      document.getElementById("scene").classList.add("hideQuestion");
    }

    if (timeLeft <= 0) {
      timeUp();
    }
  }, 1000);
}

function updateTimer() {
  document.getElementById("time").textContent = Math.max(0, timeLeft);
  document.getElementById("timerFill").style.width = Math.max(0, (timeLeft / LIMIT) * 100) + "%";
}

function answer(c, q, btn) {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  document.getElementById("scene").classList.remove("hideQuestion");
  document.querySelectorAll(".tenChoice").forEach(x => x.disabled = true);

  const correct = q.choices.find(x => x.ok);
  const ok = !!c.ok;

  if (ok) {
    score += 1;
    document.getElementById("score").textContent = score;
    btn.classList.add("correct");
    document.getElementById("msg").innerHTML = '<span class="ok">いいね！</span>';
  } else {
    btn.classList.add("wrong");
    document.getElementById("msg").innerHTML = '<span class="ng">かくにんしよう</span>';
  }

  records.push({
    scene: q.scene,
    selected: c.text,
    correct: correct ? correct.text : "",
    ok: ok,
    tip: q.tip || ""
  });

  setTimeout(() => {
    index += 1;
    showQuestion();
  }, 700);
}

function timeUp() {
  if (answered) return;
  answered = true;
  clearInterval(timer);
  document.getElementById("scene").classList.remove("hideQuestion");
  document.querySelectorAll(".tenChoice").forEach(x => x.disabled = true);

  const q = deck[index];
  const correct = q.choices.find(x => x.ok);

  document.getElementById("msg").innerHTML = '<span class="ng">じかんです</span>';

  records.push({
    scene: q.scene,
    selected: "じかんぎれ",
    correct: correct ? correct.text : "",
    ok: false,
    tip: q.tip || ""
  });

  setTimeout(() => {
    index += 1;
    showQuestion();
  }, 700);
}

function finish() {
  clearInterval(timer);
  document.getElementById("scene").classList.remove("hideQuestion");
  document.getElementById("scene").innerHTML = R("おしまい");
  document.getElementById("choices").innerHTML = "";
  document.getElementById("msg").innerHTML = '<span class="ok">レポートを ひょうじしました</span>';

  let h = '<h2>' + R("10分チェック レポート") + '</h2>';
  h += '<div class="tenReportItem">';
  h += '<b>' + R("取り組んだ問題") + '：</b>' + records.length + 'もん<br>';
  h += '<b>' + R("正解") + '：</b>' + score + 'もん<br>';
  h += '<b>' + R("確認") + '：</b>' + (records.length - score) + 'もん';
  h += '</div>';

  if (records.length === 0) {
    h += '<p>まだ とりくみ きろくが ありません。</p>';
  }

  records.forEach((r, n) => {
    h += '<div class="tenReportItem">';
    h += '<b>' + (n + 1) + '. ' + R(r.scene) + '</b>';
    h += '<p><b>' + R("選んだ答え") + '：</b>' + R(r.selected) + ' ' + (r.ok ? '○' : '△') + '</p>';
    h += '<p><b>' + R("よい答え") + '：</b>' + R(r.correct) + '</p>';
    h += '<p><b>' + R("ポイント") + '：</b>' + R(r.tip) + '</p>';
    h += '</div>';
  });

  h += '<div class="actions"><button onclick="window.print()">いんさつ</button><button class="light" onclick="start()">もういっかい</button></div>';

  const report = document.getElementById("report");
  report.innerHTML = h;
  report.classList.remove("hidden");
}

function readQ() {
  if (!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(current || document.getElementById("scene").textContent);
  u.lang = "ja-JP";
  u.rate = .85;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("scene").innerHTML = R("スタートしてね");
  document.getElementById("total").textContent = DATA.length;
  document.getElementById("time").textContent = LIMIT;
});
</script>
</body>
</html>
