  answered=false;
  document.getElementById('msg').textContent='';
  document.getElementById('tip').classList.add('hidden');
  if(i>=deck.length){finish();return}
  const q=deck[i];current=q.scene;
  document.getElementById('num').textContent=i+1;
  document.getElementById('cat').textContent=q.idx;
  document.getElementById('illust').textContent=q.illust;
  document.getElementById('scene').textContent=q.scene;
  const box=document.getElementById('choices');box.innerHTML='';
  shuffle(q.choices).forEach(c=>{
    let d=document.createElement('div');
    d.className='choice';
    d.textContent=c.text;
    d.onclick=()=>answer(c,d);
    box.appendChild(d);
  });
}
function answer(c,d){
  if(answered)return;answered=true;
  document.querySelectorAll('.choice').forEach(x=>x.style.pointerEvents='none');
  const q=deck[i];
  result[q.idx].total++;
  if(c.ok){
    score++; result[q.idx].ok++;
    document.getElementById('score').textContent=score;
    d.classList.add('correct');
    document.getElementById('msg').innerHTML='<span class="ok">いいね！</span>';
  }else{
    d.classList.add('wrong');
    let good=q.choices.find(x=>x.ok);
    wrong.push({idx:q.idx,illust:q.illust,scene:q.scene,selected:c.text,correct:good?good.text:'',tip:q.tip});
    document.getElementById('msg').innerHTML='<span class="ng">もう一回考えよう</span>';
  }
  document.getElementById('tip').classList.remove('hidden');
  document.getElementById('tip').innerHTML='<b>ポイント</b><br>'+esc(q.tip);
  setTimeout(()=>{i++;show()},1400);
}
function levelText(ok,total){
  const p=total?ok/total:0;
  if(p>=0.8)return "得意に見えます";
  if(p>=0.5)return "練習中です";
  return "支援があると取り組みやすいです";
}
function finish(){
  document.getElementById('num').textContent=25;
  document.getElementById('illust').textContent='📋';
  document.getElementById('scene').textContent='チェック終了\n総合評価レポート';
  document.getElementById('choices').innerHTML='';
  document.getElementById('tip').classList.add('hidden');
  const r=document.getElementById('report');r.classList.remove('hidden');
  let h='<h2>総合評価レポート</h2>';
  h+='<p>これは診断ではありません。日々の支援で見るための簡易チェックです。</p>';
  h+='<div class="reportItem"><b>総合</b><br>'+score+' / 25 問 正解</div>';
  indices.forEach(idx=>{
    const v=result[idx];
    h+='<div class="reportItem"><b>'+esc(idx)+'</b><br>'+v.ok+' / '+v.total+' 問　'+levelText(v.ok,v.total)+'</div>';
  });
  if(wrong.length){
    h+='<h3>まちがえた問題</h3>';
    wrong.forEach((w,n)=>{
      h+='<div class="reportItem"><div style="font-size:44px;text-align:center">'+esc(w.illust)+'</div><b>'+(n+1)+'. '+esc(w.idx)+'</b><div class="scene" style="font-size:22px">'+esc(w.scene).replaceAll("\n","<br>")+'</div><p class="ng"><b>選んだ答え：</b><br>'+esc(w.selected)+'</p><p class="ok"><b>よい答え：</b><br>'+esc(w.correct)+'</p><p><b>見るポイント：</b><br>'+esc(w.tip)+'</p></div>';
    });
  }else{
    h+='<div class="reportItem">まちがえた問題はありませんでした。</div>';
  }
  h+='<div class="actions"><button onclick="window.print()">印刷</button><button class="light" onclick="start()">もう一回</button></div>';
  r.innerHTML=h;
}
function readQ(){speakText(current||document.getElementById('scene').textContent)}
start();
</script>
</body></html>
