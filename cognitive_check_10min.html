<body><div class="top"><div class="wrap nav"><a href="index.html">← TOP</a><span class="pill">にじフラ Ver.3.1.4.3.2.2</span></div></div>
<main class="wrap"><section class="panel">
<div class="status">
  <span class="badge">10分チェック</span>
  <span class="badge">問題 <span id="num">0</span>/<span id="total">0</span></span>
  <span class="badge">できた <span id="score">0</span></span>
  <span class="badge">残り <span id="time">0</span>秒</span>
</div>
<div class="timerBar"><div class="timerFill" id="timerFill"></div></div>
<div class="illust" id="illust">🧠</div>
<h1 style="text-align:center">10分チェック</h1>
<p class="lead" style="text-align:center">1問ごとに制限時間があります。半分経つと問題文が隠れます。</p>
<div class="scene" id="scene">スタートしてね</div>
<div class="actions">
  <button type="button" onclick="start()">はじめる</button>
  <button type="button" class="light" onclick="readQ()">🔊 よみあげ</button>
  <button type="button" class="light" onclick="finish()">レポート</button>
</div>
<div class="choices" id="choices"></div>
<div id="msg" class="message"></div>
<div id="report" class="report hidden"></div>
</section></main>
<footer class="footer">安心の中で挑戦し、挑戦の中で成長する</footer>
<script>

const FURI_ENTRIES = [["10分チェック", "じゅっぷんちぇっく"], ["選んだ答え", "えらんだこたえ"], ["思い出して", "おもいだして"], ["", "いろことば"], ["色タッチ", "いろたっち"], ["レポート", "れぽーと"], ["制限時間", "せいげんじかん"], ["経過時間", "けいかじかん"], ["よい答え", "よいこたえ"], ["ポイント", "ぽいんと"], ["スタート", "すたーと"], ["はじめる", "はじめる"], ["選択肢", "せんたくし"], ["答える", "こたえる"], ["問題文", "もんだいぶん"], ["友だち", "ともだち"], ["気持ち", "きもち"], ["問題", "もんだい"], ["答え", "こたえ"], ["正解", "せいかい"], ["残り", "のこり"], ["半分", "はんぶん"], ["確認", "かくにん"], ["安心", "あんしん"], ["挑戦", "ちょうせん"], ["成長", "せいちょう"], ["黄色", "きいろ"], ["文字", "もじ"], ["自分", "じぶん"], ["相手", "あいて"], ["行動", "こうどう"], ["安全", "あんぜん"], ["見る", "みる"], ["聞く", "きく"], ["話す", "はなす"], ["秒", "びょう"], ["赤", "あか"], ["青", "あお"], ["緑", "みどり"], ["白", "しろ"], ["黒", "くろ"], ["色", "いろ"]];
function esc(s){return String(s??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function R(text){
  const raw=String(text??"");
  let out="",i=0;
  while(i<raw.length){
    let hit=null;
    for(const pair of FURI_ENTRIES){
      const w=pair[0];
      if(raw.slice(i,i+w.length)===w){hit=pair;break}
    }
    if(hit){out+=`<ruby class="autoRuby"><rb>${esc(hit[0])}</rb><rt>${esc(hit[1])}</rt></ruby>`;i+=hit[0].length}
    else{out+=esc(raw[i]);i++}
  }
  return out.replaceAll("\\n","<br>");
}
function showCorrectOverlay(){
  const o=document.getElementById("overlay");
  if(!o)return;
  o.classList.remove("hidden");
  setTimeout(()=>o.classList.add("hidden"),650);
}
function speakJP(text){
  if(!("speechSynthesis" in window))return;
  const u=new SpeechSynthesisUtterance(String(text||""));

const LIMIT=12;
let deck=[],i=0,score=0,current="",wrong=[],records=[],timeLeft=LIMIT,timer=null,answered=false;
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function start(){
  clearInterval(timer);
  deck=shuffle(DATA).slice(0,Math.min(10,DATA.length));
  i=0;score=0;wrong=[];records=[];
  document.getElementById("score").textContent=0;
  document.getElementById("total").textContent=deck.length;
  document.getElementById("report").classList.add("hidden");
  show();
}
function tick(){
  timeLeft--;
  document.getElementById("time").textContent=timeLeft;
  document.getElementById("timerFill").style.width=Math.max(0,(timeLeft/LIMIT)*100)+"%";
  if(timeLeft<=Math.floor(LIMIT/2)){
    document.getElementById("scene").classList.add("hiddenText");
  }
  if(timeLeft<=0){
    timeUp();
  }
}
function startTimer(){
  clearInterval(timer);
  timeLeft=LIMIT;
  document.getElementById("time").textContent=timeLeft;
  document.getElementById("timerFill").style.width="100%";
  document.getElementById("scene").classList.remove("hiddenText");
  timer=setInterval(tick,1000);
}
function show(){
  clearInterval(timer);
  answered=false;
  document.getElementById("msg").textContent="";
  document.getElementById("scene").classList.remove("hiddenText");
  if(i>=deck.length){finish();return}
  const q=deck[i];current=q.scene||"";
  document.getElementById("num").textContent=i+1;
  document.getElementById("illust").textContent=q.illust||"🧠";
  document.getElementById("scene").innerHTML=R(current);
  const box=document.getElementById("choices");box.innerHTML="";
  shuffle(q.choices||[]).forEach(c=>{
    const b=document.createElement("button");
    b.type="button";b.className="choice";b.innerHTML=R(c.text);
    b.onclick=()=>answer(c,q,b,false);
    box.appendChild(b);
  });
  startTimer();
}
function answer(c,q,b,timeout){
  if(answered)return;
  answered=true;
  clearInterval(timer);
  document.getElementById("scene").classList.remove("hiddenText");
  document.querySelectorAll(".choice").forEach(x=>x.disabled=true);
  const good=(q.choices||[]).find(x=>x.ok);
  if(c && c.ok){
    score++;document.getElementById("score").textContent=score;
    if(b)b.classList.add("correct");
    document.getElementById("msg").innerHTML='<span class="ok">いいね！</span>';
  }else{
    if(b)b.classList.add("wrong");
    document.getElementById("msg").innerHTML=timeout?'<span class="ng">時間です</span>':'<span class="ng">確認しよう</span>';
    wrong.push({scene:q.scene,selected:c?c.text:"時間切れ",correct:good?good.text:"",tip:q.tip||""});
  }
  records.push({scene:q.scene,selected:c?c.text:"時間切れ",correct:good?good.text:"",ok:!!(c&&c.ok),tip:q.tip||""});
  setTimeout(()=>{i++;show()},700);
}
function timeUp(){
  clearInterval(timer);
  const q=deck[i];
  answer(null,q,null,true);
}
function finish(){
  clearInterval(timer);
  document.getElementById("scene").classList.remove("hiddenText");
  document.getElementById("scene").innerHTML=R("おしまい");
  document.getElementById("choices").innerHTML="";
  document.getElementById("msg").innerHTML='<span class="ok">レポートを表示しました</span>';
  let h='<h2>'+R("10分チェック レポート")+'</h2>';
  h+='<div class="reportItem"><b>'+R("取り組んだ問題")+'：</b>'+records.length+'問<br><b>'+R("正解")+'：</b>'+score+'問<br><b>'+R("確認")+'：</b>'+(records.length-score)+'問</div>';
  records.forEach((r,n)=>{
    h+='<div class="reportItem"><b>'+(n+1)+'. '+R(r.scene)+'</b>';
    h+='<p><b>'+R("選んだ答え")+'：</b>'+R(r.selected)+' '+(r.ok?'○':'△')+'</p>';
    h+='<p><b>'+R("よい答え")+'：</b>'+R(r.correct)+'</p>';
    h+='<p><b>'+R("ポイント")+'：</b>'+R(r.tip)+'</p></div>';
  });
  if(records.length===0)h+='<p>まだ取り組み記録がありません。</p>';
  h+='<div class="actions"><button onclick="window.print()">印刷</button><button class="light" onclick="start()">もう一回</button></div>';
  const r=document.getElementById("report");r.innerHTML=h;r.classList.remove("hidden");
}
function readQ(){speakJP(current||document.getElementById("scene").textContent)}
