<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>からだチャレンジ</title><style>
*{box-sizing:border-box}body{margin:0;font-family:system-ui,'Yu Gothic',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}a{text-decoration:none;color:inherit}.wrap{width:min(980px,92vw);margin:0 auto}.topbar{position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0;z-index:5}.nav{display:flex;justify-content:space-between;padding:12px 0;font-weight:900}.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}.hero{padding:30px 0 16px}.brand{display:inline-block;padding:8px 16px;border-radius:999px;background:white;box-shadow:0 8px 25px rgba(30,41,59,.08);font-weight:900}h1{font-size:clamp(32px,6vw,54px);line-height:1.15;margin:16px 0 8px}.lead{color:#64748b;font-size:clamp(17px,3vw,22px)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:20px 0 34px}.card{background:rgba(255,255,255,.94);border-radius:30px;padding:22px;box-shadow:0 15px 45px rgba(30,41,59,.10);border:1px solid rgba(255,255,255,.8)}.menu{min-height:150px}.icon{font-size:52px}.title{font-size:24px;font-weight:900;margin-bottom:8px}.desc{font-size:16px;color:#64748b}.game{padding:22px 0 38px}.panel{background:rgba(255,255,255,.96);border-radius:34px;padding:22px;box-shadow:0 18px 55px rgba(30,41,59,.12)}.status{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-weight:800;margin-bottom:12px}.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}.scene{font-size:clamp(24px,5vw,34px);font-weight:900;text-align:center;line-height:1.55;white-space:pre-line;margin:10px 0 18px}.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}button{border:0;border-radius:999px;padding:13px 22px;font-size:20px;font-weight:900;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;box-shadow:0 10px 25px rgba(79,70,229,.22);cursor:pointer}button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}.correct{border-color:#86efac!important;background:#f0fdf4!important}.wrong{border-color:#fca5a5!important;background:#fef2f2!important}.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}.tip,.report{margin-top:14px;border-radius:26px;padding:18px;background:#f8fafc;border:2px solid #e2e8f0}.tip{background:#ecfdf5;border-color:#bbf7d0}.report{background:#fff7ed;border-color:#fed7aa}.hidden{display:none!important}.footer{text-align:center;color:#64748b;padding:22px}@media(min-width:720px){.choices{grid-template-columns:1fr 1fr}.panel{padding:30px}}
</style></head><body><div class="topbar"><div class="wrap nav"><a href="movement.html">← もどる</a><span class="pill">🌈 にじフラ</span></div></div><main class="wrap game"><section class="panel"><div class="status"><span class="badge">問題 <span id="num">0</span>/10</span><span class="badge">正解 <span id="score">0</span></span><span class="badge" id="cat"></span></div><div class="illust" id="illust">🌈</div><h1 style="text-align:center">からだチャレンジ</h1><p class="lead" style="text-align:center">まねる・止まる練習です。</p><div class="scene" id="scene">スタートしてね</div><div class="actions"><button onclick="readQ()">🔊 よみあげ</button><button class="light" onclick="start()">もう一回</button></div><div id="choices" class="choices"></div><div id="msg" class="message"></div><div id="tip" class="tip hidden"></div><div id="report" class="report hidden"></div></section></main><script>
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function stripFurigana(text){return String(text).replace(/([一-龯々〆ヶ]+)（[ぁ-んァ-ンー]+）/g,"$1").replace(/（[ぁ-んァ-ンー]+）/g,"").replace(/\n/g,"。")}
function speakText(text){if(!("speechSynthesis" in window))return;const u=new SpeechSynthesisUtterance(stripFurigana(text));u.lang="ja-JP";u.rate=.82;speechSynthesis.cancel();speechSynthesis.speak(u)}
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
</script>

let deck=[],i=0,score=0,wrong=[],answered=false,current="";
function start(){deck=shuffle(DATA).slice(0,10);i=0;score=0;wrong=[];document.getElementById("score").textContent=score;document.getElementById("report").classList.add("hidden");show()}
function show(){answered=false;document.getElementById("msg").textContent="";document.getElementById("tip").classList.add("hidden");if(i>=deck.length){finish();return}const q=deck[i];current=q.scene;document.getElementById("num").textContent=i+1;document.getElementById("cat").textContent=q.cat||"";document.getElementById("illust").textContent=q.illust||"🌈";document.getElementById("scene").textContent=q.scene;const box=document.getElementById("choices");box.innerHTML="";shuffle(q.choices).forEach(c=>{let d=document.createElement("div");d.className="choice";d.textContent=c.text;d.onclick=()=>ans(c,d);box.appendChild(d)})}
function ans(c,d){if(answered)return;answered=true;document.querySelectorAll(".choice").forEach(x=>x.style.pointerEvents="none");const q=deck[i];if(c.ok){score++;document.getElementById("score").textContent=score;d.classList.add("correct");document.getElementById("msg").innerHTML='<span class="ok">いいね！</span>'}else{d.classList.add("wrong");let good=q.choices.find(x=>x.ok);wrong.push({scene:q.scene,illust:q.illust,selected:c.text,correct:good.text,tip:q.tip});document.getElementById("msg").innerHTML='<span class="ng">もう一回考えよう</span>'}document.getElementById("tip").classList.remove("hidden");document.getElementById("tip").innerHTML='<b>ポイント</b><br>'+esc(q.tip);setTimeout(()=>{i++;show()},1500)}
function finish(){document.getElementById("num").textContent=10;document.getElementById("illust").textContent="⭐";document.getElementById("scene").textContent="おしまい！\n"+score+" / 10 問できました";document.getElementById("choices").innerHTML="";let r=document.getElementById("report");r.classList.remove("hidden");if(wrong.length===0){r.innerHTML="<b>ふりかえり</b><br>不正解はありませんでした。"}else{let h="<b>ふりかえりレポート</b><br>不正解だけ表示します。";wrong.forEach((w,n)=>{h+='<div class=report><div style=font-size:48px;text-align:center>'+esc(w.illust)+'</div><b>'+(n+1)+'.</b><br>'+esc(w.scene).replaceAll("\\n","<br>")+'<br><span class=ng>選んだ答え：'+esc(w.selected)+'</span><br><span class=ok>よい答え：'+esc(w.correct)+'</span><br>ポイント：'+esc(w.tip)+'</div>'});r.innerHTML=h}}
function readQ(){speakText(current||document.getElementById("scene").textContent)}
start();
