body{margin:0;font-family:system-ui,'Yu Gothic','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}
a{text-decoration:none;color:inherit}
.wrap{width:min(980px,92vw);margin:0 auto}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0}

.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}

.lead{color:#64748b;font-size:clamp(17px,3vw,22px)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:20px 0 34px}
.card{background:rgba(255,255,255,.95);border-radius:30px;padding:22px;box-shadow:0 15px 45px rgba(30,41,59,.10);border:1px solid rgba(255,255,255,.85)}
.menu{min-height:150px}.icon{font-size:52px}.title{font-size:24px;font-weight:900;margin-bottom:8px}.desc{font-size:16px;color:#64748b}
.panel{background:rgba(255,255,255,.96);border-radius:34px;padding:22px;box-shadow:0 18px 55px rgba(30,41,59,.12);margin:22px 0 38px}
.status{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-weight:800;margin-bottom:12px}
.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}
.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}
.scene{font-size:clamp(24px,5vw,34px);font-weight:900;text-align:center;line-height:1.55;white-space:pre-line;margin:10px 0 18px}
.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
button{border:0;border-radius:999px;padding:13px 22px;font-size:20px;font-weight:900;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;box-shadow:0 10px 25px rgba(79,70,229,.22);cursor:pointer}
button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}
button.gray{background:#64748b}
.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}
.correct{border-color:#86efac!important;background:#f0fdf4!important}.wrong{border-color:#fca5a5!important;background:#fef2f2!important}
.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}
.tip,.report{margin-top:14px;border-radius:26px;padding:18px;background:#f8fafc;border:2px solid #e2e8f0}.tip{background:#ecfdf5;border-color:#bbf7d0}.report{background:#fff7ed;border-color:#fed7aa}
.reportItem{background:#fff;border:3px solid #fed7aa;border-radius:22px;padding:16px;margin:14px 0}
.hidden{display:none!important}
.footer{text-align:center;color:#64748b;padding:22px}
.shape{width:90px;height:90px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;border:5px solid #fff;box-shadow:0 8px 20px rgba(30,41,59,.12)}
.red{background:#ef4444}.blue{background:#3b82f6}.yellow{background:#facc15}.green{background:#22c55e}.purple{background:#a855f7}.orange{background:#fb923c}
@media(min-width:720px){.choices{grid-template-columns:1fr 1fr}.panel{padding:30px}}

.visionArea{
  position:relative;
  height:58vh;
  min-height:390px;
  background:radial-gradient(circle at top,#eef2ff,#ffffff 65%);
  border-radius:32px;
  overflow:hidden;
  border:4px solid #fff;
  box-shadow:inset 0 0 0 2px #dbeafe,0 15px 35px rgba(30,41,59,.10);
}
.target{
  position:absolute;
  width:76px;
  height:76px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:900;
  background:#fff;
  border:5px solid #93c5fd;
  box-shadow:0 10px 22px rgba(30,41,59,.18);
  cursor:pointer;
  transition:transform .12s, left .35s linear, top .35s linear;
}
.target:active{transform:scale(.9)}
.target.good{border-color:#86efac;background:#dcfce7}
.target.bad{border-color:#fca5a5;background:#fee2e2}
.guideLine{
  position:absolute;
  height:6px;
  background:linear-gradient(90deg,#a5b4fc,#67e8f9);
  border-radius:999px;
  transform-origin:left center;
  opacity:.55;
  pointer-events:none;
}
.modeCard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
  gap:12px;
  margin:14px 0;
}
.modeBtn{
  background:white;
  color:#334155;
  border:3px solid #dbeafe;
  box-shadow:0 8px 18px rgba(30,41,59,.08);
  border-radius:22px;
}
.modeBtn.active{
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:white;
}
.miniReport{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
}

.scoreLiveHide{display:none!important}

.liveResultHide{display:none!important}

</style></head><body><div class="top"><div class="wrap nav"><a href="movement.html">← もどる</a><span class="pill">🌈 にじフラ</span></div></div>
<main class="wrap">
<section class="panel">
<div class="status">
<span class="badge">モード <span id="modeName"><ruby class="autoRuby">追視<rt>ついし</rt></ruby></span></span>
<span class="badge"><ruby class="autoRuby">残<rt>のこ</rt></ruby>り <span id="time">45</span><ruby class="autoRuby">秒<rt>びょう</rt></ruby></span>
<span class="badge scoreLiveHide"><ruby class="autoRuby">点<rt>てん</rt></ruby> <span id="score">0</span></span>
<span class="badge liveResultHide">ミス <span id="miss">0</span></span>
<span class="badge">レベル <span id="level">1</span></span>
</div>
<div class="illust">👀</div>
<h1 style="text-align:center">ビジョントレーニング</h1>
<p class="lead" style="text-align:center">
<ruby class="autoRuby">目<rt>よみ</rt></ruby>で<ruby class="autoRuby">追<rt>つい</rt></ruby>う・<ruby class="autoRuby">探<rt>さが</rt></ruby>す・<ruby class="autoRuby">順番<rt>じゅんばん</rt></ruby>に<ruby class="autoRuby">見<rt>み</rt></ruby>る<ruby class="autoRuby">練習<rt>れんしゅう</rt></ruby>です。<br/>
    iPadでも<ruby class="autoRuby">押<rt>よみ</rt></ruby>しやすい<ruby class="autoRuby">大<rt>おお</rt></ruby>きさにしています。
  </p>
<div class="modeCard">
<button class="modeBtn active" id="btnTrack" onclick="setMode('track')">👀 <ruby class="autoRuby">追視<rt>ついし</rt></ruby><br/>うごく<ruby class="autoRuby">星<rt>よみ</rt></ruby></button>
<button class="modeBtn" id="btnSearch" onclick="setMode('search')">🔍 <ruby class="autoRuby">探<rt>さが</rt></ruby>す<br/><ruby class="autoRuby">同<rt>よみ</rt></ruby>じ<ruby class="autoRuby">絵<rt>よみ</rt></ruby></button>
<button class="modeBtn" id="btnOrder" onclick="setMode('order')">1️⃣ <ruby class="autoRuby">順番<rt>じゅんばん</rt></ruby><br/><ruby class="autoRuby">数字<rt>すう字</rt></ruby>タッチ</button>
</div>
<div class="actions">
<button onclick="start()">スタート</button>
<button class="light" onclick="pauseGame()"><ruby class="autoRuby">一時停止<rt>一じ停止</rt></ruby></button>
<button class="light" onclick="showReport()">レポート</button>
</div>
<div class="scene" id="instruction">スタートを<ruby class="autoRuby">押<rt>よみ</rt></ruby>してね</div>
<div class="visionArea" id="area"></div>

<div class="report hidden" id="report"></div>
</section>
</main>
<script>
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
</script>
<script>
let mode="track";
let running=false;
let time=45;
let score=0;
let miss=0;
let level=1;
let timer=null;
let moveTimer=null;
let currentOrder=1;
let stats={track:{ok:0,miss:0},search:{ok:0,miss:0},order:{ok:0,miss:0}};

const area=()=>document.getElementById("area");

function setMode(m){
  if(running)return;
  mode=m;
  document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"));
  if(m==="track"){document.getElementById("btnTrack").classList.add("active");document.getElementById("modeName").textContent="追視";document.getElementById("instruction").textContent="動く星を目で追ってタップします";}
  if(m==="search"){document.getElementById("btnSearch").classList.add("active");document.getElementById("modeName").textContent="探す";document.getElementById("instruction").textContent="見本と同じ絵を探してタップします";}
  if(m==="order"){document.getElementById("btnOrder").classList.add("active");document.getElementById("modeName").textContent="順番";document.getElementById("instruction").textContent="1から順番に数字をタップします";}
  area().innerHTML="";
}

function start(){
  running=true;
  time=45; score=0; miss=0; level=1; currentOrder=1;
  stats={track:{ok:0,miss:0},search:{ok:0,miss:0},order:{ok:0,miss:0}};
  update();
  document.getElementById("report").classList.add("hidden");
  document.getElementById("report").innerHTML="";
  document.getElementById("msg").textContent="";
  clearInterval(timer);
  timer=setInterval(()=>{
    if(!running)return;
    time--;
    update();
    if(time<=0)finish();
  },1000);
  nextRound();
}

function pauseGame(){
  running=!running;
  document.getElementById("msg").textContent=running?"再開しました":"一時停止中";
}

function update(){
  document.getElementById("time").textContent=time;
  document.getElementById("score").textContent=score;
  document.getElementById("miss").textContent=miss;
  document.getElementById("level").textContent=level;
}

function finish(){
  running=false;
  clearInterval(timer);
  clearTimeout(moveTimer);
  area().innerHTML="";
  document.getElementById("instruction").textContent="おしまい！";
  document.getElementById("msg").innerHTML='<span class="ok">結果：'+score+' 点　ミス '+miss+'</span>';
  showReport();
}

function nextRound(){
  if(!running)return;
  clearTimeout(moveTimer);
  area().innerHTML="";
  if(mode==="track") makeTracking();
  if(mode==="search") makeSearch();
  if(mode==="order") makeOrder();
  update();
}

function rand(max){return Math.floor(Math.random()*max)}
function pos(el){
  const a=area();
  const x=rand(Math.max(20,a.clientWidth-90));
  const y=rand(Math.max(20,a.clientHeight-90));
  el.style.left=x+"px";
  el.style.top=y+"px";
}

function makeTarget(text, cls="target"){
  const d=document.createElement("div");
  d.className=cls;
  d.textContent=text;
  pos(d);
  area().appendChild(d);
  return d;
}

/* 追視：動く星をタップ */
function makeTracking(){
  document.getElementById("instruction").textContent="動く星を目で追ってタップ";
  const t=makeTarget("⭐");
  let moves=0;
  function move(){
    if(!running||mode!=="track")return;
    pos(t);
    moves++;
    const speed=Math.max(430,900-level*55);
    moveTimer=setTimeout(move,speed);
  }
  moveTimer=setTimeout(move,400);
  t.onclick=()=>{
    if(!running)return;
    score++; stats.track.ok++;
    t.classList.add("good");
    if(score%5===0)level++;
    setTimeout(nextRound,120);
  };
  area().onclick=(e)=>{
    if(e.target===area()){
      miss++; stats.track.miss++;
      update();
    }
  };
}

/* 探す：見本と同じ絵を探す */
function makeSearch(){
  const symbols=["🐶","🐱","🐰","🐸","🐼","🦁","🐵","🐧","🐟","🦊","🐻","🐨"];
  const target=symbols[rand(symbols.length)];
  document.getElementById("instruction").textContent="見本「"+target+"」と同じ絵を探してタップ";
  const count=Math.min(12,6+level);
  let pool=shuffle(symbols).slice(0,count);
  if(!pool.includes(target))pool[0]=target;
  shuffle(pool).forEach(s=>{
    const d=makeTarget(s);
    d.onclick=()=>{
      if(!running)return;
      if(s===target){
        score++; stats.search.ok++;
        d.classList.add("good");
        if(score%5===0)level++;
        setTimeout(nextRound,180);
      }else{
        miss++; stats.search.miss++;
        d.classList.add("bad");
        update();
      }
    };
  });
}

/* 順番：1から数字を順にタップ */
function makeOrder(){
  currentOrder=1;
  const maxNum=Math.min(9,3+level);
  document.getElementById("instruction").textContent="1 から "+maxNum+" まで順番にタップ";
  const nums=[];
  for(let i=1;i<=maxNum;i++)nums.push(i);
  shuffle(nums).forEach(n=>{
    const d=makeTarget(String(n));
    d.onclick=()=>{
      if(!running)return;
      if(n===currentOrder){
        d.classList.add("good");
        d.style.visibility="hidden";
        currentOrder++;
        if(currentOrder>maxNum){
          score+=maxNum;
          stats.order.ok++;
          if(score%8===0)level++;
          setTimeout(nextRound,220);
        }
      }else{
        miss++; stats.order.miss++;
        d.classList.add("bad");
        setTimeout(()=>d.classList.remove("bad"),300);
        update();
      }
    };
  });
}

function showReport(){
  const r=document.getElementById("report");
  r.classList.remove("hidden");
  const totalOk=stats.track.ok+stats.search.ok+stats.order.ok;
  const totalMiss=stats.track.miss+stats.search.miss+stats.order.miss;
  let comment="目で見る力を楽しく練習できました。";
  if(totalMiss>totalOk) comment="急がず、目で追ってから押す練習がおすすめです。";
  if(stats.order.miss>stats.order.ok) comment+=" 順番に見る課題は、数を少なくして練習すると取り組みやすいです。";
  if(stats.search.miss>stats.search.ok) comment+=" 探す課題は、見本を確認してから選ぶ練習が合いそうです。";
  if(stats.track.miss>stats.track.ok) comment+=" 追視課題は、動きをゆっくりにして練習するとよいです。";

  r.innerHTML =
    '<h2>ビジョントレーニング レポート</h2>'+
    '<div class="miniReport">'+
      '<div class="reportItem"><b>追視</b><br>成功 '+stats.track.ok+' / ミス '+stats.track.miss+'</div>'+
      '<div class="reportItem"><b>探す</b><br>成功 '+stats.search.ok+' / ミス '+stats.search.miss+'</div>'+
      '<div class="reportItem"><b>順番</b><br>成功 '+stats.order.ok+' / ミス '+stats.order.miss+'</div>'+
    '</div>'+
    '<div class="reportItem"><b>総合コメント</b><br>'+comment+'</div>'+
    '<div class="actions"><button onclick="window.print()">印刷</button></div>';
}
setMode("track");
</script>

  function esc(s){
    return String(s ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function rubyText(text){
    const raw = String(text ?? "");
    let out = "";
    let i = 0;
    while(i < raw.length){
      let hit = null;
      for(const pair of FURI_ENTRIES){
        const word = pair[0];
        if(raw.slice(i, i + word.length) === word){
          hit = pair;
          break;
        }
      }
      if(hit){
        const word = hit[0], yomi = hit[1];
        if(!/[一-龯々〆ヶ]/.test(yomi)){
          out += `<ruby class="autoRuby"><rb>${esc(word)}</rb><rt>${esc(yomi)}</rt></ruby>`;
        }else{
          out += esc(word);
        }
        i += word.length;
      }else{
        out += esc(raw[i]);
        i++;
      }
    }
    return out;
  }

  function shouldSkipNode(node){
    const p = node.parentElement;
    if(!p) return true;
    if(p.closest("script,style,textarea,input,select,option,ruby,rt,rb,.noAutoRuby")) return true;
    if(!node.nodeValue || !node.nodeValue.trim()) return true;
    return false;
  }

  function convertTextNode(node){
    if(shouldSkipNode(node)) return;
    const raw = node.nodeValue;
    const converted = rubyText(raw);
    if(converted === esc(raw)) return;
    const span = document.createElement("span");
    span.className = "autoRubyWrap";
    span.innerHTML = converted;
    node.parentNode.replaceChild(span, node);
  }

  function scan(root){
    if(!root) return;
    if(root.nodeType === Node.TEXT_NODE){
      convertTextNode(root);
      return;
    }
    if(root.nodeType !== Node.ELEMENT_NODE && root.nodeType !== Node.DOCUMENT_NODE) return;
    if(root.closest && root.closest("script,style,textarea,input,select,option,ruby,rt,rb,.noAutoRuby")) return;

    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        return shouldSkipNode(node) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT;
      }
    });

    const nodes = [];
    let n;
    while(n = walker.nextNode()) nodes.push(n);
    nodes.forEach(convertTextNode);
  }

    scan(document.body);
    const mo = new MutationObserver(muts=>{
      for(const m of muts){
        for(const node of m.addedNodes){
          scan(node);
        }
      }
    });
    mo.observe(document.body, {childList:true, subtree:true});
  }

    document.addEventListener("DOMContentLoaded", boot);
