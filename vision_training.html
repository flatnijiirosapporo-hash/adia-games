</style></head><body><div class="top"><div class="wrap nav"><a href="movement.html">← もどる</a><span class="pill">🌈 にじフラ</span></div></div>
<main class="wrap">
<section class="panel">
  <div class="status">
    <span class="badge">モード <span id="modeName">追視</span></span>
    <span class="badge">残り <span id="time">45</span>秒</span>
    <span class="badge scoreLiveHide">点 <span id="score">0</span></span>
    <span class="badge liveResultHide">ミス <span id="miss">0</span></span>
    <span class="badge">レベル <span id="level">1</span></span>
  </div>

  <div class="illust">👀</div>
  <h1 style="text-align:center">ビジョントレーニング</h1>
  <p class="lead" style="text-align:center">
    目で追う・探す・順番に見る練習です。<br>
    iPadでも押しやすい大きさにしています。
  </p>

  <div class="modeCard">
    <button class="modeBtn active" id="btnTrack" onclick="setMode('track')">👀 追視<br>うごく星</button>
    <button class="modeBtn" id="btnSearch" onclick="setMode('search')">🔍 探す<br>同じ絵</button>
    <button class="modeBtn" id="btnOrder" onclick="setMode('order')">1️⃣ 順番<br>数字タッチ</button>
  </div>

  <div class="actions">
    <button onclick="start()">スタート</button>
    <button class="light" onclick="pauseGame()">一時停止</button>
    <button class="light" onclick="showReport()">レポート</button>
  </div>

  <div id="instruction" class="scene">スタートを押してね</div>
  <div id="area" class="visionArea"></div>
  <div id="msg" class="message"></div>
  <div id="report" class="report hidden"></div>
</section>
</main>
<script>
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
</script>
<script>
let mode="track";
let running=false;
let time=45;
let score=0;
let miss=0;
let level=1;
let timer=null;
let moveTimer=null;
let currentOrder=1;
let stats={track:{ok:0,miss:0},search:{ok:0,miss:0},order:{ok:0,miss:0}};

const area=()=>document.getElementById("area");

function setMode(m){
  if(running)return;
  mode=m;
  document.querySelectorAll(".modeBtn").forEach(b=>b.classList.remove("active"));
  if(m==="track"){document.getElementById("btnTrack").classList.add("active");document.getElementById("modeName").textContent="追視";document.getElementById("instruction").textContent="動く星を目で追ってタップします";}
  if(m==="search"){document.getElementById("btnSearch").classList.add("active");document.getElementById("modeName").textContent="探す";document.getElementById("instruction").textContent="見本と同じ絵を探してタップします";}
  if(m==="order"){document.getElementById("btnOrder").classList.add("active");document.getElementById("modeName").textContent="順番";document.getElementById("instruction").textContent="1から順番に数字をタップします";}
  area().innerHTML="";
}

function start(){
  running=true;
  time=45; score=0; miss=0; level=1; currentOrder=1;
  stats={track:{ok:0,miss:0},search:{ok:0,miss:0},order:{ok:0,miss:0}};
  update();
  document.getElementById("report").classList.add("hidden");
  document.getElementById("report").innerHTML="";
  document.getElementById("msg").textContent="";
  clearInterval(timer);
  timer=setInterval(()=>{
    if(!running)return;
    time--;
    update();
    if(time<=0)finish();
  },1000);
  nextRound();
}

function pauseGame(){
  running=!running;
  document.getElementById("msg").textContent=running?"再開しました":"一時停止中";
}

function update(){
  document.getElementById("time").textContent=time;
  document.getElementById("score").textContent=score;
  document.getElementById("miss").textContent=miss;
  document.getElementById("level").textContent=level;
}

function finish(){
  running=false;
  clearInterval(timer);
  clearTimeout(moveTimer);
  area().innerHTML="";
  document.getElementById("instruction").textContent="おしまい！";
  document.getElementById("msg").innerHTML='<span class="ok">結果：'+score+' 点　ミス '+miss+'</span>';
  showReport();
}

function nextRound(){
  if(!running)return;
  clearTimeout(moveTimer);
  area().innerHTML="";
  if(mode==="track") makeTracking();
  if(mode==="search") makeSearch();
  if(mode==="order") makeOrder();
  update();
}

function rand(max){return Math.floor(Math.random()*max)}
function pos(el){
  const a=area();
  const x=rand(Math.max(20,a.clientWidth-90));
  const y=rand(Math.max(20,a.clientHeight-90));
  el.style.left=x+"px";
  el.style.top=y+"px";
}

function makeTarget(text, cls="target"){
  const d=document.createElement("div");
  d.className=cls;
  d.textContent=text;
  pos(d);
  area().appendChild(d);
  return d;
}

/* 追視：動く星をタップ */
function makeTracking(){
  document.getElementById("instruction").textContent="動く星を目で追ってタップ";
  const t=makeTarget("⭐");
  let moves=0;
  function move(){
    if(!running||mode!=="track")return;
    pos(t);
    moves++;
    const speed=Math.max(430,900-level*55);
    moveTimer=setTimeout(move,speed);
  }
  moveTimer=setTimeout(move,400);
  t.onclick=()=>{
    if(!running)return;
    score++; stats.track.ok++;
    t.classList.add("good");
    if(score%5===0)level++;
    setTimeout(nextRound,120);
  };
  area().onclick=(e)=>{
    if(e.target===area()){
      miss++; stats.track.miss++;
      update();
    }
  };
}

/* 探す：見本と同じ絵を探す */
function makeSearch(){
  const symbols=["🐶","🐱","🐰","🐸","🐼","🦁","🐵","🐧","🐟","🦊","🐻","🐨"];
  const target=symbols[rand(symbols.length)];
  document.getElementById("instruction").textContent="見本「"+target+"」と同じ絵を探してタップ";
  const count=Math.min(12,6+level);
  let pool=shuffle(symbols).slice(0,count);
  if(!pool.includes(target))pool[0]=target;
  shuffle(pool).forEach(s=>{
    const d=makeTarget(s);
    d.onclick=()=>{
      if(!running)return;
      if(s===target){
        score++; stats.search.ok++;
        d.classList.add("good");
        if(score%5===0)level++;
        setTimeout(nextRound,180);
      }else{
        miss++; stats.search.miss++;
        d.classList.add("bad");
        update();
      }
    };
  });
}

/* 順番：1から数字を順にタップ */
function makeOrder(){
  currentOrder=1;
  const maxNum=Math.min(9,3+level);
  document.getElementById("instruction").textContent="1 から "+maxNum+" まで順番にタップ";
  const nums=[];
  for(let i=1;i<=maxNum;i++)nums.push(i);
  shuffle(nums).forEach(n=>{
    const d=makeTarget(String(n));
    d.onclick=()=>{
      if(!running)return;
      if(n===currentOrder){
        d.classList.add("good");
        d.style.visibility="hidden";
        currentOrder++;
        if(currentOrder>maxNum){
          score+=maxNum;
          stats.order.ok++;
          if(score%8===0)level++;
          setTimeout(nextRound,220);
        }
      }else{
        miss++; stats.order.miss++;
        d.classList.add("bad");
        setTimeout(()=>d.classList.remove("bad"),300);
        update();
      }
    };
  });
}

function showReport(){
  const r=document.getElementById("report");
  r.classList.remove("hidden");
  const totalOk=stats.track.ok+stats.search.ok+stats.order.ok;
  const totalMiss=stats.track.miss+stats.search.miss+stats.order.miss;
  let comment="目で見る力を楽しく練習できました。";
  if(totalMiss>totalOk) comment="急がず、目で追ってから押す練習がおすすめです。";
  if(stats.order.miss>stats.order.ok) comment+=" 順番に見る課題は、数を少なくして練習すると取り組みやすいです。";
  if(stats.search.miss>stats.search.ok) comment+=" 探す課題は、見本を確認してから選ぶ練習が合いそうです。";
  if(stats.track.miss>stats.track.ok) comment+=" 追視課題は、動きをゆっくりにして練習するとよいです。";

  r.innerHTML =
    '<h2>ビジョントレーニング レポート</h2>'+
    '<div class="miniReport">'+
      '<div class="reportItem"><b>追視</b><br>成功 '+stats.track.ok+' / ミス '+stats.track.miss+'</div>'+
      '<div class="reportItem"><b>探す</b><br>成功 '+stats.search.ok+' / ミス '+stats.search.miss+'</div>'+
      '<div class="reportItem"><b>順番</b><br>成功 '+stats.order.ok+' / ミス '+stats.order.miss+'</div>'+
    '</div>'+
    '<div class="reportItem"><b>総合コメント</b><br>'+comment+'</div>'+
    '<div class="actions"><button onclick="window.print()">印刷</button></div>';
}
setMode("track");
</script>

, ["約束", "やくそく"], ["協力", "きょうりょく"], ["勇気", "ゆうき"], ["言葉", "ことば"], ["意味", "いみ"], ["仲間", "なかま"], ["動物", "どうぶつ"], ["果物", "くだもの"], ["鉛筆", "えんぴつ"], ["左右", "さゆう"], ["本物", "ほんもの"], ["方向", "ほうこう"], ["次", "つぎ"], ["色", "いろ"], ["赤", "あか"], ["青", "あお"], ["緑", "みどり"], ["紫", "むらさき"], ["白", "しろ"], ["黒", "くろ"], ["雨", "あめ"], ["雪", "ゆき"], ["車", "くるま"], ["体", "からだ"], ["本", "ほん"], ["上", "うえ"], ["下", "した"], ["左", "ひだり"], ["右", "みぎ"]];
  const SKIP = new Set(["SCRIPT","STYLE","TEXTAREA","INPUT","SELECT","OPTION","RT","RUBY"]);
  const storageKey = "nijifla_furigana_on";

  function escapeRegExp(s){
    return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  }

  function applyFurigana(){
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
      acceptNode(node){
        const parent = node.parentElement;
        if(!parent) return NodeFilter.FILTER_REJECT;
        if(SKIP.has(parent.tagName)) return NodeFilter.FILTER_REJECT;
        if(!node.nodeValue || !/[一-龯々]/.test(node.nodeValue)) return NodeFilter.FILTER_REJECT;
        return NodeFilter.FILTER_ACCEPT;
      }
    });

    const nodes=[];
    while(walker.nextNode()) nodes.push(walker.currentNode);

    nodes.forEach(node=>{
      let text=node.nodeValue;
      let html=escapeHtml(text);
      let changed=false;

      FURI.forEach(([word,yomi])=>{
        if(html.includes(word)){
          const re = new RegExp(escapeRegExp(word), "g");
          html = html.replace(re, `<ruby class="nijiRuby">${word}<rt>${yomi}</rt></ruby>`);
          changed=true;
        }
      });

      if(changed){
        const span=document.createElement("span");
        span.innerHTML=html;
        node.parentNode.replaceChild(span,node);
      }
    });
  }

  function escapeHtml(s){
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
  }

  function addButton(){
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="furiToggleBtn";
    btn.id="furiToggleBtn";
    btn.onclick=function(){
      document.body.classList.toggle("furi-on");
      const on=document.body.classList.contains("furi-on");
      localStorage.setItem(storageKey,on?"1":"0");
      btn.textContent=on?"ふりがな ON":"ふりがな OFF";
    };
    document.body.appendChild(btn);

    const on=localStorage.getItem(storageKey)==="1";
    if(on)document.body.classList.add("furi-on");
    btn.textContent=on?"ふりがな ON":"ふりがな OFF";
  }

  document.addEventListener("DOMContentLoaded",function(){
    applyFurigana();
    addButton();
  });
})();
