</style></head><body>
<header>

</header>
<main>

<a class="back" href="sst.html">← SSTへ</a>

<script>
const allQuestions = [{"cat": "仲直り練習", "scene": "友（とも）だちにぶつかった。\nどう戻（もど）る？", "choices": [{"text": "「ごめんね。大丈夫（だいじょうぶ）？」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "おもちゃを取（と）り合（あ）いした。\nどう戻（もど）る？", "choices": [{"text": "「順番（じゅんばん）に使（つか）おう」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "負（ま）けて悔（くや）しい。\nどう戻（もど）る？", "choices": [{"text": "深呼吸（しんこきゅう）して「もう一回（いっかい）やる」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "言（い）いすぎた。\nどう戻（もど）る？", "choices": [{"text": "「言（い）いすぎてごめん」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "友（とも）だちを怒（おこ）らせた。\nどう戻（もど）る？", "choices": [{"text": "「どうしたら戻（もど）れる？」と聞（き）く", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "順番（じゅんばん）でけんかになった。\nどう戻（もど）る？", "choices": [{"text": "タイマーで交代（こうたい）する", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "ボールを強（つよ）く投（な）げすぎた。\nどう戻（もど）る？", "choices": [{"text": "「ごめんね。次（つぎ）は弱（よわ）くする」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "友（とも）だちの作品（さくひん）を壊（こわ）した。\nどう戻（もど）る？", "choices": [{"text": "「ごめんね。一緒（いっしょ）に直（なお）す」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "遊（あそ）びのルールでもめた。\nどう戻（もど）る？", "choices": [{"text": "先生（せんせい）と一緒（いっしょ）に確認（かくにん）する", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "泣（な）いてしまった。\nどう戻（もど）る？", "choices": [{"text": "落（お）ち着（つ）いてから話（はな）す", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "怒（おこ）って離（はな）れた。\nどう戻（もど）る？", "choices": [{"text": "戻（もど）って「さっきはごめん」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "勝（か）った時（とき）に自慢（じまん）しすぎた。\nどう戻（もど）る？", "choices": [{"text": "「一緒（いっしょ）にできて楽（たの）しかった」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "友（とも）だちを待（ま）たせた。\nどう戻（もど）る？", "choices": [{"text": "「待（ま）ってくれてありがとう」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "約束（やくそく）を守（まも）れなかった。\nどう戻（もど）る？", "choices": [{"text": "「次（つぎ）は守（まも）るね」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "遊（あそ）びから抜（ぬ）けたくなった。\nどう戻（もど）る？", "choices": [{"text": "「少（すこ）し休（やす）んで戻（もど）る」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "友（とも）だちにいやな顔（かお）をした。\nどう戻（もど）る？", "choices": [{"text": "「いやな顔（かお）してごめん」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "声（こえ）が大（おお）きくなりすぎた。\nどう戻（もど）る？", "choices": [{"text": "「小（ちい）さい声（こえ）にするね」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "順番（じゅんばん）を抜（ぬ）かしてしまった。\nどう戻（もど）る？", "choices": [{"text": "後（うし）ろに戻（もど）る", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "友（とも）だちの話（はなし）を聞（き）かなかった。\nどう戻（もど）る？", "choices": [{"text": "「もう一回（いっかい）聞（き）くね」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}, {"cat": "仲直り練習", "scene": "けんかのあと気（き）まずい。\nどう戻（もど）る？", "choices": [{"text": "「また遊（あそ）ぼう」と言（い）う", "ok": true}, {"text": "そのまま怒（おこ）る", "ok": false}, {"text": "物（もの）を投（な）げる", "ok": false}, {"text": "無視（むし）する", "ok": false}], "tip": "トラブルは、戻（もど）る練習（れんしゅう）のチャンスです。"}];
let deck = [];
let index = 0;
let score = 0;
let answered = false;
const total = Math.min(10, allQuestions.length);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function start() {
  deck = shuffle(allQuestions).slice(0, total);
  index = 0;
  score = 0;
  answered = false;
  document.getElementById("score").textContent = score;
  document.getElementById("total").textContent = total;
  show();
}

function show() {
  answered = false;
  document.getElementById("msg").textContent = "";
  document.getElementById("tip").classList.add("hidden");

  if (index >= deck.length) {
    document.getElementById("cat").textContent = "-";
    document.getElementById("num").textContent = total;
    document.getElementById("scene").textContent = "おしまい！\n" + score + " / " + total + " 問（もん）できました ⭐";
    document.getElementById("choices").innerHTML = "";
    document.getElementById("tip").classList.remove("hidden");
    document.getElementById("tip").innerHTML = '<div class="title">今日（きょう）のポイント</div><div class="tip">できた・できないより、「考（かんが）えた」「戻（もど）れた」「言葉（ことば）を選（えら）べた」ことが大切（たいせつ）です。</div>';
    return;
  }

  const q = deck[index];
  document.getElementById("cat").textContent = q.cat;
  document.getElementById("num").textContent = index + 1;
  document.getElementById("scene").textContent = q.scene;
  document.getElementById("choices").innerHTML = "";

  shuffle(q.choices).forEach(item => {
    const div = document.createElement("div");
    div.className = "choice";
    div.textContent = item.text;
    div.onclick = () => answer(item.ok, q.tip);
    document.getElementById("choices").appendChild(div);
  });
}

function answer(ok, tip) {
  if (answered) return;
  answered = true;

  if (ok) {
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("msg").innerHTML = '<span class="ok">いい選（えら）び方（かた）！</span>';
  } else {
    document.getElementById("msg").innerHTML = '<span class="ng">もう一回（いっかい）考（かんが）えよう</span>';
  }

  document.getElementById("tip").classList.remove("hidden");
  document.getElementById("tip").innerHTML = '<div class="title">練習（れんしゅう）ことば</div><div class="tip">' + tip + '</div>';

  setTimeout(() => {
    index++;
    show();
  }, 1700);
}

function nextQuestion() {
  if (deck.length === 0) start();
  else {
    index++;
    show();
  }
}
</script>
</body></html>
