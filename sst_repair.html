<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta http-equiv="refresh" content="0; url=sst_quiz.html"><title>SST</title><style>

/* ===== Ver.3.1.4.3.2 mobile readability fix ===== */
html{font-size:16px}
body{overflow-x:hidden}
.wrap{width:min(980px,96vw)!important}
.panel{border-radius:26px!important;padding:clamp(16px,4vw,28px)!important}
.grid{gap:14px!important}
.card,.menu{border-radius:22px!important}
button,.pill,.choice,.sstChoice,.tile,.modeBtn{
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
button{min-height:54px!important;padding:13px 18px!important;font-size:clamp(17px,4vw,22px)!important}
.choices,.sstChoices{gap:12px!important}
.choice,.sstChoice,.tile{
  min-height:58px;
  padding:14px!important;
  line-height:1.55!important;
  word-break:keep-all;
  overflow-wrap:anywhere;
}
.scene{line-height:1.65!important}
ruby.autoRuby{ruby-position:over;display:inline-ruby;line-height:1.25}
ruby.autoRuby rb{display:ruby-base}
ruby.autoRuby rt{display:ruby-text;font-size:.46em!important;line-height:1!important;color:#475569;font-weight:800;text-align:center}
.fullOverlay{
  position:fixed;inset:0;z-index:9999;
  display:flex;align-items:center;justify-content:center;
  background:rgba(22,163,74,.92);color:white;
  font-size:clamp(58px,16vw,128px);font-weight:1000;
  letter-spacing:.04em;text-shadow:0 6px 20px rgba(0,0,0,.25);
}
.hidden{display:none!important}
@media(max-width:640px){
  .top{position:static!important}
  .nav{gap:8px;flex-wrap:wrap}
  h1{font-size:clamp(27px,8vw,42px)!important}
  .lead{font-size:16px!important;line-height:1.6!important}
  .status{gap:7px!important;justify-content:center!important}
  .badge{font-size:14px!important;padding:7px 9px!important}
  .choices,.sstChoices{grid-template-columns:1fr!important}
  .grid{grid-template-columns:1fr!important}
  ruby.autoRuby rt{font-size:.42em!important}
}


/* ===== Ver.3.1.4.3.2.2 iPad no-scroll layout fix ===== */
@media (min-width:641px) and (max-width:1180px){
  html,body{overflow-x:hidden}
  .wrap{width:96vw!important;max-width:1040px!important}
  .top{position:static!important;margin-bottom:0!important}
  .nav{min-height:auto!important;padding:5px 0!important;gap:8px!important}
  .panel{margin-top:6px!important;padding:12px 16px!important;border-radius:22px!important}
  h1{font-size:28px!important;margin:4px 0 6px!important;line-height:1.15!important}
  .lead{font-size:14px!important;line-height:1.35!important;margin:3px 0 6px!important}
  .status{margin:4px 0 6px!important;gap:6px!important}
  .badge,.pill,.nav a{font-size:12px!important;padding:5px 8px!important;line-height:1.1!important}
  .illust{font-size:34px!important;line-height:1!important;margin:0!important}
  .actions{margin:6px 0!important;gap:8px!important}
  button{min-height:42px!important;padding:8px 12px!important;font-size:15px!important;border-radius:16px!important}
  .scene,.tenScene{min-height:56px!important;padding:8px 10px!important;font-size:18px!important;line-height:1.28!important;border-radius:18px!important}
  .choices,.tenChoices,.sstChoices{gap:7px!important;margin-top:7px!important}
  .choice,.tenChoice,.sstChoice,.tile{min-height:40px!important;padding:8px 10px!important;font-size:15px!important;line-height:1.25!important;border-radius:16px!important;text-align:center!important}
  .timerBar,.tenTimerBar{height:9px!important;margin:5px 0!important}
  .message,.tip,.report{margin-top:6px!important;padding:8px 10px!important;line-height:1.28!important;font-size:14px!important}
  .tenReportItem,.reportItem{padding:8px 10px!important;margin:6px 0!important;line-height:1.3!important;font-size:13px!important}
  .footer{display:none!important}
  #report:not(.hidden){max-height:42vh!important;overflow:auto!important}
  #choices.tenChoices{max-height:38vh!important;overflow:auto!important}
}
@media (min-width:641px) and (max-width:900px) and (orientation:portrait){
  .lead{display:none!important}
  .illust{display:none!important}
  h1{font-size:25px!important}
  .panel{padding:10px 14px!important}
  .scene,.tenScene{min-height:52px!important;font-size:17px!important}
  .choice,.tenChoice,.sstChoice{min-height:38px!important;font-size:14px!important;padding:7px 9px!important}
  .actions button{min-height:38px!important}
}
@media (min-width:900px) and (max-width:1180px) and (orientation:landscape){
  .tenChoices,.choices{grid-template-columns:1fr 1fr!important}
}


/* ===== Ver.3.1.4.4 iPad landscape one-screen all games ===== */
@media (min-width:768px) and (max-width:1366px) and (orientation:landscape){
  html,body{
    width:100%;
    min-height:100dvh;
    overflow-x:hidden;
  }
  body{
    font-size:14px!important;
  }
  .wrap{
    width:98vw!important;
    max-width:1180px!important;
    margin-inline:auto!important;
  }
  .top{
    position:static!important;
    margin:0!important;
    padding:0!important;
  }
  .nav{
    min-height:auto!important;
    padding:3px 0!important;
    gap:6px!important;
    flex-wrap:wrap!important;
  }
  .nav a,.pill,.badge{
    font-size:11px!important;
    padding:4px 7px!important;
    line-height:1.1!important;
    border-radius:999px!important;
  }
  .panel{
    margin-top:4px!important;
    padding:8px 12px!important;
    border-radius:18px!important;
  }
  h1{
    font-size:22px!important;
    line-height:1.1!important;
    margin:2px 0 4px!important;
  }
  h2{
    font-size:18px!important;
    margin:4px 0!important;
  }
  .lead{
    display:none!important;
  }
  .illust{
    display:none!important;
  }
  .status{
    margin:2px 0 4px!important;
    gap:5px!important;
    justify-content:center!important;
    flex-wrap:wrap!important;
  }
  .actions{
    margin:4px 0!important;
    gap:6px!important;
    justify-content:center!important;
    flex-wrap:wrap!important;
  }
  button{
    min-height:34px!important;
    padding:6px 10px!important;
    font-size:13px!important;
    line-height:1.15!important;
    border-radius:14px!important;
    touch-action:manipulation;
  }
  .scene,.tenScene{
    min-height:44px!important;
    padding:6px 9px!important;
    font-size:15px!important;
    line-height:1.22!important;
    border-radius:15px!important;
  }
  .choices,.tenChoices,.sstChoices{
    gap:6px!important;
    margin-top:6px!important;
  }
  .choice,.tenChoice,.sstChoice,.tile{
    min-height:34px!important;
    padding:6px 8px!important;
    font-size:13px!important;
    line-height:1.2!important;
    border-radius:14px!important;
    border-width:2px!important;
    text-align:center!important;
  }
  .sstChoice::before{
    display:inline-block!important;
    font-size:10px!important;
    padding:1px 6px!important;
    margin-right:5px!important;
  }
  .message,.tip,.report,.sstExplain{
    margin-top:5px!important;
    padding:6px 8px!important;
    line-height:1.25!important;
    font-size:12px!important;
    border-radius:14px!important;
  }
  .reportItem,.tenReportItem{
    margin:5px 0!important;
    padding:6px 8px!important;
    line-height:1.25!important;
    font-size:12px!important;
  }
  .timerBar,.tenTimerBar{
    height:7px!important;
    margin:3px 0!important;
  }
  .footer{
    display:none!important;
  }

  /* game-specific compacting */
  .memoryShow{
    font-size:48px!important;
    margin:2px 0!important;
    line-height:1!important;
  }
  .memoryCards{
    display:grid!important;
    grid-template-columns:repeat(3,1fr)!important;
    gap:6px!important;
  }
  .memoryCards button{
    min-height:48px!important;
    font-size:30px!important;
    padding:3px!important;
  }

  .colorGrid{
    display:grid!important;
    grid-template-columns:repeat(3,1fr)!important;
    gap:7px!important;
    margin-top:6px!important;
  }
  .colorBtn,.colorChoice{
    height:46px!important;
    min-height:46px!important;
    border-radius:14px!important;
    border-width:3px!important;
  }

  .visionArea{
    height:58dvh!important;
    min-height:250px!important;
    margin-top:6px!important;
    border-radius:18px!important;
  }
  .target,.numTarget{
    width:52px!important;
    height:52px!important;
    min-height:52px!important;
    font-size:26px!important;
    border-radius:15px!important;
    border-width:3px!important;
    padding:0!important;
  }

  /* menu pages in landscape */
  .grid{
    gap:8px!important;
  }
  .card,.menu{
    padding:10px!important;
    border-radius:16px!important;
  }
  .card .icon,.menu .icon{
    font-size:26px!important;
    line-height:1!important;
  }
  .card .title,.menu .title{
    font-size:16px!important;
    margin:1px 0!important;
  }
  .card .desc,.menu .desc{
    font-size:11px!important;
    line-height:1.25!important;
  }

  /* keep reports inside viewport */
  #report:not(.hidden), .report:not(.hidden){
    max-height:40dvh!important;
    overflow:auto!important;
  }
}

/* iPad landscape: two-column answers where useful */
@media (min-width:900px) and (max-width:1366px) and (orientation:landscape){
  .choices,.tenChoices{
    grid-template-columns:1fr 1fr!important;
  }
  .sstChoices{
    grid-template-columns:1fr 1fr!important;
  }
}

/* keep pages with many choices playable */
@media (min-width:768px) and (max-width:1366px) and (orientation:landscape){
  #choices{
    max-height:45dvh!important;
    overflow:auto!important;
  }
  #area{
    max-height:60dvh!important;
  }
}

</style>
