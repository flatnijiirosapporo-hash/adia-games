<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>成長記録</title><style>
body{margin:0;font-family:system-ui,sans-serif;background:#f8fafc;color:#1f2937;text-align:center;user-select:none}
header{background:white;padding:24px 16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1{margin:0 0 8px;font-size:32px}.sub{font-size:17px;color:#64748b;line-height:1.6}
main{max-width:680px;margin:0 auto;padding:20px}.grid{display:grid;gap:14px}
.card{background:white;border-radius:26px;padding:20px;text-align:left;box-shadow:0 5px 14px rgba(0,0,0,.12);border:5px solid white}
a{text-decoration:none;color:inherit}.title{font-size:24px;font-weight:800;margin-bottom:6px}.desc{font-size:16px;color:#475569;line-height:1.55}
button{font-size:22px;padding:12px 26px;border:0;border-radius:999px;background:#2563eb;color:white;font-weight:700;margin:6px;cursor:pointer}
.choice{background:white;border:5px solid #dbeafe;border-radius:24px;padding:22px 10px;font-size:28px;font-weight:800;box-shadow:0 3px 9px rgba(0,0,0,.12);cursor:pointer}
.choices{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:16px}.big{font-size:34px;font-weight:800;margin:20px 0;line-height:1.5}
.hidden{display:none}.back{display:inline-block;margin-top:16px;color:#2563eb;font-weight:700}.ok{color:#16a34a}.ng{color:#dc2626}
.bar-bg{height:24px;background:#e5e7eb;border-radius:999px;overflow:hidden}.bar{height:24px;background:#22c55e}.report{text-align:left;line-height:1.8}
@media print{button,.back{display:none}.card{box-shadow:none;border:1px solid #ddd}body{background:white}}
</style></head><body>
<header><h1>⭐ 成長記録</h1><div class="sub">評価ではなく、今日の挑戦を残します</div></header>
<main><section class="card report">
<h2>今日のがんばり</h2>
<p>できた活動にチェックしてください。</p>
<label><input type="checkbox"> フラトレに挑戦した</label><br>
<label><input type="checkbox"> 運動あそびに挑戦した</label><br>
<label><input type="checkbox"> 公園チャレンジに挑戦した</label><br>
<label><input type="checkbox"> もう一回やってみた</label><br>
<label><input type="checkbox"> 気持ちをことばにできた</label><br>
<button onclick="save()">今日の記録を保存</button>
<div id="msg" class="big"></div>
</section><a class="back" href="index.html">← TOPへ</a></main>
<script>
function save(){localStorage.setItem('nijifla_today',new Date().toLocaleString());document.getElementById('msg').textContent='保存しました ⭐ 今日も挑戦できました！';}
</script>
</body></html>
