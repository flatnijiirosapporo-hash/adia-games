<!DOCTYPE html>
<html lang="ja"><head><meta charset="utf-8"/><meta content="width=device-width,initial-scale=1" name="viewport"/><title>色タッチ</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,'Yu Gothic','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}
a{text-decoration:none;color:inherit}
.wrap{width:min(980px,92vw);margin:0 auto}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0}
.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-weight:900}
.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}
.hero{padding:30px 0 16px}
.brand{display:inline-block;background:#fff;border-radius:999px;padding:8px 16px;box-shadow:0 8px 25px rgba(30,41,59,.08);font-weight:900}
h1{font-size:clamp(32px,6vw,54px);line-height:1.15;margin:16px 0 8px}
.lead{color:#64748b;font-size:clamp(17px,3vw,22px)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:20px 0 34px}
.card{background:rgba(255,255,255,.95);border-radius:30px;padding:22px;box-shadow:0 15px 45px rgba(30,41,59,.10);border:1px solid rgba(255,255,255,.85)}
.menu{min-height:150px}.icon{font-size:52px}.title{font-size:24px;font-weight:900;margin-bottom:8px}.desc{font-size:16px;color:#64748b}
.panel{background:rgba(255,255,255,.96);border-radius:34px;padding:22px;box-shadow:0 18px 55px rgba(30,41,59,.12);margin:22px 0 38px}
.status{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-weight:800;margin-bottom:12px}
.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}
.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}
.scene{font-size:clamp(24px,5vw,34px);font-weight:900;text-align:center;line-height:1.55;white-space:pre-line;margin:10px 0 18px}
.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
button{border:0;border-radius:999px;padding:13px 22px;font-size:20px;font-weight:900;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;box-shadow:0 10px 25px rgba(79,70,229,.22);cursor:pointer}
button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}
button.gray{background:#64748b}
.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}
.correct{border-color:#86efac!important;background:#f0fdf4!important}.wrong{border-color:#fca5a5!important;background:#fef2f2!important}
.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}
.tip,.report{margin-top:14px;border-radius:26px;padding:18px;background:#f8fafc;border:2px solid #e2e8f0}.tip{background:#ecfdf5;border-color:#bbf7d0}.report{background:#fff7ed;border-color:#fed7aa}
.reportItem{background:#fff;border:3px solid #fed7aa;border-radius:22px;padding:16px;margin:14px 0}
.hidden{display:none!important}
.footer{text-align:center;color:#64748b;padding:22px}
.shape{width:90px;height:90px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;border:5px solid #fff;box-shadow:0 8px 20px rgba(30,41,59,.12)}
.red{background:#ef4444}.blue{background:#3b82f6}.yellow{background:#facc15}.green{background:#22c55e}.purple{background:#a855f7}.orange{background:#fb923c}
@media(min-width:720px){.choices{grid-template-columns:1fr 1fr}.panel{padding:30px}}

.colorBoard{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
  margin-top:16px;
}
.colorCard{
  min-height:115px;
  border-radius:26px;
  background:white;
  border:5px solid #dbeafe;
  box-shadow:0 10px 24px rgba(30,41,59,.10);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-weight:900;
  cursor:pointer;
  padding:12px;
}
.colorWord{
  font-size:clamp(34px,8vw,58px);
  line-height:1.1;
}
.colorKana{
  font-size:16px;
  color:#64748b;
  margin-top:6px;
}
.modeLine{
  background:#eef2ff;
  color:#3730a3;
  padding:10px 16px;
  border-radius:999px;
  font-weight:900;
  display:inline-block;
}
.redText{color:#ef4444}.blueText{color:#2563eb}.yellowText{color:#ca8a04}.greenText{color:#16a34a}.purpleText{color:#9333ea}.orangeText{color:#ea580c}.blackText{color:#111827}
.redBg{background:#fee2e2}.blueBg{background:#dbeafe}.yellowBg{background:#fef3c7}.greenBg{background:#dcfce7}.purpleBg{background:#f3e8ff}.orangeBg{background:#ffedd5}
@media(min-width:760px){.colorBoard{grid-template-columns:repeat(3,1fr)}}

.scoreLiveHide{display:none!important}

.liveResultHide{display:none!important}



/* ===== Ver.1.1 automatic furigana ===== */
ruby.autoRuby{
  ruby-position:over;
}
ruby.autoRuby rt{
  font-size:.55em;
  line-height:1;
  color:#475569;
  font-weight:900;
  text-align:center;
}
@media(max-width:640px){
  ruby.autoRuby rt{
    font-size:.48em;
  }
  ruby.autoRuby{
    line-height:1.15;
  }
}
.themeText{
  margin:12px auto 0;
  color:#334155;
  font-weight:1000;
  font-size:clamp(17px,2.5vw,22px);
  text-align:center;
}
</style></head><body><div class="top"><div class="wrap nav"><a href="flatore.html">← もどる</a><span class="pill">🌈 にじフラ</span></div></div>
<main class="wrap"><section class="panel">
<div class="status">
<span class="badge"><ruby class="autoRuby">問題<rt>もんだい</rt></ruby> <span id="num">0</span>/20</span>
<span class="badge scoreLiveHide"><ruby class="autoRuby">正解<rt>せいかい</rt></ruby> <span id="score">0</span></span>
<span class="badge liveResultHide">ミス <span id="miss">0</span></span>
<span class="badge">モード <span id="modeName"><ruby class="autoRuby">色<rt>いろ</rt></ruby></span></span>
</div>
<div class="illust">🎨</div>
<h1 style="text-align:center"><ruby class="autoRuby">色<rt>いろ</rt></ruby>タッチ</h1>
<p class="lead" style="text-align:center">
<ruby class="autoRuby">文字<rt>もじ</rt></ruby>にまどわされず、よく<ruby class="autoRuby">見<rt>み</rt></ruby>て<ruby class="autoRuby">選<rt>せん</rt></ruby>びます。<br/>
<ruby class="autoRuby">漢字<rt>よみ</rt></ruby>・ひらがな・カタカナ・<ruby class="autoRuby">文字色<rt>ぶん字いろ</rt></ruby>のひっかけがあります。
  </p>
<div class="actions">
<button onclick="start()">スタート</button>
<button class="light" onclick="readQ()">🔊 よみあげ</button>
</div>
<div class="scene" id="instruction">スタートを<ruby class="autoRuby">押<rt>よみ</rt></ruby>してね</div>
<div id="hint" style="text-align:center"></div>
<div class="colorBoard" id="board"></div>
<div class="message" id="msg"></div>
<div class="report hidden" id="report"></div>
</section></main>
<script>
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function esc(s){return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function stripFurigana(text){return String(text).replace(/([一-龯々〆ヶ]+)（[ぁ-んァ-ンー]+）/g,"$1").replace(/（[ぁ-んァ-ンー]+）/g,"").replace(/\n/g,"。")}
function speakText(text){if(!("speechSynthesis" in window))return;const u=new SpeechSynthesisUtterance(stripFurigana(text));u.lang="ja-JP";u.rate=.82;speechSynthesis.cancel();speechSynthesis.speak(u)}
</script>
<script>
const colors = [
  {key:"red", jp:"赤", hira:"あか", kata:"アカ", css:"redText", bg:"redBg", speak:"あか"},
  {key:"blue", jp:"青", hira:"あお", kata:"アオ", css:"blueText", bg:"blueBg", speak:"あお"},
  {key:"yellow", jp:"黄", hira:"きいろ", kata:"キイロ", css:"yellowText", bg:"yellowBg", speak:"きいろ"},
  {key:"green", jp:"緑", hira:"みどり", kata:"ミドリ", css:"greenText", bg:"greenBg", speak:"みどり"},
  {key:"purple", jp:"紫", hira:"むらさき", kata:"ムラサキ", css:"purpleText", bg:"purpleBg", speak:"むらさき"},
  {key:"orange", jp:"橙", hira:"だいだい", kata:"オレンジ", css:"orangeText", bg:"orangeBg", speak:"オレンジ"}
];

const modes = [
  {id:"meaning", name:"文字の意味", text:"文字の意味で選ぼう"},
  {id:"ink", name:"文字の色", text:"文字の色で選ぼう"},
  {id:"kana", name:"かな", text:"同じ読み方を選ぼう"},
  {id:"mixed", name:"まぜまぜ", text:"お題をよく読んで選ぼう"}
];

let deck=[], i=0, score=0, miss=0, answered=false, wrong=[], currentText="";

function rand(arr){return arr[Math.floor(Math.random()*arr.length)]}

function makeDeck(){
  const d=[];
  for(let r=0;r<6;r++){
    colors.forEach(c=>{
      d.push({mode:"meaning", target:c});
      d.push({mode:"ink", target:c});
      d.push({mode:"kana", target:c});
      d.push({mode:"mixed", target:c});
    });
  }
  return shuffle(d);
}

function start(){
  deck=makeDeck().slice(0,20);
  i=0; score=0; miss=0; wrong=[];
  document.getElementById("score").textContent=score;
  document.getElementById("miss").textContent=miss;
  document.getElementById("report").classList.add("hidden");
  document.getElementById("report").innerHTML="";
  show();
}

function show(){
  answered=false;
  document.getElementById("msg").textContent="";
  document.getElementById("board").innerHTML="";
  document.getElementById("hint").innerHTML="";
  if(i>=deck.length){finish();return;}

  const q=deck[i];
  document.getElementById("num").textContent=i+1;

  let mode=q.mode;
  if(mode==="mixed") mode=rand(["meaning","ink","kana"]);
  const modeObj=modes.find(m=>m.id===mode);
  document.getElementById("modeName").textContent=modeObj.name;

  let instruction="";
  if(mode==="meaning"){
    instruction="「"+q.target.jp+"（"+q.target.hira+"）」を選ぼう";
    currentText=q.target.speak+"を選ぼう";
  }
  if(mode==="ink"){
    instruction="文字の色が「"+q.target.jp+"（"+q.target.hira+"）」のものを選ぼう";
    currentText="文字の色が"+q.target.speak+"のものを選ぼう";
  }
  if(mode==="kana"){
    instruction="読み方が「"+q.target.hira+"」のものを選ぼう";
    currentText="読み方が"+q.target.speak+"のものを選ぼう";
  }

  document.getElementById("instruction").textContent=instruction;
  document.getElementById("hint").innerHTML='<span class="modeLine">'+modeObj.text+'</span>';

  const cards=makeCards(q.target, mode);
  cards.forEach(card=>addCard(card, q.target, mode, instruction));
}

function makeCards(target, mode){
  const picked=shuffle(colors).slice(0,6);
  if(!picked.some(c=>c.key===target.key)) picked[0]=target;

  return shuffle(picked.map(c=>{
    const ink=rand(colors);
    const notation=rand(["jp","hira","kata"]);
    let label=c[notation];
    let sub=notation==="jp" ? c.hira : c.jp;

    // ensure correct exists for ink mode
    let inkColor=ink;
    if(mode==="ink" && c.key===target.key){
      inkColor=target;
    }

    // for some decoys, create Stroop conflict intentionally
    if(mode==="meaning" && c.key===target.key){
      inkColor=rand(colors.filter(x=>x.key!==target.key));
    }

    return {
      meaning:c.key,
      ink:inkColor.key,
      label,
      sub,
      textColor:inkColor.css,
      bg:rand(colors).bg
    };
  }));
}

function addCard(card, target, mode, instruction){
  const div=document.createElement("div");
  div.className="colorCard "+card.bg;
  div.innerHTML='<div class="colorWord '+card.textColor+'">'+esc(card.label)+'</div><div class="colorKana">'+esc(card.sub)+'</div>';
  div.onclick=()=>answer(div, card, target, mode, instruction);
  document.getElementById("board").appendChild(div);
}

function answer(div, card, target, mode, instruction){
  if(answered)return;
  answered=true;
  document.querySelectorAll(".colorCard").forEach(x=>x.style.pointerEvents="none");

  let ok=false;
  if(mode==="meaning") ok = card.meaning===target.key;
  if(mode==="ink") ok = card.ink===target.key;
  if(mode==="kana") ok = card.meaning===target.key;

  if(ok){
    score++;
    document.getElementById("score").textContent=score;
    div.classList.add("correct");
    document.getElementById("msg").innerHTML='<span class="ok">いいね！ よく見ました</span>';
  }else{
    miss++;
    document.getElementById("miss").textContent=miss;
    div.classList.add("wrong");
    wrong.push({
      instruction,
      mode,
      selected:card.label,
      target:target.jp+"（"+target.hira+"）",
      point: mode==="ink" ? "文字の意味ではなく、文字の色を見る問題でした。" :
             mode==="meaning" ? "文字の色ではなく、文字の意味を見る問題でした。" :
             "漢字・ひらがな・カタカナの読み方を見る問題でした。"
    });
    document.getElementById("msg").innerHTML='<span class="ng">もう一回見てみよう</span>';
  }

  setTimeout(()=>{i++;show();},1200);
}

function finish(){
  document.getElementById("instruction").textContent="おしまい！";
  document.getElementById("hint").innerHTML="";
  document.getElementById("board").innerHTML="";
  document.getElementById("msg").innerHTML='<span class="ok">'+score+' / 20 問できました</span>';

  const r=document.getElementById("report");
  r.classList.remove("hidden");
  let h="<h2>色タッチ レポート</h2>";
  h+="<p>文字の意味・文字の色・読み方を切り替えて見る練習です。</p>";
  h+='<div class="reportItem"><b>結果</b><br>正解 '+score+' / 20　ミス '+miss+'</div>';

  if(wrong.length){
    h+="<h3>まちがえた問題</h3>";
    wrong.forEach((w,n)=>{
      h+='<div class="reportItem">';
      h+='<b>'+(n+1)+'. '+esc(w.instruction)+'</b><br>';
      h+='<span class="ng">選んだもの：</span>'+esc(w.selected)+'<br>';
      h+='<span class="ok">見るポイント：</span>'+esc(w.point);
      h+='</div>';
    });
  }else{
    h+='<div class="reportItem">まちがえた問題はありませんでした。</div>';
  }

  h+='<div class="actions"><button onclick="window.print()">印刷</button><button class="light" onclick="start()">もう一回</button></div>';
  r.innerHTML=h;
}

function readQ(){speakText(currentText || document.getElementById("instruction").textContent)}
</script>
</body></html>
