<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>色タッチ</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #fff7ed;
      text-align: center;
      user-select: none;
    }

    header {
      padding: 14px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .info {
      font-size: 18px;
      margin: 4px;
    }

    button {
      font-size: 22px;
      padding: 12px 28px;
      border: none;
      border-radius: 999px;
      background: #ef4444;
      color: white;
      cursor: pointer;
    }

    #message {
      font-size: 22px;
      margin: 10px;
      color: #333;
    }

    #game {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      padding: 20px;
      max-width: 430px;
      margin: 0 auto;
    }

    .color-btn {
      height: 105px;
      border-radius: 24px;
      border: 6px solid white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      cursor: pointer;
      transition: transform 0.08s;
    }

    .color-btn:active {
      transform: scale(0.95);
    }

    .red { background: #ef4444; }
    .blue { background: #3b82f6; }
    .yellow { background: #facc15; }
    .green { background: #22c55e; }
  </style>
</head>
<body>
  <header>
    <h1>🔴色タッチ</h1>
    <div class="info">赤だけ押して！</div>
    <div class="info">残り時間：<span id="time">30</span> 秒</div>
    <div class="info">正解：<span id="score">0</span>　ミス：<span id="miss">0</span></div>
    <button onclick="startGame()">スタート</button>
    <div id="message">赤を見つけたらタップ！</div>
  </header>

  <main id="game"></main>

  <script>
    const game = document.getElementById("game");
    const timeText = document.getElementById("time");
    const scoreText = document.getElementById("score");
    const missText = document.getElementById("miss");
    const message = document.getElementById("message");

    const colors = ["red", "blue", "yellow", "green"];
    let score = 0;
    let miss = 0;
    let timeLeft = 30;
    let playing = false;
    let gameTimer = null;
    let changeTimer = null;

    function startGame() {
      score = 0;
      miss = 0;
      timeLeft = 30;
      playing = true;

      scoreText.textContent = score;
      missText.textContent = miss;
      timeText.textContent = timeLeft;
      message.textContent = "赤だけタップ！";

      clearInterval(gameTimer);
      clearTimeout(changeTimer);

      makeButtons();

      gameTimer = setInterval(() => {
        timeLeft--;
        timeText.textContent = timeLeft;

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);

      autoChange();
    }

    function makeButtons() {
      game.innerHTML = "";

      for (let i = 0; i < 9; i++) {
        const btn = document.createElement("div");
        const color = colors[Math.floor(Math.random() * colors.length)];
        btn.className = "color-btn " + color;
        btn.dataset.color = color;

        btn.addEventListener("click", () => {
          if (!playing) return;

          if (btn.dataset.color === "red") {
            score++;
            scoreText.textContent = score;
            message.textContent = "正解！";
          } else {
            miss++;
            missText.textContent = miss;
            message.textContent = "赤だけだよ";
          }

          makeButtons();
        });

        game.appendChild(btn);
      }
    }

    function autoChange() {
      if (!playing) return;

      makeButtons();
      changeTimer = setTimeout(autoChange, 1400);
    }

    function endGame() {
      playing = false;
      clearInterval(gameTimer);
      clearTimeout(changeTimer);
      game.innerHTML = "";
      message.textContent = "おしまい！ 正解 " + score + " 回 / ミス " + miss + " 回 ⭐";
    }
  </script>
</body>
</html>
