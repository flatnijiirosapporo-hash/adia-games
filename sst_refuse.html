<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>🙅 断（ことわ）る練習（れんしゅう）</title><style>
body{margin:0;font-family:system-ui,sans-serif;background:#f8fafc;color:#1f2937;text-align:center;user-select:none}
header{background:white;padding:24px 16px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
h1{margin:0 0 8px;font-size:32px}.sub{font-size:17px;color:#64748b;line-height:1.6}
main{max-width:760px;margin:0 auto;padding:20px}.grid{display:grid;gap:14px}
.card{background:white;border-radius:26px;padding:20px;text-align:left;box-shadow:0 5px 14px rgba(0,0,0,.12);border:5px solid white}
a{text-decoration:none;color:inherit}.title{font-size:24px;font-weight:800;margin-bottom:6px}.desc{font-size:16px;color:#475569;line-height:1.55}
button{font-size:22px;padding:12px 26px;border:0;border-radius:999px;background:#2563eb;color:white;font-weight:700;margin:6px;cursor:pointer}
.choice{background:white;border:5px solid #dbeafe;border-radius:24px;padding:20px 10px;font-size:23px;font-weight:800;box-shadow:0 3px 9px rgba(0,0,0,.12);cursor:pointer;line-height:1.55}
.choices{display:grid;grid-template-columns:repeat(1,1fr);gap:14px;margin-top:16px}.big{font-size:30px;font-weight:800;margin:20px 0;line-height:1.6;white-space:pre-line}
.hidden{display:none}.back{display:inline-block;margin-top:16px;color:#2563eb;font-weight:700}.ok{color:#16a34a}.ng{color:#dc2626}
.point{background:#ecfdf5;border-color:#bbf7d0}.tip{font-size:18px;line-height:1.8;color:#334155;white-space:pre-line}
.status{font-size:18px;color:#475569;margin-top:8px}.small{font-size:15px;color:#64748b;line-height:1.6}
</style></head><body>
<header>
  <h1>🙅 断（ことわ）る練習（れんしゅう）</h1>
  <div class="sub">問題（もんだい）はランダムに出（で）ます。正解（せいかい）判定（はんてい）を修正（しゅうせい）済（ず）みです。</div>
</header>
<main>
<section class="card">
  <div class="status">カテゴリ：<span id="cat">-</span>　問題（もんだい）：<span id="num">0</span> / <span id="total">10</span>　正解（せいかい）：<span id="score">0</span></div>
  <div id="scene" class="big">スタートしてね</div>
  <div id="choices" class="choices"></div>
  <div id="msg" class="big"></div>
  <div id="tip" class="card point hidden"></div>
  <button onclick="start()">スタート</button>
  <button onclick="nextQuestion()">つぎの問題（もんだい）</button>
</section>
<a class="back" href="sst.html">← SSTへ</a>
</main>
<script>
const allQuestions = [{"cat": "断る練習", "scene": "したくない遊（あそ）びに誘（さそ）われた。\nどうする？", "choices": [{"text": "「今（いま）はやめておくね」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "大事（だいじ）な物（もの）を貸（か）したくない。\nどうする？", "choices": [{"text": "「これは大事（だいじ）だから貸（か）せない」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "危（あぶ）ないことに誘（さそ）われた。\nどうする？", "choices": [{"text": "「それは危（あぶ）ないからやめる」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "いやなあだ名（な）で呼（よ）ばれた。\nどうする？", "choices": [{"text": "「その呼（よ）び方（かた）はいや」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "まだ遊（あそ）びたいけど帰（かえ）る時間（じかん）。\nどうする？", "choices": [{"text": "「また今度（こんど）遊（あそ）ぼう」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "一人（ひとり）で休（やす）みたい。\nどうする？", "choices": [{"text": "「今（いま）は休（やす）みたい」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "写真（しゃしん）を撮（と）られたくない。\nどうする？", "choices": [{"text": "「撮（と）らないで」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "押（お）されたくない。\nどうする？", "choices": [{"text": "「押（お）さないで」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "大（おお）きな声（こえ）が苦手（にがて）。\nどうする？", "choices": [{"text": "「少（すこ）し小（ちい）さい声（こえ）にして」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "順番（じゅんばん）を抜（ぬ）かされそう。\nどうする？", "choices": [{"text": "「後（うし）ろに並（なら）んでね」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "使（つか）っている物（もの）を取（と）られそう。\nどうする？", "choices": [{"text": "「今（いま）使（つか）っているよ」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "ゲームをやめたくなった。\nどうする？", "choices": [{"text": "「今日はここまでにする」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "友（とも）だちの誘（さそ）いが強（つよ）い。\nどうする？", "choices": [{"text": "「ごめんね、やらない」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "苦手（にがて）な活動（かつどう）に誘（さそ）われた。\nどうする？", "choices": [{"text": "「少（すこ）し見学（けんがく）する」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "近（ちか）くに来（こ）られすぎていや。\nどうする？", "choices": [{"text": "「少（すこ）し離（はな）れて」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "物（もの）を交換（こうかん）したくない。\nどうする？", "choices": [{"text": "「交換（こうかん）はしない」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "からかわれている。\nどうする？", "choices": [{"text": "「やめて」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "無理（むり）に急（いそ）がされる。\nどうする？", "choices": [{"text": "「少（すこ）し待（ま）って」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "遊具（ゆうぐ）で危（あぶ）ない遊（あそ）びを誘（さそ）われた。\nどうする？", "choices": [{"text": "「危（あぶ）ないからやめる」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}, {"cat": "断る練習", "scene": "秘密（ひみつ）にしてと言（い）われたけど心配（しんぱい）。\nどうする？", "choices": [{"text": "「先生（せんせい）に相談（そうだん）する」と言（い）う", "ok": true}, {"text": "無理（むり）してやる", "ok": false}, {"text": "怒鳴（どな）る", "ok": false}, {"text": "押（お）す", "ok": false}], "tip": "断（ことわ）る時（とき）は、短（みじか）く、やさしく、はっきり言（い）おう。"}];
let deck = [];
let index = 0;
let score = 0;
let answered = false;
const total = Math.min(10, allQuestions.length);

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function start() {
  deck = shuffle(allQuestions).slice(0, total);
  index = 0;
  score = 0;
  answered = false;
  document.getElementById("score").textContent = score;
  document.getElementById("total").textContent = total;
  show();
}

function show() {
  answered = false;
  document.getElementById("msg").textContent = "";
  document.getElementById("tip").classList.add("hidden");

  if (index >= deck.length) {
    document.getElementById("cat").textContent = "-";
    document.getElementById("num").textContent = total;
    document.getElementById("scene").textContent = "おしまい！\n" + score + " / " + total + " 問（もん）できました ⭐";
    document.getElementById("choices").innerHTML = "";
    document.getElementById("tip").classList.remove("hidden");
    document.getElementById("tip").innerHTML = '<div class="title">今日（きょう）のポイント</div><div class="tip">できた・できないより、「考（かんが）えた」「戻（もど）れた」「言葉（ことば）を選（えら）べた」ことが大切（たいせつ）です。</div>';
    return;
  }

  const q = deck[index];
  document.getElementById("cat").textContent = q.cat;
  document.getElementById("num").textContent = index + 1;
  document.getElementById("scene").textContent = q.scene;
  document.getElementById("choices").innerHTML = "";

  shuffle(q.choices).forEach(item => {
    const div = document.createElement("div");
    div.className = "choice";
    div.textContent = item.text;
    div.onclick = () => answer(item.ok, q.tip);
    document.getElementById("choices").appendChild(div);
  });
}

function answer(ok, tip) {
  if (answered) return;
  answered = true;

  if (ok) {
    score++;
    document.getElementById("score").textContent = score;
    document.getElementById("msg").innerHTML = '<span class="ok">いい選（えら）び方（かた）！</span>';
  } else {
    document.getElementById("msg").innerHTML = '<span class="ng">もう一回（いっかい）考（かんが）えよう</span>';
  }

  document.getElementById("tip").classList.remove("hidden");
  document.getElementById("tip").innerHTML = '<div class="title">練習（れんしゅう）ことば</div><div class="tip">' + tip + '</div>';

  setTimeout(() => {
    index++;
    show();
  }, 1700);
}

function nextQuestion() {
  if (deck.length === 0) start();
  else {
    index++;
    show();
  }
}
</script>
</body></html>
