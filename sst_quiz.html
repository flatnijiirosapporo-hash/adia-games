<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>問題形式SST</title><style>
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,'Yu Gothic','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}
a{text-decoration:none;color:inherit}
.wrap{width:min(980px,92vw);margin:0 auto}

.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-weight:900}
.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}
.hero{padding:30px 0 16px}

.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}
.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}

button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}
button.gray{background:#64748b}
.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}

.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}

.hidden{display:none!important}
.footer{text-align:center;color:#64748b;padding:22px}
.shape{width:90px;height:90px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;border:5px solid #fff;box-shadow:0 8px 20px rgba(30,41,59,.12)}

</section></main>
<script>
function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function stripFurigana(text){return String(text).replace(/([一-龯々〆ヶ]+)（[ぁ-んァ-ンー]+）/g,"$1").replace(/（[ぁ-んァ-ンー]+）/g,"").replace(/\n/g,"。")}
function speakText(text){if(!("speechSynthesis" in window))return;const u=new SpeechSynthesisUtterance(stripFurigana(text));u.lang="ja-JP";u.rate=.82;speechSynthesis.cancel();speechSynthesis.speak(u)}

let qDeck=[], qIndex=0, qScore=0, qWrong=[], qAll=[], qAnswered=false, qCurrent="";
function startQuiz(){
  qDeck = shuffle(QUIZ_DATA).slice(0,10);
  qIndex=0; qScore=0; qWrong=[]; qAll=[];
  document.getElementById("qMsg").textContent="";
  showQuiz();
}
function showQuiz(){
  qAnswered=false;
  document.getElementById("qMsg").textContent="";
  document.getElementById("qTip").classList.add("hidden");
  if(qIndex>=qDeck.length){finishQuiz();return;}
  const q=qDeck[qIndex];
  qCurrent=q.scene;
  document.getElementById("qNum").textContent=qIndex+1;
  document.getElementById("qCat").textContent=q.cat;
  document.getElementById("qIllust").textContent=q.illust;
  document.getElementById("qScene").textContent=q.scene;
  const box=document.getElementById("qChoices");
  box.innerHTML="";
  shuffle(q.choices).forEach(c=>{
    const d=document.createElement("div");
    d.className="quizChoice";
    d.textContent=c.text;
    d.onclick=()=>answerQuiz(c,d);
    box.appendChild(d);
  });
}
function answerQuiz(c,d){
  if(qAnswered)return;
  qAnswered=true;
  document.querySelectorAll(".quizChoice").forEach(x=>x.style.pointerEvents="none");
  const q=qDeck[qIndex];
  const good=q.choices.find(x=>x.ok);
  const item={no:qIndex+1,cat:q.cat,illust:q.illust,scene:q.scene,selected:c.text,correct:good?good.text:"",ok:c.ok,tip:q.tip};
  qAll.push(item);
  if(c.ok){qScore++;d.classList.add("correct");document.getElementById("qMsg").innerHTML='<span class="ok">いい選び方です</span>';}
  else{qWrong.push(item);d.classList.add("wrong");document.getElementById("qMsg").innerHTML='<span class="ng">もう一回考えよう</span>';}
  document.getElementById("qTip").classList.remove("hidden");
  document.getElementById("qTip").innerHTML='<b>ポイント</b><br>'+esc(q.tip);
  setTimeout(()=>{qIndex++;showQuiz();},1300);
}
function finishQuiz(){
  document.getElementById("qNum").textContent=10;
  document.getElementById("qIllust").textContent="⭐";
  document.getElementById("qScene").textContent="問題形式SST おしまい";
  document.getElementById("qChoices").innerHTML="";
  document.getElementById("qTip").classList.add("hidden");
  document.getElementById("qMsg").innerHTML='<span class="ok">最後まで取り組めました</span>';
  const quizRecords = JSON.parse(localStorage.getItem("nijifla_sst_quiz_records") || "[]");
  quizRecords.push({date:new Date().toLocaleString("ja-JP"),score:qScore,total:qAll.length,all:qAll,wrong:qWrong});
  localStorage.setItem("nijifla_sst_quiz_records", JSON.stringify(quizRecords));
}
function readQuiz(){speakText(qCurrent || document.getElementById("qScene").textContent);}
