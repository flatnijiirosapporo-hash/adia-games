<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>問題形式SST</title>
<style>

*{box-sizing:border-box}
body{margin:0;font-family:system-ui,'Yu Gothic','Hiragino Sans',sans-serif;background:linear-gradient(135deg,#f8fbff,#fff7ed);color:#203044;font-size:18px;line-height:1.7;user-select:none}
a{text-decoration:none;color:inherit}
.wrap{width:min(980px,92vw);margin:0 auto}
.top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid #e2e8f0}
.nav{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-weight:900}
.pill{background:#eef2ff;color:#3730a3;border-radius:999px;padding:8px 14px}
.hero{padding:30px 0 16px}
.brand{display:inline-block;background:#fff;border-radius:999px;padding:8px 16px;box-shadow:0 8px 25px rgba(30,41,59,.08);font-weight:900}
h1{font-size:clamp(32px,6vw,54px);line-height:1.15;margin:16px 0 8px}
.lead{color:#64748b;font-size:clamp(17px,3vw,22px)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin:20px 0 34px}
.card{background:rgba(255,255,255,.95);border-radius:30px;padding:22px;box-shadow:0 15px 45px rgba(30,41,59,.10);border:1px solid rgba(255,255,255,.85)}
.menu{min-height:150px}.icon{font-size:52px}.title{font-size:24px;font-weight:900;margin-bottom:8px}.desc{font-size:16px;color:#64748b}
.panel{background:rgba(255,255,255,.96);border-radius:34px;padding:22px;box-shadow:0 18px 55px rgba(30,41,59,.12);margin:22px 0 38px}
.status{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;font-weight:800;margin-bottom:12px}
.badge{padding:8px 14px;border-radius:999px;background:#f1f5f9}
.illust{font-size:clamp(70px,16vw,126px);text-align:center;margin:8px 0;white-space:pre-line}
.scene{font-size:clamp(24px,5vw,34px);font-weight:900;text-align:center;line-height:1.55;white-space:pre-line;margin:10px 0 18px}
.actions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
button{border:0;border-radius:999px;padding:13px 22px;font-size:20px;font-weight:900;background:linear-gradient(135deg,#4f46e5,#06b6d4);color:white;box-shadow:0 10px 25px rgba(79,70,229,.22);cursor:pointer}
button.light{background:#fff;color:#334155;border:2px solid #e2e8f0;box-shadow:none}
button.gray{background:#64748b}
.choices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.choice,.tile{background:white;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.tile{min-height:96px;display:flex;align-items:center;justify-content:center;font-size:44px}
.correct{border-color:#86efac!important;background:#f0fdf4!important}.wrong{border-color:#fca5a5!important;background:#fef2f2!important}
.message{text-align:center;font-size:28px;font-weight:900;min-height:42px;margin:14px 0}.ok{color:#16a34a}.ng{color:#dc2626}
.tip,.report{margin-top:14px;border-radius:26px;padding:18px;background:#f8fafc;border:2px solid #e2e8f0}.tip{background:#ecfdf5;border-color:#bbf7d0}.report{background:#fff7ed;border-color:#fed7aa}
.reportItem{background:#fff;border:3px solid #fed7aa;border-radius:22px;padding:16px;margin:14px 0}
.hidden{display:none!important}
.footer{text-align:center;color:#64748b;padding:22px}
.shape{width:90px;height:90px;border-radius:18px;display:inline-flex;align-items:center;justify-content:center;font-size:42px;border:5px solid #fff;box-shadow:0 8px 20px rgba(30,41,59,.12)}
.red{background:#ef4444}.blue{background:#3b82f6}.yellow{background:#facc15}.green{background:#22c55e}.purple{background:#a855f7}.orange{background:#fb923c}
@media(min-width:720px){.choices{grid-template-columns:1fr 1fr}.panel{padding:30px}}

.scoreLiveHide{display:none!important}

.versionBadge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  background:linear-gradient(135deg,#4f46e5,#06b6d4);
  color:white;
  font-weight:1000;
  border-radius:999px;
  padding:10px 18px;
  box-shadow:0 10px 24px rgba(79,70,229,.22);
  margin:12px 0;
}
.versionNote{
  display:inline-block;
  background:#fff;
  color:#475569;
  border:2px solid #e2e8f0;
  border-radius:999px;
  padding:8px 14px;
  font-weight:800;
  margin-left:8px;
}
@media(max-width:640px){
  .versionNote{margin-left:0;margin-top:8px}
}


.quizChoices{display:grid;grid-template-columns:1fr;gap:14px;margin-top:14px}
.quizChoice{background:#fff;border:4px solid #dbeafe;border-radius:24px;padding:18px;font-size:clamp(20px,4vw,26px);font-weight:900;text-align:center;white-space:pre-line;box-shadow:0 8px 20px rgba(30,41,59,.08);cursor:pointer}
.quizChoice.correct{border-color:#86efac;background:#f0fdf4}
.quizChoice.wrong{border-color:#fca5a5;background:#fef2f2}
@media(min-width:760px){.quizChoices{grid-template-columns:1fr 1fr}}


.liveResultHide{display:none!important}



/* ===== Ver.1.8 automatic furigana ===== */
ruby.autoRuby{
  ruby-position:over;
}
ruby.autoRuby rt{
  font-size:.55em;
  line-height:1;
  color:#475569;
  font-weight:900;
  text-align:center;
}
@media(max-width:640px){
  ruby.autoRuby rt{
    font-size:.48em;
  }
  ruby.autoRuby{
    line-height:1.15;
  }
}
.themeText{
  margin:12px auto 0;
  color:#334155;
  font-weight:1000;
  font-size:clamp(17px,2.5vw,22px);
  text-align:center;
}
</style>
</head>
<body>
<div class="top"><div class="wrap nav"><a href="sst.html">← もどる</a><span class="pill">🌈 にじフラ Ver.1.8</span></div></div>
<main class="wrap"><section class="panel">
<div class="status">
<span class="badge"><ruby class="autoRuby">問題<rt>もんだい</rt></ruby> <span id="qNum">0</span>/10</span>
<span class="badge"><ruby class="autoRuby">途中<rt>途なか</rt></ruby>の<ruby class="autoRuby">正解数<rt>せいかいすう</rt></ruby>は<ruby class="autoRuby">表示<rt>ひょうじ</rt></ruby>しません</span>
<span class="badge" id="qCat">SST</span>
</div>
<div class="illust" id="qIllust">📝</div>
<h1 style="text-align:center"><ruby class="autoRuby">問題形式<rt>もんだいけいしき</rt></ruby>SST</h1>
<div class="scene" id="qScene">スタートを<ruby class="autoRuby">押<rt>よみ</rt></ruby>してね</div>
<div class="actions">
<button onclick="startQuiz()" type="button"><ruby class="autoRuby">問題<rt>もんだい</rt></ruby>をはじめる</button>
<button class="light" onclick="readQuiz()" type="button">🔊 よみあげ</button>
<a class="pill" href="sst_report.html">レポート</a>
</div>
<div class="quizChoices" id="qChoices"></div>
<div class="message" id="qMsg"></div>
<div class="tip hidden" id="qTip"></div>
</section></main>
<script>

function esc(s){return String(s||"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function stripFurigana(text){return String(text||"").replace(/([一-龯々〆ヶ]+)（[ぁ-んァ-ンー]+）/g,"$1").replace(/（[ぁ-んァ-ンー]+）/g,"").replace(/\n/g,"。")}
function speakText(text){if(!("speechSynthesis" in window))return;const u=new SpeechSynthesisUtterance(stripFurigana(text));u.lang="ja-JP";u.rate=.82;speechSynthesis.cancel();speechSynthesis.speak(u)}

</script>

let qDeck=[], qIndex=0, qScore=0, qWrong=[], qAll=[], qAnswered=false, qCurrent="";
function startQuiz(){
  qDeck = shuffle(QUIZ_DATA).slice(0,10);
  qIndex=0; qScore=0; qWrong=[]; qAll=[];
  document.getElementById("qMsg").textContent="";
  showQuiz();
}
function showQuiz(){
  qAnswered=false;
  document.getElementById("qMsg").textContent="";
  document.getElementById("qTip").classList.add("hidden");
  if(qIndex>=qDeck.length){finishQuiz();return;}
  const q=qDeck[qIndex];
  qCurrent=q.scene;
  document.getElementById("qNum").textContent=qIndex+1;
  document.getElementById("qCat").textContent=q.cat;
  document.getElementById("qIllust").textContent=q.illust;
  document.getElementById("qScene").textContent=q.scene;
  const box=document.getElementById("qChoices");
  box.innerHTML="";
  shuffle(q.choices).forEach(c=>{
    const d=document.createElement("div");
    d.className="quizChoice";
    d.textContent=c.text;
    d.onclick=()=>answerQuiz(c,d);
    box.appendChild(d);
  });
}
function answerQuiz(c,d){
  if(qAnswered)return;
  qAnswered=true;
  document.querySelectorAll(".quizChoice").forEach(x=>x.style.pointerEvents="none");
  const q=qDeck[qIndex];
  const good=q.choices.find(x=>x.ok);
  const item={no:qIndex+1,cat:q.cat,illust:q.illust,scene:q.scene,selected:c.text,correct:good?good.text:"",ok:c.ok,tip:q.tip};
  qAll.push(item);
  if(c.ok){qScore++;d.classList.add("correct");document.getElementById("qMsg").innerHTML='<span class="ok">いい選び方です</span>';}
  else{qWrong.push(item);d.classList.add("wrong");document.getElementById("qMsg").innerHTML='<span class="ng">もう一回考えよう</span>';}
  document.getElementById("qTip").classList.remove("hidden");
  document.getElementById("qTip").innerHTML='<b>ポイント</b><br>'+esc(q.tip);
  setTimeout(()=>{qIndex++;showQuiz();},1300);
}
function finishQuiz(){
  document.getElementById("qNum").textContent=10;
  document.getElementById("qIllust").textContent="⭐";
  document.getElementById("qScene").textContent="問題形式SST おしまい";
  document.getElementById("qChoices").innerHTML="";
  document.getElementById("qTip").classList.add("hidden");
  document.getElementById("qMsg").innerHTML='<span class="ok">最後まで取り組めました</span>';
  const quizRecords = JSON.parse(localStorage.getItem("nijifla_sst_quiz_records") || "[]");
  quizRecords.push({date:new Date().toLocaleString("ja-JP"),score:qScore,total:qAll.length,all:qAll,wrong:qWrong});
  localStorage.setItem("nijifla_sst_quiz_records", JSON.stringify(quizRecords));
}
function readQuiz(){speakText(qCurrent || document.getElementById("qScene").textContent);}
