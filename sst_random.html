  function rubyText(text){

    let i = 0;

      let hit = null;
      for(const pair of FURI_ENTRIES){
        const w = pair[0];
        if(raw.slice(i, i+w.length) === w){ hit = pair; break; }

      }else{
        out += esc(raw[i]);
        i++;
      }
    }
    return out.replaceAll("\n","<br>");
  }
  function skip(n){
    const p = n.parentElement;
    if(!p || !n.nodeValue || !n.nodeValue.trim()) return true;
    return !!p.closest("script,style,textarea,input,select,option,ruby,rt,rb,.noAutoRuby");
  }
  function convertNode(n){
    if(skip(n)) return;
    const raw = n.nodeValue;
    const conv = rubyText(raw);
    if(conv === esc(raw)) return;
    const span = document.createElement("span");
    span.className = "autoRubyWrap";
    span.innerHTML = conv;
    n.parentNode.replaceChild(span,n);
  }
  function scan(root){
    if(!root) return;
    if(root.nodeType === Node.TEXT_NODE){ convertNode(root); return; }
    if(root.nodeType !== Node.ELEMENT_NODE && root.nodeType !== Node.DOCUMENT_NODE) return;

      acceptNode(n){ return skip(n) ? NodeFilter.FILTER_REJECT : NodeFilter.FILTER_ACCEPT; }
