<script>
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}
function stripFurigana(text){
  return String(text)
    .replace(/([一-龯々〆ヶ]+)（[ぁ-んァ-ンー]+）/g,"$1")
    .replace(/（[ぁ-んァ-ンー]+）/g,"")
    .replace(/\n/g,"。");
}
function speakText(text){
  if(!("speechSynthesis" in window)) return;
  const u = new SpeechSynthesisUtterance(stripFurigana(text));
  u.lang="ja-JP"; u.rate=.82; speechSynthesis.cancel(); speechSynthesis.speak(u);
}
function esc(str){
  return String(str).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
</script>

let deck=[], index=0, score=0, answered=false, wrongs=[], current="";
const total=10;
function start(){
  deck=shuffle(DATA).slice(0,total); index=0; score=0; wrongs=[]; answered=false;
  document.getElementById("total").textContent=total;
  document.getElementById("score").textContent=score;
  document.getElementById("report").classList.add("hidden");
  show();
}
function show(){
  answered=false;
  document.getElementById("message").textContent="";
  document.getElementById("tip").classList.add("hidden");
  if(index>=deck.length){finish();return}
  const q=deck[index]; current=q.scene;
  document.getElementById("num").textContent=index+1;
  document.getElementById("cat").textContent=q.cat||"";
  document.getElementById("illust").textContent=q.illust||"🌈";
  document.getElementById("scene").textContent=q.scene;
  const box=document.getElementById("choices"); box.innerHTML="";
  shuffle(q.choices).forEach(c=>{
    const div=document.createElement("div");
    div.className="choice"; div.textContent=c.text;
    div.onclick=()=>answer(c, div);
    box.appendChild(div);
  });
}
function answer(c, el){
  if(answered)return; answered=true;
  document.querySelectorAll(".choice").forEach(x=>x.style.pointerEvents="none");
  const q=deck[index];
  if(c.ok){
    score++; document.getElementById("score").textContent=score;
    el.classList.add("correct");
    document.getElementById("message").innerHTML='<span class="ok">いい選（えら）び方（かた）！</span>';
  }else{
    el.classList.add("wrong");
    const good=q.choices.find(x=>x.ok);
    wrongs.push({cat:q.cat,illust:q.illust,scene:q.scene,selected:c.text,correct:good?good.text:"",tip:q.tip});
    document.getElementById("message").innerHTML='<span class="ng">もう一回（いっかい）考（かんが）えよう</span>';
  }
  document.getElementById("tip").classList.remove("hidden");
  document.getElementById("tip").innerHTML='<b>ポイント</b><br>'+esc(q.tip).replaceAll("\\n","<br>");
  setTimeout(()=>{index++; show();},1900);
}
function finish(){
  document.getElementById("num").textContent=total;
  document.getElementById("cat").textContent="";
  document.getElementById("illust").textContent="⭐";
  document.getElementById("scene").textContent="おしまい！\n"+score+" / "+total+" 問（もん）できました";
  document.getElementById("choices").innerHTML="";
  document.getElementById("tip").classList.add("hidden");
  showReport();
}

  const r=document.getElementById("report"); r.classList.remove("hidden");
  if(wrongs.length===0){
    r.innerHTML='<div class="reportTitle">ふりかえり</div><p>不正解（ふせいかい）はありませんでした。よく考（かんが）えました。</p><button class="secondary" onclick="window.print()">印刷（いんさつ）</button>';
    return;
  }
  let html='<div class="reportTitle">ふりかえりレポート</div><p>不正解（ふせいかい）だった問題（もんだい）だけを表示（ひょうじ）します。</p>';
  wrongs.forEach((w,i)=>{
    html+='<div class="reportItem"><b>'+esc(i+1+". "+w.cat)+'</b><div style="font-size:48px;text-align:center">'+esc(w.illust)+'</div>';
    html+='<div>'+esc(w.scene).replaceAll("\\n","<br>")+'</div>';
    html+='<div class="ng">選（えら）んだ答（こた）え：'+esc(w.selected)+'</div>';
    html+='<div class="ok">よい答（こた）え：'+esc(w.correct)+'</div>';
    html+='<div>ポイント：'+esc(w.tip)+'</div></div>';
  });
  html+='<button class="secondary" onclick="window.print()">印刷（いんさつ）</button>';
  r.innerHTML=html;
}
function nextQuestion(){ if(deck.length===0)start(); else{index++; show();}}
function readQuestion(){ speakText(current || document.getElementById("scene").textContent); }
start();
</script>
